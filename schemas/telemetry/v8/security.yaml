schema_version: 1
domain: security
attribute_extensions: []
attributes:
- id: defenseclaw.evaluation.id
  type: string
  brief: Guardrail evaluation identity
  examples:
  - eval-01J
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: high
  normalization:
    id: identifier-v1
    notes: nonempty bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.hook.event
  type: string
  brief: Connector-reported hook event name after bounded canonical normalization.
  examples:
  - PreToolUse
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: bounded-v1
    notes: nonempty connector event name with bounded UTF-8 length
  introduced_in: telemetry-registry-v1
- id: defenseclaw.hook.result
  type: string
  brief: Technical completion result of the connector hook handler.
  examples:
  - ok
  - panic
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - ok
      - panic
    notes: ok|panic
  introduced_in: telemetry-registry-v1
- id: defenseclaw.connector.step_idx
  type: int64
  brief: One-based connector step shared by hook events in the same reported turn.
  examples:
  - 1
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 1
      max: 9223372036854775807
    notes: positive integer; absent when the connector event has no turn step
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.id
  type: string
  brief: Finding occurrence identity
  examples:
  - finding-01J
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: high
  normalization:
    id: identifier-v1
    notes: nonempty bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.scan.id
  type: string
  brief: Asset scan identity
  examples:
  - scan-01J
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: high
  normalization:
    id: identifier-v1
    notes: nonempty bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.policy.id
  type: string
  brief: Policy identity
  examples:
  - policy-default
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: identifier-v1
    notes: nonempty bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.policy.version
  type: string
  brief: Policy version
  examples:
  - sha256:abcd
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: identifier-v1
    notes: versioned bounded identifier
  introduced_in: telemetry-registry-v1
- id: defenseclaw.enforcement.id
  type: string
  brief: Enforcement action identity
  examples:
  - enforcement-01J
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: high
  normalization:
    id: identifier-v1
    notes: nonempty bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.approval.id
  type: string
  brief: Approval identity
  examples:
  - approval-01J
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: high
  normalization:
    id: identifier-v1
    notes: nonempty bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.name
  type: string
  brief: Guardrail identity
  examples:
  - prompt-injection
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: identifier-v1
    notes: registered bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.strategy
  type: string
  brief: Evaluation strategy
  examples:
  - ai_defense
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: registered strategy
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.stage
  type: string
  brief: Evaluation stage
  examples:
  - runtime
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: closed stage
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.phase
  type: string
  brief: Evaluation phase
  examples:
  - finalize
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - regex
      - ai_defense
      - judge
      - policy
      - finalize
    notes: regex|ai_defense|judge|policy|finalize
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.direction
  type: string
  brief: Inspection direction
  examples:
  - input
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - input
      - output
      - tool
    notes: input|output|tool
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.target_type
  type: string
  brief: Inspected target type
  examples:
  - prompt
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: closed target type
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.target_ref
  type: string
  brief: Source-observed reference for the target evaluated by a guardrail or policy
  examples:
  - skill/example
  stability: stable
  owner: defenseclaw
  field_class: content
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 4096
    notes: NFC text retained for centralized per-destination redaction
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.detector.name
  type: string
  brief: Detector identity
  examples:
  - pii
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: identifier-v1
    notes: registered bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.detector.sources
  type: string[]
  brief: Bounded detector or scanner sources that contributed to the evaluation
  examples:
  - - local
    - cisco-ai-defense
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 2048
      max_item_utf8_bytes: 256
      max_items: 8
    notes: unique stable source identifiers, at most eight
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.detector.version
  type: string
  brief: Detector version
  examples:
  - '1'
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: identifier-v1
    notes: versioned bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.cache_hit
  type: boolean
  brief: Evaluation cache hit
  examples:
  - false
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: identity-v1
    notes: boolean
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.attempt
  type: int64
  brief: Evaluation attempt
  examples:
  - 1
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 1
      max: 9223372036854775807
    notes: positive integer
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.latency_ms
  type: double
  brief: Evaluation latency ms
  examples:
  - 18.5
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0.0
      max: 1000000000000.0
    notes: nonnegative finite
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.score
  type: double
  brief: Detector or judge score
  examples:
  - 0.92
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0.0
      max: 1.0
    notes: finite bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.confidence
  type: double
  brief: Evaluation confidence
  examples:
  - 0.97
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0.0
      max: 1.0
    notes: 0..1
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.rule_ids
  type: string[]
  brief: Bounded matched rule IDs
  examples:
  - - PI-001
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 2048
      max_item_utf8_bytes: 256
      max_items: 8
    notes: at most eight registered IDs
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.finding_count
  type: int64
  brief: Finding count
  examples:
  - 1
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0
      max: 9223372036854775807
    notes: nonnegative bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.decision
  type: string
  brief: Domain decision
  examples:
  - block
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - allow
      - block
      - deny
      - review
      - redact
    notes: allow|block|deny|review|redact
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.raw_action
  type: string
  brief: Pre-mode action
  examples:
  - block
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: registered action
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.effective_action
  type: string
  brief: Connector-facing action
  examples:
  - alert
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: registered action
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.mode
  type: string
  brief: Enforcement mode
  examples:
  - observe
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - observe
      - enforce
    notes: observe|enforce
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.would_block
  type: boolean
  brief: Would block in enforcement mode
  examples:
  - true
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: identity-v1
    notes: boolean
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.enforced
  type: boolean
  brief: Control actually imposed
  examples:
  - false
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: identity-v1
    notes: boolean
  introduced_in: telemetry-registry-v1
- id: defenseclaw.security.severity
  type: string
  brief: Canonical security severity
  examples:
  - HIGH
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - INFO
      - LOW
      - MEDIUM
      - HIGH
      - CRITICAL
    notes: INFO|LOW|MEDIUM|HIGH|CRITICAL
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.reason
  type: string
  brief: Bounded projected decision reason
  examples:
  - policy matched
  stability: stable
  owner: defenseclaw
  field_class: reason
  sensitivity: sensitive
  cardinality: bounded
  normalization:
    id: redacted-content-v1
    notes: NFC; redacted; bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.guardrail.evidence_summary
  type: string
  brief: Bounded projected evidence summary
  examples:
  - rule evidence available
  stability: stable
  owner: defenseclaw
  field_class: evidence
  sensitivity: sensitive
  cardinality: bounded
  normalization:
    id: redacted-content-v1
    notes: NFC; redacted; bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.judge.kind
  type: string
  brief: Judge implementation kind
  examples:
  - llm
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: registered judge kind
  introduced_in: telemetry-registry-v1
- id: defenseclaw.judge.action
  type: string
  brief: Judge action
  examples:
  - block
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: registered judge action
  introduced_in: telemetry-registry-v1
- id: defenseclaw.judge.latency_ms
  type: int64
  brief: Judge latency milliseconds
  examples:
  - 42
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0
      max: 9223372036854775807
    notes: nonnegative bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.judge.input_bytes
  type: int64
  brief: Judge input byte count
  examples:
  - 512
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0
      max: 9223372036854775807
    notes: nonnegative bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.judge.parse_error
  type: string
  brief: Projected judge parse failure
  examples:
  - invalid JSON
  stability: stable
  owner: defenseclaw
  field_class: error
  sensitivity: sensitive
  cardinality: bounded
  normalization:
    id: redacted-content-v1
    notes: NFC; centrally redacted; bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.judge.error_summary
  type: string
  brief: Bounded judge provider, empty-response, or parse failure summary
  examples:
  - provider unavailable
  stability: stable
  owner: defenseclaw
  field_class: error
  sensitivity: sensitive
  cardinality: bounded
  normalization:
    id: redacted-content-v1
    overrides:
      max_utf8_bytes: 65536
    notes: Source-backed failure text; centrally redacted; never populated for successful judge results
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.rule_id
  type: string
  brief: Stable finding rule ID
  examples:
  - PI-001
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: identifier-v1
    notes: registered bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.category
  type: string
  brief: Finding category
  examples:
  - prompt_injection
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: registered category
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.confidence
  type: double
  brief: Finding confidence
  examples:
  - 0.98
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0.0
      max: 1.0
    notes: 0..1
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.target_ref
  type: string
  brief: Route-projectable finding target reference
  examples:
  - asset:skill/example
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: identifier-v1
    notes: bounded safe reference
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.fingerprint
  type: string
  brief: Safe finding fingerprint
  examples:
  - hmac-sha256:abcd
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: high
  normalization:
    id: digest-v1
    notes: versioned keyed digest
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.status
  type: string
  brief: Reserved legacy finding workflow status; forbidden on observation families
  examples:
  - open
  stability: deprecated
  deprecated_in: telemetry-registry-v1
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - open
      - acknowledged
      - resolved
      - suppressed
    notes: open|acknowledged|resolved|suppressed
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.remediation
  type: string
  brief: Projected recommended remediation
  examples:
  - review and restrict the asset
  stability: stable
  owner: defenseclaw
  field_class: reason
  sensitivity: sensitive
  cardinality: bounded
  normalization:
    id: redacted-content-v1
    notes: producer supplied or deterministic rule-catalog text; never fabricated
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.title
  type: string
  brief: Bounded source-supplied finding title
  examples:
  - Potential prompt injection
  stability: stable
  owner: defenseclaw
  field_class: evidence
  sensitivity: sensitive
  cardinality: bounded
  normalization:
    id: redacted-content-v1
    overrides:
      max_utf8_bytes: 4096
    notes: Scanner or detector supplied and centrally redacted; never synthesized by the telemetry adapter
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.description
  type: string
  brief: Bounded source-supplied finding description
  examples:
  - A detector matched a potentially unsafe instruction pattern.
  stability: stable
  owner: defenseclaw
  field_class: evidence
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: redacted-content-v1
    overrides:
      max_utf8_bytes: 65536
    notes: Exact producer description after central redaction; distinct from a generated evidence summary
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.location
  type: string
  brief: Centrally projected finding location without raw evidence
  examples:
  - ~/workspace/skill.yaml
  stability: stable
  owner: defenseclaw
  field_class: path
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: path-v1
    overrides:
      max_utf8_bytes: 8192
    notes: Source location after path-mode projection; query strings and raw matched evidence are forbidden
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.line_number
  type: int64
  brief: One-based source line for the finding
  examples:
  - 42
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 1
      max: 9223372036854775807
    notes: Present only when the producer supplied a meaningful one-based line
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.tags
  type: string[]
  brief: Bounded source-supplied finding tags
  examples:
  - - secret
    - credential
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 16384
      max_item_utf8_bytes: 256
      max_items: 64
    notes: Stable scanner labels; empty tags are omitted
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.data_axes
  type: string[]
  brief: Lethal-trifecta data-axis labels attached to the finding
  examples:
  - - ingress_untrusted
    - sensitive_access
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: internal
  cardinality: low
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 256
      max_item_utf8_bytes: 64
      min_items: 1
      max_items: 3
    notes: Each item is ingress_untrusted, sensitive_access, or egress_external; producer order is preserved
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.tool_capability_class
  type: string
  brief: Tool capability class correlated with the finding
  examples:
  - exec_shell
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - read_fs
      - write_fs
      - exec_shell
      - network_fetch
      - send_message
    notes: read_fs|write_fs|exec_shell|network_fetch|send_message
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.external_endpoint
  type: string
  brief: Centrally projected endpoint associated with a network-touching finding
  examples:
  - webhook.example
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 4096
    notes: Host or scrubbed URL; userinfo, query, and fragment are forbidden
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.decision_path
  type: string
  brief: Bounded structured explanation of severity and decision derivation
  examples:
  - '[{"stage":"regex","rule_id":"INJ-001"}]'
  stability: stable
  owner: defenseclaw
  field_class: evidence
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: redacted-content-v1
    overrides:
      max_utf8_bytes: 65536
    notes: Canonical JSON text from scanner.Finding.DecisionPath; centrally redacted and never synthesized
  introduced_in: telemetry-registry-v1
- id: defenseclaw.finding.content_fingerprint
  type: string
  brief: Legacy short correlation fingerprint over already-redacted finding evidence
  examples:
  - 0123abcd
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: high
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 8
      pattern: ^[0-9a-f]{8}$
    notes: Exact current scanner.Finding.ContentFingerprint; not a keyed digest and not a substitute for defenseclaw.finding.fingerprint
