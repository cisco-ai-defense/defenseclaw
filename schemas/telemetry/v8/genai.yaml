- id: gen_ai.agent.type
  type: string
  brief: 'Deprecated PR #403 projection alias preserving the exact connector-reported implementation/runtime meaning of defenseclaw.agent.type; absent from the pinned OTel GenAI registry.'
  examples:
  - codex
  - copilot-cli
  - coding-agent
  - diagnostic
  stability: deprecated
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: bounded-v1
    notes: exact projection of defenseclaw.agent.type
  introduced_in: telemetry-registry-v1
  deprecated_in: telemetry-registry-v1
  removed_in: telemetry-registry-v2
  alias_of: defenseclaw.agent.type
  projection_only: true
  legacy_bindings:
  - source: 'PR #403 current runtime and agent lifecycle schemas'
    disposition: generated_compatibility_alias
    details:
      canonical: defenseclaw.agent.type
      projections:
      - galileo-rich-v2
      - local-observability-v1
      - generated current-schema compatibility views
