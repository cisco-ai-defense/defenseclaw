  introduced_in: telemetry-registry-v1
  extends:
  - correlation.agent
  attributes:
  - ref: gen_ai.conversation.id
    requirement_level: required
  - ref: gen_ai.agent.id
    requirement_level: required
  - ref: defenseclaw.agent.root.id
    requirement_level: required
  - ref: defenseclaw.session.root.id
    requirement_level: required
  - ref: defenseclaw.agent.lifecycle.id
    requirement_level: required
  - ref: defenseclaw.agent.execution.id
    requirement_level: required
  - ref: defenseclaw.agent.lifecycle.event
    requirement_level: required
  - ref: defenseclaw.agent.lifecycle.state
    requirement_level: required
  - ref: defenseclaw.agent.depth
    requirement_level: required
  body_fields: []
  x-defenseclaw:
    legacy_bindings:
    - source: schemas/otel/agent-lifecycle-event.schema.json
      disposition: preserved
      details:
        events:
        - session_start
        - session_end
        - subagent_start
        - subagent_stop
        - turn_start
        - turn_end
        - tool_start
        - tool_end
        - compact_start
        - compact_end
        - event
        states:
        - active
        - completed
        - failed
        - interrupted
        - observed
        phase_codes:
          '1': session
          '2': planning
          '3': model
          '4': tool
          '5': approval
          '6': waiting
          '7': responding
          '8': maintenance
          '9': completed
          '10': failed
          '11': interrupted
          '12': observed
        code_zero: unknown/unrecognized only
        intentional_corrections:
        - source: PR #403 Galileo projection fixture
          invalid_fixture:
            phase: model
            previous_phase: turn
            code: 4
          corrected_fixture:
            phase: model
            previous_phase: planning
            code: 3
          reason: The fixture contradicted the immutable phase catalog; it was not a compatibility alias.
