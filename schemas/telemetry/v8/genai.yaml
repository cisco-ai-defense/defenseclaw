- id: defenseclaw.agent.reported_cost.present
  type: boolean
  brief: Whether the connector explicitly supplied a cumulative agent/session cost in USD; false means unavailable and true includes a reported zero.
  examples:
  - false
  - true
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: identity-v1
    notes: Exact availability state from the source payload; never inferred from model pricing or a default numeric value.
  introduced_in: telemetry-registry-v1
  legacy_bindings:
  - source: 'PR #403 gateway envelope agent_reported_cost_present'
    disposition: canonicalized_without_semantic_change
    details:
      legacy_json_field: agent_reported_cost_present
      reported_zero_is_present: true
      absent_is_not_zero: true
- id: defenseclaw.agent.reported_cost.usd
  type: double
  brief: Latest connector-reported cumulative cost in USD for the current agent/session observation.
  examples:
  - 0.0
  - 1.25
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0.0
      max: 1.7976931348623157e+308
    notes: Finite nonnegative cumulative USD reported by the connector; DefenseClaw never estimates it.
  introduced_in: telemetry-registry-v1
  legacy_bindings:
  - source: 'PR #403 gateway envelope agent_reported_cost_usd and Agent360 gauge'
    disposition: canonicalized_without_semantic_change
    details:
      legacy_json_field: agent_reported_cost_usd
      metric_identity: defenseclaw.agent.reported_cost
      aggregation: latest cumulative total per agent/session identity
  - source: openinference-semantic-conventions-v0.1.30
    disposition: compatibility_projection_only_when_scope_is_proven_identical
    details:
      candidate_alias: llm.cost.total
      default_projection: omitted
      reason: An LLM-operation total is not necessarily the cumulative agent/session total; adapters must prove identical scope and currency before projecting the same value.
