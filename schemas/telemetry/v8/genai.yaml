producer_identity_sets: []
producer_mappings: []
attribute_extensions:
- ref: db.collection.name
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: identifier-v1
    notes: preserve only a bounded policy-eligible collection identity; otherwise omit or project a safe reference
- ref: db.operation.name
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: lowercase registered database operation token
- ref: error.type
  field_class: metadata
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: bounded-v1
    notes: stable bounded error type; never copy exception messages or arbitrary provider text
- ref: gen_ai.agent.id
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: identifier-v1
    notes: preserve a nonempty bounded producer identifier; canonical metrics forbid it and local-observability spanmetrics applies its explicit bounded cache and expiry exception
- ref: gen_ai.agent.name
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: identifier-v1
    notes: NFC bounded producer name; canonical metrics forbid it and local-observability spanmetrics alone applies its explicit bounded cache and expiry exception
- ref: gen_ai.conversation.id
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: identifier-v1
    notes: preserve a nonempty bounded upstream conversation identifier; never fabricate from adjacency or use as a metric label
- ref: user.id
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: identifier-v1
    notes: preserve only an explicitly reported bounded user-principal identifier; never derive it from a display name or administrative principal
- ref: gen_ai.input.messages
  field_class: content
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: redacted-content-v1
    notes: preserve typed message order and roles within item and byte limits; destination redaction precedes every alias projection
- ref: gen_ai.operation.name
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - chat
      - create_agent
      - create_memory
      - create_memory_store
      - delete_memory
      - delete_memory_store
      - embeddings
      - execute_tool
      - generate_content
      - invoke_agent
      - invoke_workflow
      - plan
      - retrieval
      - search_memory
      - text_completion
      - update_memory
      - upsert_memory
    notes: pinned closed GenAI operation vocabulary
- ref: gen_ai.output.messages
  field_class: content
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: redacted-content-v1
    notes: preserve typed message order and roles within item and byte limits; destination redaction precedes every alias projection
- ref: gen_ai.provider.name
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: lowercase bounded provider token from the pinned convention
- ref: gen_ai.request.max_tokens
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0
      max: 9223372036854775807
    notes: nonnegative producer-reported request value; omit when not reported
- ref: gen_ai.request.model
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: identifier-v1
    notes: NFC bounded requested model identity; never infer from response data
- ref: gen_ai.request.temperature
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: -1.0e+308
      max: 1.0e+308
    notes: finite producer-reported request value; omit when not reported
- ref: gen_ai.request.top_p
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0.0
      max: 1.0
    notes: finite producer-reported request value; omit when not reported
- ref: gen_ai.response.finish_reasons
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: bounded-v1
    notes: bounded ordered list of provider-reported finish-reason tokens
- ref: gen_ai.response.id
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: identifier-v1
    notes: preserve a nonempty bounded provider response identifier; omit when not reported and never use as a metric label
- ref: gen_ai.response.model
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: identifier-v1
    notes: NFC bounded provider-reported response model identity; omit when not reported
- ref: gen_ai.tool.call.arguments
  field_class: content
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: redacted-content-v1
    notes: preserve typed or serialized arguments within content limits; centrally redact before destination projection
- ref: gen_ai.tool.call.id
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: identifier-v1
    notes: preserve a nonempty bounded producer tool-call identifier; never derive from arguments or use as a metric label
- ref: gen_ai.tool.call.result
  field_class: content
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: redacted-content-v1
    notes: preserve typed or serialized result within content limits; centrally redact before destination projection
- ref: gen_ai.tool.name
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: identifier-v1
    notes: NFC bounded tool name; canonical metrics use only registered bounded projections and span names use a normalized bounded form
- ref: gen_ai.tool.type
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: pinned bounded tool-type token
- ref: gen_ai.usage.input_tokens
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0
      max: 9223372036854775807
    notes: nonnegative provider-reported token count; omit rather than synthesize zero
- ref: gen_ai.usage.output_tokens
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0
      max: 9223372036854775807
    notes: nonnegative provider-reported token count; omit rather than synthesize zero
- ref: gen_ai.token.type
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - input
      - output
      - cacheRead
      - cacheCreation
    notes: registered token type; cacheRead and cacheCreation preserve the existing Claude Code and local-observability label contract without relabelling cache tokens as input
