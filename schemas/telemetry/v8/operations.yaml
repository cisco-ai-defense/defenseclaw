schema_version: 1
domain: operations
attribute_extensions:
- ref: deployment.environment.name
  field_class: metadata
  sensitivity: internal
  cardinality: low
  normalization:
    id: bounded-v1
    notes: NFC bounded deployment environment token
- ref: exception.message
  field_class: error
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: redacted-content-v1
    notes: centrally redact and truncate the producer message; never use it as a metric label
- ref: exception.stacktrace
  field_class: error
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: redacted-content-v1
    notes: centrally redact and truncate within the configured stacktrace limit; emit only on an eligible route
- ref: exception.type
  field_class: metadata
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: bounded-v1
    notes: stable bounded exception type; never substitute message or stack text
- ref: host.arch
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - amd64
      - arm32
      - arm64
      - ia64
      - ppc32
      - ppc64
      - s390x
      - x86
    notes: pinned lowercase architecture token
- ref: host.name
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: identifier-v1
    notes: NFC bounded host identity emitted only when local policy permits
- ref: http.request.method
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - CONNECT
      - DELETE
      - GET
      - HEAD
      - OPTIONS
      - PATCH
      - POST
      - PUT
      - QUERY
      - TRACE
      - _OTHER
    notes: uppercase registered HTTP method token
- ref: http.response.status_code
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0
      max: 999
    notes: valid integer HTTP response status code
- ref: network.protocol.name
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: lowercase registered network protocol token
- ref: network.protocol.version
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: bounded registered protocol version token
- ref: os.type
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - aix
      - darwin
      - dragonflybsd
      - freebsd
      - hpux
      - linux
      - netbsd
      - openbsd
      - solaris
      - windows
      - z_os
      - zos
    notes: pinned lowercase operating-system type token
- ref: server.address
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: identifier-v1
    notes: normalized bounded host or address without credentials; redact or omit policy-ineligible values
- ref: server.port
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0
      max: 65535
    notes: integer port in the valid 1 through 65535 range
- ref: service.instance.id
  field_class: identifier
  sensitivity: internal
  cardinality: high
  normalization:
    id: identifier-v1
    notes: nonempty bounded process-instance identity; never copy into a registered metric family label
- ref: service.name
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: nonempty bounded OTel service name
- ref: service.namespace
  field_class: metadata
  sensitivity: internal
  cardinality: low
  normalization:
    id: bounded-v1
    notes: NFC bounded service namespace
- ref: service.version
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: bounded-v1
    notes: nonempty bounded immutable binary version
- ref: url.full
  field_class: path
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: url-v1
    notes: centrally redact credentials and sensitive query values, normalize safely, and never use the full URL as a metric label or span name
- ref: url.scheme
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: lowercase registered URL scheme token without separators
- ref: http.route
  field_class: metadata
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: bounded-v1
    notes: matched route template only; never a raw request path
attributes:
- id: defenseclaw.deployment.mode
  type: string
  brief: DefenseClaw deployment mode
  examples:
  - sidecar
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: registered deployment mode
  introduced_in: telemetry-registry-v1
- id: defenseclaw.claw.mode
  type: string
  brief: Connector/claw operating mode
  examples:
  - gateway
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: registered claw mode
  introduced_in: telemetry-registry-v1
- id: defenseclaw.instance.id
  type: string
  brief: DefenseClaw instance identity
  examples:
  - instance-01
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: identifier-v1
    notes: nonempty bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.device.public_key_fingerprint
  type: string
  brief: Device public-key fingerprint
  examples:
  - sha256:abcd
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: digest-v1
    notes: versioned digest
  introduced_in: telemetry-registry-v1
- id: tenant.id
  type: string
  brief: Configured tenant identity
  examples:
  - tenant-a
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: identifier-v1
    notes: nonempty bounded
  introduced_in: telemetry-registry-v1
- id: workspace.id
  type: string
  brief: Configured workspace identity
  examples:
  - workspace-a
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: identifier-v1
    notes: nonempty bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.asset.id
  type: string
  brief: Asset identity
  examples:
  - skill:example
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: high
  normalization:
    id: identifier-v1
    notes: nonempty bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.asset.type
  type: string
  brief: Asset type
  examples:
  - skill
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum:
      - skill
      - plugin
      - mcp
      - model
      - connector
    notes: skill|plugin|mcp|model|connector
  introduced_in: telemetry-registry-v1
- id: defenseclaw.asset.transition
  type: string
  brief: Asset lifecycle transition
  examples:
  - quarantine
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: registered transition
  introduced_in: telemetry-registry-v1
- id: defenseclaw.asset.previous_state
  type: string
  brief: Previous asset state
  examples:
  - active
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: registered state
  introduced_in: telemetry-registry-v1
- id: defenseclaw.asset.resulting_state
  type: string
  brief: Resulting asset state
  examples:
  - quarantined
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: registered state
  introduced_in: telemetry-registry-v1
- id: defenseclaw.asset.target_ref
  type: string
  brief: Stable reference to the lifecycle target
  examples:
  - asset:skill/example
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: high
  normalization:
    id: identifier-v1
    overrides:
      max_utf8_bytes: 512
    notes: Stable bounded reference only; never copy manifest, file, or credential content
  introduced_in: telemetry-registry-v1
- id: defenseclaw.asset.target_path
  type: string
  brief: Local path of the lifecycle target when the producer truthfully has one
  examples:
  - /workspace/.defenseclaw/skills/example
  stability: stable
  owner: defenseclaw
  field_class: path
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: path-v1
    overrides:
      max_utf8_bytes: 8192
    notes: Centrally normalized and redacted local path; never use as a metric label or span name
  introduced_in: telemetry-registry-v1
- id: defenseclaw.asset.transition_reason
  type: string
  brief: Bounded reason code for the asset transition
  examples:
  - policy_quarantine
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 256
    notes: Registered reason code only; never raw scanner, policy, or exception text
  introduced_in: telemetry-registry-v1
- id: defenseclaw.asset.transition_code
  type: string
  brief: Machine-stable asset transition code
  examples:
  - quarantine_applied
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 128
    notes: Registered transition result code
  introduced_in: telemetry-registry-v1
- id: defenseclaw.asset.transition_initiator
  type: string
  brief: Bounded actor or subsystem reference that initiated the transition
  examples:
  - subsystem:watcher
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: sensitive
  cardinality: high
  normalization:
    id: identifier-v1
    overrides:
      max_utf8_bytes: 512
    notes: Reference only; never an authorization header, token, or unbounded subject claim
  introduced_in: telemetry-registry-v1
- id: defenseclaw.asset.install_action
  type: string
  brief: Installation enforcement action associated with the lifecycle transition
  examples:
  - block
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 64
    notes: Canonical policy action when present; omit when the producer did not evaluate installation
  introduced_in: telemetry-registry-v1
- id: defenseclaw.asset.file_action
  type: string
  brief: File enforcement action associated with the lifecycle transition
  examples:
  - quarantine
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 64
    notes: Canonical policy action when present; omit when the producer did not evaluate a file action
  introduced_in: telemetry-registry-v1
- id: defenseclaw.asset.runtime_action
  type: string
  brief: Runtime enforcement action associated with the lifecycle transition
  examples:
  - disable
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 64
    notes: Canonical policy action when present; omit when the producer did not evaluate runtime state
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.component.id
  type: string
  brief: Discovered AI component identity
  examples:
  - component-01
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: high
  normalization:
    id: identifier-v1
    notes: nonempty bounded
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.component.type
  type: string
  brief: AI component type
  examples:
  - agent
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    notes: registered component type
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.detector
  type: string
  brief: Discovery detector identity
  examples:
  - process
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: low
  normalization:
    id: identifier-v1
    notes: registered detector
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.signal
  type: string
  brief: Bounded discovery signal
  examples:
  - process
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: internal
  cardinality: low
  normalization:
    id: bounded-v1
    notes: registered signal
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.confidence
  type: double
  brief: Discovery confidence
  examples:
  - 0.91
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0.0
      max: 1.0
    notes: 0..1
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.scan_id
  type: string
  brief: Continuous AI discovery scan identity
  examples:
  - scan-01
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: high
  normalization:
    id: identifier-v1
    overrides:
      max_utf8_bytes: 256
    notes: Nonempty bounded scan identity
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.source
  type: string
  brief: Trusted source of an AI discovery report
  examples:
  - sidecar
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 64
    notes: Producer-normalized source such as sidecar or external
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.privacy_mode
  type: string
  brief: Effective privacy mode used by the discovery scan
  examples:
  - enhanced
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 64
    notes: Producer-normalized effective mode; bounded to preserve forward-compatible and externally reported modes
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.result
  type: string
  brief: Result reported by the continuous discovery scan
  examples:
  - ok
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 64
    notes: Producer-normalized bounded result; the canonical envelope outcome remains authoritative
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.duration_ms
  type: int64
  brief: Wall-clock duration of an AI discovery scan or detector
  examples:
  - 37
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides:
      min: 0
      max: 9223372036854775807
    notes: Nonnegative milliseconds
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.signals_total
  type: int64
  brief: Total discovery signals in the scan or detector result
  examples:
  - 12
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides: {min: 0, max: 9223372036854775807}
    notes: Nonnegative bounded count
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.active_signals
  type: int64
  brief: Active discovery signals in the scan result
  examples: [10]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides: {min: 0, max: 9223372036854775807}
    notes: Nonnegative bounded count
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.new_signals
  type: int64
  brief: Newly observed discovery signals
  examples: [2]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides: {min: 0, max: 9223372036854775807}
    notes: Nonnegative bounded count
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.changed_signals
  type: int64
  brief: Discovery signals whose bounded evidence changed
  examples: [1]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides: {min: 0, max: 9223372036854775807}
    notes: Nonnegative bounded count
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.gone_signals
  type: int64
  brief: Discovery signals no longer observed
  examples: [1]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides: {min: 0, max: 9223372036854775807}
    notes: Nonnegative bounded count
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.files_scanned
  type: int64
  brief: Files inspected without exposing their local paths
  examples: [42]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides: {min: 0, max: 9223372036854775807}
    notes: Nonnegative bounded count; no filenames or paths
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.dedupe_suppressed
  type: int64
  brief: Duplicate discovery signals suppressed during the scan
  examples: [3]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides: {min: 0, max: 9223372036854775807}
    notes: Nonnegative bounded count
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.errors
  type: int64
  brief: Bounded detector error count for the scan
  examples: [1]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: bounded
  normalization:
    id: numeric-range-v1
    overrides: {min: 0, max: 9223372036854775807}
    notes: Nonnegative count only; never raw error text
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.discovery.signal_id
  type: string
  brief: Stable identity of one sanitized discovery signal
  examples: [signal-01]
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: high
  normalization:
    id: identifier-v1
    overrides: {max_utf8_bytes: 256}
    notes: Stable signal identity; never raw evidence
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.component.vendor
  type: string
  brief: Bounded vendor label for a discovered AI component
  examples: [OpenAI]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: bounded-v1
    overrides: {max_utf8_bytes: 256}
    notes: Catalog or detector-produced vendor label
  introduced_in: telemetry-registry-v1
- id: defenseclaw.ai.component.product
  type: string
  brief: Bounded product label for a discovered AI component
  examples: [openai]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: bounded-v1
    overrides: {max_utf8_bytes: 256}
    notes: Catalog or detector-produced product label
  introduced_in: telemetry-registry-v1
- id: defenseclaw.inventory.item.name
  type: string
  brief: Bounded configured name of one endpoint inventory item
  examples: [payments-mcp]
  stability: stable
  owner: defenseclaw
  field_class: identifier
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 256
      pattern: '^[^/\\]*$'
    notes: Connector or MCP configuration name only; never a path
  introduced_in: telemetry-registry-v1
- id: defenseclaw.inventory.item.description
  type: string
  brief: Bounded catalog description of one endpoint inventory item
  examples: [fetch interceptor plugin]
  stability: stable
  owner: defenseclaw
  field_class: content
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: bounded-v1
    overrides: {max_utf8_bytes: 512}
    notes: Free-form connector or plugin catalog description; control characters are rejected by the producer
  introduced_in: telemetry-registry-v1
- id: defenseclaw.inventory.connector.source
  type: string
  brief: Connector implementation source in the endpoint registry
  examples: [built-in]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum: [built-in, plugin]
    notes: Exact registry source; distinct from the connector identity in defenseclaw.connector.source
  introduced_in: telemetry-registry-v1
- id: defenseclaw.inventory.connector.tool_inspection_mode
  type: string
  brief: Connector tool-call inspection capability
  examples: [pre-execution]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum: [pre-execution, response-scan, both]
    notes: Exact registered connector capability
  introduced_in: telemetry-registry-v1
- id: defenseclaw.inventory.connector.subprocess_policy
  type: string
  brief: Connector subprocess enforcement capability
  examples: [sandbox]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: safe
  cardinality: low
  normalization:
    id: enum-v1
    overrides:
      enum: [sandbox, shims, none]
    notes: Exact registered connector capability
  introduced_in: telemetry-registry-v1
- id: defenseclaw.inventory.mcp.transport
  type: string
  brief: Bounded configured MCP transport
  examples: [stdio]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: internal
  cardinality: low
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 64
      pattern: '^[a-z0-9][a-z0-9_.-]*$'
    notes: Lower-case stable transport token only; configuration payload is never included
  introduced_in: telemetry-registry-v1
- id: defenseclaw.inventory.mcp.command_basename
  type: string
  brief: Basename of the configured local MCP command
  examples: [mcp-server]
  stability: stable
  owner: defenseclaw
  field_class: metadata
  sensitivity: internal
  cardinality: bounded
  normalization:
    id: bounded-v1
    overrides:
      max_utf8_bytes: 256
      pattern: '^[A-Za-z0-9][A-Za-z0-9._+@-]*$'
    notes: Conservative executable basename only; command arguments and shell syntax are forbidden
  introduced_in: telemetry-registry-v1
- id: defenseclaw.inventory.mcp.url_host
  type: string
  brief: Host and optional port of the configured remote MCP URL
  examples: [mcp.example.com:8443]
  stability: stable
