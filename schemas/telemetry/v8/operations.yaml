  - ref: defenseclaw.asset.transition
    requirement_level: recommended
  - ref: defenseclaw.asset.previous_state
    requirement_level: recommended
  - ref: defenseclaw.asset.resulting_state
    requirement_level: recommended
  - ref: defenseclaw.asset.target_ref
    requirement_level: recommended
  - ref: defenseclaw.asset.target_path
    requirement_level: recommended
  - ref: defenseclaw.asset.transition_reason
    requirement_level: recommended
  - ref: defenseclaw.asset.transition_code
    requirement_level: recommended
