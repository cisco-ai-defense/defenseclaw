      - {name: correlation, type: object, required: true, object_ref: correlation, field_class: metadata, sensitivity: internal, normalization: {id: structured-content-v1, overrides: {max_utf8_bytes: 16384, max_item_utf8_bytes: 512, max_items: 20, max_depth: 1, max_properties: 20}}}
      - {name: provenance, type: object, required: true, object_ref: provenance, field_class: metadata, sensitivity: internal, normalization: {id: structured-content-v1, overrides: {max_utf8_bytes: 16384, max_item_utf8_bytes: 512, max_items: 20, max_depth: 2, max_properties: 20}}}
      - {name: body, type: canonical_json, required: false, semantic_ref: registry.family_payload, field_class: metadata, sensitivity: critical, normalization: {id: structured-content-v1, overrides: {max_utf8_bytes: 1048576, max_item_utf8_bytes: 65536, max_items: 8192, max_depth: 32, max_properties: 8192}}}
      - {name: instrument_data, type: object, required: false, object_ref: metric_instrument_data, field_class: metadata, sensitivity: internal, normalization: {id: structured-content-v1, overrides: {max_utf8_bytes: 1048576, max_item_utf8_bytes: 65536, max_items: 8192, max_depth: 32, max_properties: 8192}}}
      - {name: field_classes, type: field_class_map, required: true, semantic_ref: payload.rfc6901_field_classes, field_class: metadata, sensitivity: internal, normalization: {id: structured-content-v1, overrides: {max_utf8_bytes: 1048576, max_item_utf8_bytes: 4096, max_items: 8192, max_depth: 1, max_properties: 8192}}}
    signal_arms:
