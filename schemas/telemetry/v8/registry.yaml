go_symbol_policy:
  version: 1
  package: observability
  separators: ['.', '-', '/', '_']
  brand_spellings:
    defenseclaw: DefenseClaw
    opentelemetry: OpenTelemetry
    otel: OTel
  initialisms: [AI, API, DB, HEC, HTTP, ID, JSON, LLM, OTEL, OTLP, PII, RPC, SDK, SQL, TLS, URL, UTF8]
  reserved_word_policy: reject
  collision_policy: reject
  auto_suffix_policy: reject
structural_contract:
  id: defenseclaw.canonical-record
  version: 1
  additional_properties: false
  runtime_binding:
    record: internal/observability.Record
    input: internal/observability.RecordInput
    value: internal/observability.Value
    schema_derived_constructor: internal/observability.newSchemaDerivedRecord
    schema_derived_log_constructor: internal/observability.newSchemaDerivedLogRecord
  limits:
    record_id_utf8_bytes: 512
    correlation_id_utf8_bytes: 512
    span_name_utf8_bytes: 512
    binary_version_utf8_bytes: 256
    provenance_hex_ascii_bytes: 128
    stable_token_ascii_bytes: 128
    payload_depth: 32
    payload_members: 8192
    payload_encoded_bytes: 1048576
    record_encoded_bytes: 4194304
  envelope:
    additional_properties: false
    fields:
      - {name: schema_version, type: uint32, required: true, const: 1, field_class: metadata, sensitivity: safe, normalization: {id: numeric-range-v1, overrides: {min: 1, max: 1}}}
      - {name: bucket_catalog_version, type: uint32, required: true, const: 1, field_class: metadata, sensitivity: safe, normalization: {id: numeric-range-v1, overrides: {min: 1, max: 1}}}
      - {name: timestamp, type: timestamp, required: true, field_class: metadata, sensitivity: safe, normalization: {id: bounded-v1, overrides: {max_utf8_bytes: 30, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\.[0-9]{1,9})?Z$'}}}
      - {name: observed_at, type: timestamp, required: false, field_class: metadata, sensitivity: safe, normalization: {id: bounded-v1, overrides: {max_utf8_bytes: 30, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\.[0-9]{1,9})?Z$'}}}
      - {name: record_id, type: string, required: true, field_class: identifier, sensitivity: internal, normalization: {id: identifier-v1, overrides: {max_utf8_bytes: 512}}}
      - {name: bucket, type: string, required: true, enum: [agent.lifecycle, ai.discovery, asset.lifecycle, asset.scan, compliance.activity, diagnostic, enforcement.action, guardrail.evaluation, model.io, network.egress, platform.health, security.finding, telemetry.ingest, tool.activity], field_class: metadata, sensitivity: safe, normalization: {id: enum-v1, overrides: {enum: [agent.lifecycle, ai.discovery, asset.lifecycle, asset.scan, compliance.activity, diagnostic, enforcement.action, guardrail.evaluation, model.io, network.egress, platform.health, security.finding, telemetry.ingest, tool.activity]}}}
      - {name: signal, type: string, required: true, enum: [logs, traces, metrics], field_class: metadata, sensitivity: safe, normalization: {id: enum-v1, overrides: {enum: [logs, traces, metrics]}}}
      - {name: event_name, type: string, required: true, semantic_ref: registry.event_or_instrument, field_class: identifier, sensitivity: safe, normalization: {id: identifier-v1, overrides: {max_utf8_bytes: 128}}}
      - {name: span_name, type: string, required: false, field_class: metadata, sensitivity: internal, normalization: {id: bounded-v1, overrides: {max_utf8_bytes: 512}}, otlp: {target: name, encoding: direct}}
      - {name: severity, type: string, required: false, enum: [INFO, LOW, MEDIUM, HIGH, CRITICAL], field_class: metadata, sensitivity: safe, normalization: {id: enum-v1, overrides: {enum: [INFO, LOW, MEDIUM, HIGH, CRITICAL]}}}
      - {name: log_level, type: string, required: false, enum: [TRACE, DEBUG, INFO, WARN, ERROR, FATAL], field_class: metadata, sensitivity: safe, normalization: {id: enum-v1, overrides: {enum: [TRACE, DEBUG, INFO, WARN, ERROR, FATAL]}}}
      - {name: source, type: string, required: true, field_class: identifier, sensitivity: safe, normalization: {id: identifier-v1, overrides: {max_utf8_bytes: 128, pattern: '^[a-z0-9][a-z0-9_.-]{0,127}$'}}}
      - {name: connector, type: string, required: false, field_class: identifier, sensitivity: internal, normalization: {id: identifier-v1, overrides: {max_utf8_bytes: 128, pattern: '^[a-z0-9][a-z0-9_.-]{0,127}$'}}}
      - {name: action, type: string, required: false, field_class: metadata, sensitivity: safe, normalization: {id: bounded-v1, overrides: {max_utf8_bytes: 128, pattern: '^[a-z0-9][a-z0-9_.-]{0,127}$'}}}
      - {name: phase, type: string, required: false, field_class: metadata, sensitivity: safe, normalization: {id: bounded-v1, overrides: {max_utf8_bytes: 128, pattern: '^[a-z0-9][a-z0-9_.-]{0,127}$'}}}
      - {name: outcome, type: string, required: false, semantic_ref: defenseclaw.outcome, field_class: metadata, sensitivity: safe, normalization: {id: enum-v1, overrides: {enum: [allowed, applied, approved, attempted, blocked, cancelled, completed, denied, failed, no_change, partial, quarantined, redacted, rejected, released, revoked, skipped, terminated, timed_out, validated]}}}
