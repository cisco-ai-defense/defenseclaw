      fields:
        - {name: code, type: string, required: true, enum: [UNSET, OK, ERROR], field_class: metadata, sensitivity: safe, normalization: {id: enum-v1, overrides: {enum: [UNSET, OK, ERROR]}}, otlp: {target: code, encoding: enum_number}}
        - {name: description, type: string, required: false, field_class: error, sensitivity: sensitive, normalization: {id: redacted-content-v1, overrides: {max_utf8_bytes: 65536, max_item_utf8_bytes: 65536, max_items: 1, max_depth: 1, max_properties: 1}}, otlp: {target: message, encoding: direct}}
    events:
      additional_properties: false
      fields:
        - {name: name, type: string, required: true, semantic_ref: registry.span_event, field_class: identifier, sensitivity: safe, normalization: {id: identifier-v1, overrides: {max_utf8_bytes: 128}}, otlp: {target: name, encoding: direct}}
        - {name: time_unix_nano, type: uint64, required: true, field_class: metadata, sensitivity: safe, normalization: {id: numeric-range-v1, overrides: {min: 1, max: 18446744073709551615}}, otlp: {target: timeUnixNano, encoding: uint64_string}}
        - {name: attributes, type: canonical_json, required: true, semantic_ref: registry.span_event_attributes, field_class: metadata, sensitivity: critical, normalization: {id: structured-content-v1, overrides: {max_utf8_bytes: 262144, max_item_utf8_bytes: 65536, max_items: 64, max_depth: 8, max_properties: 64}}, otlp: {target: attributes, encoding: key_value_array}}
        - {name: dropped_attributes_count, type: uint32, required: false, field_class: metadata, sensitivity: safe, normalization: {id: numeric-range-v1, overrides: {min: 0, max: 4294967295}}, otlp: {target: droppedAttributesCount, encoding: direct}}
    links:
      additional_properties: false
      fields:
        - {name: trace_id, type: string, required: true, semantic_format: otel-trace-id-v1, field_class: identifier, sensitivity: internal, normalization: {id: digest-v1, overrides: {max_utf8_bytes: 32, pattern: '^[0-9a-f]{32}$'}}, otlp: {target: traceId, encoding: hex}}
        - {name: span_id, type: string, required: true, semantic_format: otel-span-id-v1, field_class: identifier, sensitivity: internal, normalization: {id: digest-v1, overrides: {max_utf8_bytes: 16, pattern: '^[0-9a-f]{16}$'}}, otlp: {target: spanId, encoding: hex}}
        - {name: trace_state, type: string, required: false, semantic_format: w3c-tracestate-v1, field_class: metadata, sensitivity: internal, normalization: {id: bounded-v1, overrides: {max_utf8_bytes: 512}}, otlp: {target: traceState, encoding: direct}}
        - {name: attributes, type: canonical_json, required: true, semantic_ref: link.core, field_class: metadata, sensitivity: sensitive, normalization: {id: structured-content-v1, overrides: {max_utf8_bytes: 262144, max_item_utf8_bytes: 65536, max_items: 64, max_depth: 8, max_properties: 64}}, otlp: {target: attributes, encoding: key_value_array}}
        - {name: dropped_attributes_count, type: uint32, required: false, field_class: metadata, sensitivity: safe, normalization: {id: numeric-range-v1, overrides: {min: 0, max: 4294967295}}, otlp: {target: droppedAttributesCount, encoding: direct}}
  metric:
    instrument_data:
      additional_properties: false
      fields:
        - {name: value, type: metric_number, required: true, semantic_ref: registry.metric_value, field_class: metadata, sensitivity: safe, normalization: {id: numeric-range-v1, overrides: {min: -1.7976931348623157e+308, max: 1.7976931348623157e+308}}}
        - {name: attributes, type: canonical_json, required: true, semantic_ref: registry.metric_labels, field_class: metadata, sensitivity: internal, normalization: {id: structured-content-v1, overrides: {max_utf8_bytes: 262144, max_item_utf8_bytes: 65536, max_items: 256, max_depth: 8, max_properties: 256}}}
  canonical_to_otlp:
    id: defenseclaw-otlp-v1
    json_mapping: opentelemetry_proto_json_v1
    attribute_encoding: key_value_array
    any_value_encoding: typed_union
    any_value_mapping:
      - {canonical_type: boolean, otlp_arm: boolValue}
      - {canonical_type: int64, otlp_arm: intValue}
      - {canonical_type: uint32, otlp_arm: intValue}
      - {canonical_type: double, otlp_arm: doubleValue}
      - {canonical_type: string, otlp_arm: stringValue}
      - {canonical_type: array, otlp_arm: arrayValue}
      - {canonical_type: object, otlp_arm: kvlistValue}
    null_value_policy: reject
    object_contexts:
      envelope: ResourceSpans.scopeSpans[].spans[]
      correlation: ResourceSpans.scopeSpans[].spans[]
      trace_body: ResourceSpans.scopeSpans[].spans[]
      trace_resource: ResourceSpans.resource
      trace_scope: ResourceSpans.scopeSpans[].scope
      trace_status: ResourceSpans.scopeSpans[].spans[].status
      trace_event: ResourceSpans.scopeSpans[].spans[].events[]
      trace_link: ResourceSpans.scopeSpans[].spans[].links[]
    field_context_overrides:
      trace_resource.schema_url: ResourceSpans
      trace_scope.schema_url: ResourceSpans.scopeSpans[]
    timestamp_encoding: decimal_unix_nano_string
    id_encoding: lowercase_hex
    span_kind_mapping:
      - {canonical: INTERNAL, otlp: 1}
      - {canonical: SERVER, otlp: 2}
      - {canonical: CLIENT, otlp: 3}
      - {canonical: PRODUCER, otlp: 4}
      - {canonical: CONSUMER, otlp: 5}
    status_code_mapping:
      - {canonical: UNSET, otlp: 0}
      - {canonical: OK, otlp: 1}
      - {canonical: ERROR, otlp: 2}
    signals:
      - {signal: logs, mode: projected_record_json_string, request_root: resourceLogs}
      - {signal: traces, mode: direct_span, request_root: resourceSpans}
      - {signal: metrics, mode: sdk_aggregation_required, request_root: resourceMetrics}
normalizers:
  - id: identity-v1
    kind: identity
    default_constraints: {}
    allowed_overrides:
      - min_items
      - max_items
  - id: bounded-v1
    kind: bounded
    default_constraints:
      max_utf8_bytes: 4096
      max_item_utf8_bytes: 4096
      max_items: 256
    allowed_overrides:
      - max_utf8_bytes
      - max_item_utf8_bytes
      - min_items
      - max_items
      - pattern
  - id: enum-v1
    kind: enum
    default_constraints:
      max_utf8_bytes: 256
    allowed_overrides:
      - enum
      - max_utf8_bytes
  - id: identifier-v1
    kind: identifier
    default_constraints:
      max_utf8_bytes: 256
      pattern: '^[A-Za-z0-9][A-Za-z0-9._:/-]*$'
    allowed_overrides:
      - max_utf8_bytes
      - pattern
  - id: numeric-range-v1
    kind: numeric_range
    default_constraints: {}
    allowed_overrides:
      - min
      - max
      - min_items
      - max_items
  - id: structured-content-v1
    kind: structured_content
    default_constraints:
      max_utf8_bytes: 65536
      max_item_utf8_bytes: 4096
      max_items: 256
      max_depth: 8
      max_properties: 256
    allowed_overrides:
      - max_utf8_bytes
      - max_item_utf8_bytes
      - min_items
      - max_items
      - max_depth
      - max_properties
  - id: redacted-content-v1
    kind: redacted_content
    default_constraints:
      max_utf8_bytes: 65536
      max_item_utf8_bytes: 4096
      max_items: 256
      max_depth: 8
      max_properties: 256
    allowed_overrides:
      - max_utf8_bytes
      - max_item_utf8_bytes
      - min_items
      - max_items
      - max_depth
      - max_properties
  - id: path-v1
    kind: path
    default_constraints:
      max_utf8_bytes: 4096
    allowed_overrides:
      - max_utf8_bytes
  - id: url-v1
    kind: url
    default_constraints:
      max_utf8_bytes: 8192
    allowed_overrides:
      - max_utf8_bytes
  - id: digest-v1
    kind: digest
    default_constraints:
      max_utf8_bytes: 256
      pattern: '^[A-Za-z0-9][A-Za-z0-9:+._/-]*$'
    allowed_overrides:
      - max_utf8_bytes
      - pattern
