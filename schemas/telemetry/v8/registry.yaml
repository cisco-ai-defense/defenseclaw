conditions:
  - id: connector-known-v1
    description: The producer or adapter has a canonical connector identity.
    enforcement: {kind: builder_fact, fact: connector_known}
    false_requirement: forbidden
  - id: operation-terminal-v1
    description: The bounded operation has reached a terminal state.
    enforcement: {kind: builder_fact, fact: operation_terminal}
    false_requirement: optional
  - id: technical-failure-v1
    description: The operation ended because of a technical failure.
    enforcement: {kind: builder_fact, fact: technical_failure}
    false_requirement: optional
  - id: guardrail-terminal-decision-available-v1
    description: The guardrail producer supplied a terminal domain decision.
    enforcement: {kind: builder_fact, fact: guardrail_terminal_decision_available}
    false_requirement: forbidden
  - id: security-severity-available-v1
    description: The producer supplied or the adapter canonically normalized security severity.
    enforcement: {kind: builder_fact, fact: security_severity_available}
    false_requirement: forbidden
  - id: judge-output-parse-failed-v1
    description: The judge output could not be parsed into the registered result shape.
    enforcement: {kind: builder_fact, fact: judge_output_parse_failed}
    false_requirement: forbidden
  - id: admin-principal-known-v1
    description: The authenticated administrative principal is known.
    enforcement: {kind: builder_fact, fact: admin_principal_known}
    false_requirement: forbidden
  - id: agent-reported-cost-available-v1
    description: The connector explicitly supplied a cumulative agent/session cost in USD; reported zero is available, while an absent value is not.
    enforcement: {kind: boolean_attribute, attribute: defenseclaw.agent.reported_cost.present}
    false_requirement: forbidden
  - id: telemetry-canary-enabled-v1
    description: The producer explicitly marked this runtime-pipeline canary; absence and false both disable the canary-only attributes.
    enforcement: {kind: boolean_attribute, attribute: defenseclaw.telemetry.canary}
    false_requirement: forbidden
  - id: destination-test-failed-v1
    description: The content-free destination connectivity test reached a terminal failed result.
    enforcement: {kind: builder_fact, fact: destination_test_failed}
    false_requirement: forbidden
