version: 2

project_name: defenseclaw

builds:
  - id: defenseclaw
    main: ./cmd/defenseclaw
    binary: defenseclaw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: default
    # tar.gz everywhere except Windows, which ships .zip (the native archive
    # format Windows users and PowerShell's Expand-Archive expect). The binary
    # inside the Windows archive is defenseclaw.exe; scripts/install.ps1
    # extracts and installs it as defenseclaw-gateway.exe.
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*
      - CHANGELOG.md
      - packaging/**/*

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive
    cmd: syft

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--yes"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  disable: "true"
