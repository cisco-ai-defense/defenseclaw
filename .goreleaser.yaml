version: 2

project_name: defenseclaw

builds:
  - id: defenseclaw
    main: ./cmd/defenseclaw
    binary: defenseclaw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    hooks:
      post:
        - cmd: go run ./internal/tools/windowsresources -target {{ .Target }} -executable "{{ .Path }}" -component gateway -version {{ .Version }} -icon macos/DefenseClawMac/DefenseClawMac/Assets.xcassets/AppIcon.appiconset/icon_256.png
          output: true

  - id: defenseclaw-hook
    main: ./cmd/defenseclaw-hook
    binary: defenseclaw-hook
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w -H=windowsgui -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    hooks:
      post:
        - cmd: go run ./internal/tools/windowsresources -target {{ .Target }} -executable "{{ .Path }}" -component hook -version {{ .Version }} -icon macos/DefenseClawMac/DefenseClawMac/Assets.xcassets/AppIcon.appiconset/icon_256.png
          output: true

archives:
  - id: default
    # tar.gz everywhere except Windows, which ships .zip (the native archive
    # format Windows users and PowerShell's Expand-Archive expect). The binary
    # Windows archives contain defenseclaw.exe plus the GUI-subsystem
    # defenseclaw-hook.exe; scripts/install.ps1 installs both.
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*
      - CHANGELOG.md
      - packaging/**/*

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive
    cmd: syft

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--yes"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  disable: "true"
