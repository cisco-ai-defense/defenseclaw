# Helm overlay for the isovalent-demo Splunk OTel Collector release.
#
# The secondary Splunk Observability token is stored in the existing
# splunk-otel-collector secret under:
#   splunk_observability_access_token_secondary
#
# This overlay intentionally references the secret key instead of storing the
# token in Helm release values.
secret:
  create: false
  name: splunk-otel-collector
  validateSecret: true

splunkObservability:
  accessToken: ""

gateway:
  extraEnvs:
    - name: SPLUNK_OBSERVABILITY_ACCESS_TOKEN_SECONDARY
      valueFrom:
        secretKeyRef:
          name: splunk-otel-collector
          key: splunk_observability_access_token_secondary
  config:
    exporters:
      otlphttp/secondary:
        headers:
          X-SF-TOKEN: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN_SECONDARY}
        metrics_endpoint: https://ingest.us1.signalfx.com/v2/datapoint/otlp
        sending_queue:
          num_consumers: 32
        traces_endpoint: https://ingest.us1.signalfx.com/v2/trace/otlp
      otlphttp/entities_secondary:
        headers:
          X-SF-TOKEN: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN_SECONDARY}
        logs_endpoint: https://ingest.us1.signalfx.com/v3/event
      signalfx/secondary:
        access_token: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN_SECONDARY}
        api_url: https://api.us1.signalfx.com
        ingest_url: https://ingest.us1.signalfx.com
        sending_queue:
          num_consumers: 32
      splunk_hec/o11y_secondary:
        disable_compression: true
        endpoint: https://ingest.us1.signalfx.com/v1/log
        log_data_enabled: false
        profiling_data_enabled: true
        sending_queue:
          num_consumers: 32
        token: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN_SECONDARY}
    service:
      pipelines:
        logs:
          exporters:
            - splunk_hec/o11y
            - splunk_hec/o11y_secondary
        logs/entities:
          exporters:
            - otlphttp/entities
            - otlphttp/entities_secondary
        metrics:
          exporters:
            - signalfx
            - signalfx/secondary
        metrics/collector:
          exporters:
            - signalfx
            - signalfx/secondary
        traces:
          exporters:
            - otlphttp
            - signalfx
            - otlphttp/secondary
            - signalfx/secondary

agent:
  extraEnvs:
    - name: SPLUNK_OBSERVABILITY_ACCESS_TOKEN_SECONDARY
      valueFrom:
        secretKeyRef:
          name: splunk-otel-collector
          key: splunk_observability_access_token_secondary
  config:
    exporters:
      signalfx/histograms_secondary:
        access_token: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN_SECONDARY}
        api_url: https://api.us1.signalfx.com
        ingest_url: https://ingest.us1.signalfx.com
        send_otlp_histograms: true
      signalfx/host_metadata_secondary:
        access_token: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN_SECONDARY}
        api_url: https://api.us1.signalfx.com
        correlation: null
        exclude_metrics:
          - metric_name: "**"
        ingest_url: https://ingest.us1.signalfx.com
        root_path: /hostfs
        sync_host_metadata: true
    service:
      pipelines:
        metrics:
          exporters:
            - otlp
            - signalfx/host_metadata
            - signalfx/host_metadata_secondary
        metrics/histograms:
          exporters:
            - signalfx/histograms
            - signalfx/histograms_secondary

clusterReceiver:
  extraEnvs:
    - name: SPLUNK_DBMON_POSTGRES_ENDPOINT
      value: streaming-postgres.streaming-service-app.svc.cluster.local:5432
    - name: SPLUNK_DBMON_EVENT_ENDPOINT
      value: https://ingest.us1.signalfx.com/v3/event
    - name: SPLUNK_DBMON_POSTGRES_USERNAME
      valueFrom:
        secretKeyRef:
          name: streaming-postgres-dbmon
          key: username
    - name: SPLUNK_DBMON_POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: streaming-postgres-dbmon
          key: password
    - name: SPLUNK_DBMON_ACCESS_TOKEN
      valueFrom:
        secretKeyRef:
          name: streaming-postgres-dbmon
          key: access-token
    - name: SPLUNK_OBSERVABILITY_ACCESS_TOKEN_SECONDARY
      valueFrom:
        secretKeyRef:
          name: splunk-otel-collector
          key: splunk_observability_access_token_secondary
  config:
    exporters:
      otlphttp/dbmon_secondary:
        headers:
          X-SF-Token: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN_SECONDARY}
          X-splunk-instrumentation-library: dbmon
        logs_endpoint: ${env:SPLUNK_DBMON_EVENT_ENDPOINT}
        sending_queue:
          batch:
            flush_timeout: 15s
            max_size: 10485760
            sizer: bytes
      signalfx/secondary:
        access_token: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN_SECONDARY}
        api_url: https://api.us1.signalfx.com
        disable_default_translation_rules: true
        ingest_url: https://ingest.us1.signalfx.com
        timeout: 10s
      signalfx/histograms_secondary:
        access_token: ${SPLUNK_OBSERVABILITY_ACCESS_TOKEN_SECONDARY}
        api_url: https://api.us1.signalfx.com
        disable_default_translation_rules: true
        ingest_url: https://ingest.us1.signalfx.com
        send_otlp_histograms: true
        timeout: 10s
    service:
      pipelines:
        logs/dbmon:
          exporters:
            - otlphttp/dbmon
            - otlphttp/dbmon_secondary
        metrics:
          exporters:
            - signalfx
            - signalfx/secondary
        metrics/collector:
          exporters:
            - signalfx
            - signalfx/secondary
        metrics/dbmon:
          exporters:
            - signalfx
            - signalfx/secondary
        metrics/histograms:
          exporters:
            - signalfx/histograms
            - signalfx/histograms_secondary
