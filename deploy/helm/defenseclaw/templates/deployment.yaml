apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "defenseclaw.fullname" . }}
  labels:
    {{- include "defenseclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "defenseclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ .Values.configYaml | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app: {{ include "defenseclaw.name" . }}
        {{- include "defenseclaw.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: defenseclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            {{- range .Values.envFromSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          ports:
            - name: api
              containerPort: 18970
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: api
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: api
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - mountPath: /home/node/.defenseclaw
              name: defenseclaw-data
            - mountPath: /home/node/.defenseclaw/config.yaml
              name: defenseclaw-config
              readOnly: true
              subPath: config.yaml
            - mountPath: /tmp
              name: tmp
      volumes:
        - name: defenseclaw-data
          {{- if .Values.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "defenseclaw.fullname" . }}-data
          {{- end }}
        - name: defenseclaw-config
          configMap:
            name: {{ include "defenseclaw.fullname" . }}-config
        - name: tmp
          emptyDir: {}
