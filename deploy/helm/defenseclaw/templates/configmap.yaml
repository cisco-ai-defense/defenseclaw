apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "defenseclaw.fullname" . }}-config
  labels:
    {{- include "defenseclaw.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- .Values.configYaml | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "defenseclaw.fullname" . }}-client-config
  labels:
    {{- include "defenseclaw.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- .Values.clientConfigYaml | nindent 4 }}
