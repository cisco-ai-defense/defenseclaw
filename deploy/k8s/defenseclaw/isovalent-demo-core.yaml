apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/name: agent-control
  name: agent-control-postgres
  namespace: defenesclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: database
      app.kubernetes.io/name: agent-control
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: database
        app.kubernetes.io/name: agent-control
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 70
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: agent_control
            - name: POSTGRES_USER
              value: agent_control
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent-control-secrets
                  key: AGENT_CONTROL_POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U agent_control -d agent_control
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U agent_control -d agent_control
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 70
            runAsNonRoot: true
            runAsUser: 70
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: agent-control-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/name: agent-control
  name: agent-control-postgres
  namespace: defenesclaw
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: database
