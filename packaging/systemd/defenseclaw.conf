# DefenseClaw managed-enterprise filesystem layout.
# Install with:
#   install -D -m 0644 packaging/systemd/defenseclaw.conf /usr/lib/tmpfiles.d/defenseclaw.conf
#   systemd-tmpfiles --create defenseclaw.conf

d /etc/defenseclaw 0750 root defenseclaw -
d /etc/defenseclaw/hook-guardian 0750 root defenseclaw -
d /opt/defenseclaw 0755 root root -
d /opt/defenseclaw/bin 0755 root root -
d /var/lib/defenseclaw 0750 defenseclaw defenseclaw -
d /var/lib/defenseclaw-hook-guardian 0755 root root -
d /var/log/defenseclaw 0750 defenseclaw defenseclaw -
d /run/defenseclaw 0750 defenseclaw defenseclaw -
