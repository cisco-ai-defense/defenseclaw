name: E2E - DGX Spark

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: [self-hosted, dgx-spark]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - name: Build
        run: make build-linux-arm64
      - name: Setup scanners
        run: bash scripts/setup-scanners.sh
      - name: Run E2E
        run: bash scripts/test-e2e-spark.sh
