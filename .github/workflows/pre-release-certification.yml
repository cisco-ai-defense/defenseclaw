name: Release candidate smoke

# release.yaml builds and signs one sealed candidate. This reusable workflow
# exercises those exact bytes in the same dispatch before publication.
on:
  workflow_call:
    inputs:
      candidate_artifact:
        description: Immutable Actions artifact containing release-candidate/.
        required: true
        type: string
      version:
        description: Canonical release version.
        required: true
        type: string
      commit:
        description: Exact reviewed source commit bound into the candidate.
        required: true
        type: string
      baselines:
        description: Authenticated published versions to upgrade from.
        required: true
        type: string

permissions:
  contents: read
  actions: read

env:
  UPGRADE_BASELINE_POLICY: ${{ github.workspace }}/release-candidate/effective-upgrade-baselines.json

jobs:
  posix-fresh-install:
    name: Fresh install exact candidate (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-amd64
            runner_arch: X64
          - runner: macos-15
            platform: darwin-arm64
            runner_arch: ARM64
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ inputs.commit }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
        with:
          cosign-release: "v2.6.2"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.candidate_artifact }}
          path: release-candidate
      - name: Verify and install exact signed bytes
        env:
          RELEASE_TAG: ${{ inputs.version }}
          RELEASE_COMMIT: ${{ inputs.commit }}
        run: |
          set -euo pipefail
          test "$RUNNER_ARCH" = "${{ matrix.runner_arch }}"
          python3 scripts/release_candidate.py verify \
            --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"
          python3 scripts/verify-sigstore-blob.py \
            --certificate release-candidate/dist/checksums.txt.pem \
            --signature release-candidate/dist/checksums.txt.sig \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            release-candidate/dist/checksums.txt
          bash scripts/test-fresh-install-release.sh \
            "$GITHUB_WORKSPACE/release-candidate/dist" "$RELEASE_TAG"

  posix-upgrade:
    name: Upgrade ${{ matrix.baseline }} → ${{ inputs.version }} (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        baseline: ${{ fromJSON(inputs.baselines) }}
        platform:
          - runner: ubuntu-latest
            name: linux-amd64
            runner_arch: X64
          - runner: macos-15
            name: darwin-arm64
            runner_arch: ARM64
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ inputs.commit }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
        with:
          cosign-release: "v2.6.2"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.candidate_artifact }}
          path: release-candidate
      - name: Exercise authenticated upgrade baseline
        env:
          BASELINE: ${{ matrix.baseline }}
          RELEASE_TAG: ${{ inputs.version }}
          RELEASE_COMMIT: ${{ inputs.commit }}
          UPGRADE_SMOKE_SKIP_SOURCE_CONTRACTS: "1"
          # The newest authenticated source also exercises the two field
          # states that stranded real 0.8.6 hosts: a missing hard-cut cursor
          # and an explicitly recovered corrupt local audit store.
          UPGRADE_SMOKE_FIELD_RECOVERY_CASES: ${{ matrix.baseline == fromJSON(inputs.baselines)[0] && '1' || '0' }}
        run: |
          set -euo pipefail
          test "$RUNNER_ARCH" = "${{ matrix.platform.runner_arch }}"
          python3 scripts/release_candidate.py verify \
            --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"
          python3 scripts/verify-sigstore-blob.py \
            --certificate release-candidate/dist/checksums.txt.pem \
            --signature release-candidate/dist/checksums.txt.sig \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            release-candidate/dist/checksums.txt
          baseline_dependencies=published
          # The 0.8.4 boundary deliberately starts with dependency drift. The
          # resolver must transactionally normalize it before the 0.8.5 cut.
          if [[ "$BASELINE" == "0.8.4" ]]; then
            baseline_dependencies=target
          fi
          bash scripts/test-upgrade-protocol-release.sh \
            --from-version "$BASELINE" \
            --target-version "$RELEASE_TAG" \
            --release-dir "$GITHUB_WORKSPACE/release-candidate/dist" \
            --baseline-mode seed \
            --baseline-dependencies "$baseline_dependencies" \
            --success-path-only \
            --health-timeout 60

  windows-fresh-install:
    name: Fresh install exact candidate (windows-amd64)
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ inputs.commit }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
        with:
          cosign-release: "v2.6.2"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.candidate_artifact }}
          path: release-candidate
      - name: Verify and exercise install.ps1
        env:
          RELEASE_TAG: ${{ inputs.version }}
          RELEASE_COMMIT: ${{ inputs.commit }}
        run: |
          python scripts/release_candidate.py verify `
            --root release-candidate --version "$env:RELEASE_TAG" --commit "$env:RELEASE_COMMIT"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python scripts/verify-sigstore-blob.py `
            --certificate release-candidate/dist/checksums.txt.pem `
            --signature release-candidate/dist/checksums.txt.sig `
            --certificate-identity "https://github.com/$env:GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" `
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" `
            release-candidate/dist/checksums.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./scripts/test-fresh-install-release-windows.ps1 `
            -ReleaseDir "$env:GITHUB_WORKSPACE/release-candidate/dist" `
            -TargetVersion "$env:RELEASE_TAG" `
            -DiagnosticsRoot (Join-Path $env:RUNNER_TEMP 'defenseclaw-release-bootstrap-diagnostics')
      - name: Upload Windows bootstrap diagnostics on failure
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-windows-bootstrap-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/defenseclaw-release-bootstrap-diagnostics/**
          if-no-files-found: warn
          retention-days: 7
