# Deterministic, fork-safe native Windows x64 certification.
#
# Branch protection must require the exact aggregate check name:
#   Windows Native Required
#
# Real provider-secret Codex/Claude tests remain in connector-live-e2e.yml and
# are workflow_dispatch-only. They are regression radar, not a merge gate.

name: Windows Native CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-native-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

jobs:
  windows-go:
    name: Windows x64 Go suite
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Initialize isolated paths
        run: |
          $stateBase = Join-Path $env:USERPROFILE '.dc-ci'
          $stateRoot = Join-Path $stateBase 'go'
          if ($stateRoot.Length -gt 48) { throw "DC_STATE_ROOT exceeds native build path budget: $stateRoot" }
          "DC_WINDOWS_NATIVE_BASE_ROOT=$stateBase" >> $env:GITHUB_ENV
          "DC_STATE_ROOT=$stateRoot" >> $env:GITHUB_ENV
          "DC_DIAGNOSTICS=$(Join-Path $env:RUNNER_TEMP 'windows-native-diagnostics-go')" >> $env:GITHUB_ENV
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run native Windows Go DACL regressions explicitly
        run: |
          . ./scripts/windows-native-ci.ps1 -NoRun
          Initialize-WindowsNativeTestEnvironment $env:DC_STATE_ROOT | Out-Null
          $go = (Get-Command go.exe -ErrorAction Stop).Source
          $daclTests = @(
            'TestWriteWindowsRemovesInheritedUnauthorizedWriter',
            'TestWriteWindowsPreservesStricterExistingDACL',
            'TestWindowsWriteLikeAccess',
            'TestWindowsTrustedOwner',
            'TestRejectUntrustedWindowsWriteACEs',
            'TestHookAPITokenWindowsRejectsUntrustedDirectoryACL',
            'TestHookAPITokenWindowsAllowsReadOnlyUnsupportedAllowACE',
            'TestHookAPITokenWindowsAllowsInheritOnlyCreatorOwnerTemplate',
            'TestHookAPITokenWindowsAllowsOwnerRightsACE',
            'TestHookAPITokenWindowsRejectsDirectCreatorOwnerACE',
            'TestHookAPITokenWindowsAllowsCreateChildOnSharedAncestor',
            'TestHookAPITokenWindowsRejectsOrdinaryWriteOnSharedAncestor',
            'TestHookAPITokenWindowsRejectsWritableAncestorThroughPublicOperations',
            'TestHookAPITokenWindowsAllowsInheritOnlyTemplateOnSharedAncestor',
            'TestHookAPITokenWindowsRejectsDeleteChildOnSharedAncestor',
            'TestLoadOTLPPathTokenWindowsRejectsWritableAncestor',
            'TestLoadOTLPPathTokenWindowsAllowsCreateChildOnSharedAncestor'
          )
          $daclTestPattern = '^(' + ($daclTests -join '|') + ')$'
          Invoke-WindowsNativeProcess $go @('test', '-v', '-count=1', '-run', $daclTestPattern, './internal/safefile', './internal/managed', './internal/gateway/connector') -TimeoutSeconds 600 -LogPath (Join-Path $env:DC_STATE_ROOT 'go-dacl-test.log') | Out-Null
      - name: Full native Windows Go test, vet, and build
        run: |
          . ./scripts/windows-native-ci.ps1 -NoRun
          Initialize-WindowsNativeTestEnvironment $env:DC_STATE_ROOT | Out-Null
          $go = (Get-Command go.exe -ErrorAction Stop).Source
          # These tests contain POSIX mode-bit/script assertions that native
          # Windows does not use. Equivalent token validation, reparse-point,
          # private-DACL, and supported-connector coverage runs in this job.
          $windowsInapplicable = '^(' + (@(
            'TestAtomicWriteFile_PreservesSymlinkedDotfile',
            'TestOpenHandsHookScript_BlockExitsTwo',
            'TestLoadOTLPPathToken_RejectsUnsafeFiles'
          ) -join '|') + ')$'
          # Keep package execution serial on the four-core hosted runner so
          # bounded discovery tests are not starved by concurrent packages.
          Invoke-WindowsNativeProcess $go @('test', '-count=1', '-p=1', '-skip', $windowsInapplicable, './...') -TimeoutSeconds 2100 -LogPath (Join-Path $env:DC_STATE_ROOT 'go-test.log') | Out-Null
          Invoke-WindowsNativeProcess $go @('vet', './...') -TimeoutSeconds 900 -LogPath (Join-Path $env:DC_STATE_ROOT 'go-vet.log') | Out-Null
          $bin = Join-Path $env:DC_STATE_ROOT 'bin'
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          $env:CGO_ENABLED = '0'
          Invoke-WindowsNativeProcess $go @('build', '-o', (Join-Path $bin 'defenseclaw-gateway.exe'), './cmd/defenseclaw') -TimeoutSeconds 900 -LogPath (Join-Path $env:DC_STATE_ROOT 'go-build-gateway.log') | Out-Null
          Invoke-WindowsNativeProcess $go @('build', '-ldflags', '-H=windowsgui', '-o', (Join-Path $bin 'defenseclaw-hook.exe'), './cmd/defenseclaw-hook') -TimeoutSeconds 900 -LogPath (Join-Path $env:DC_STATE_ROOT 'go-build-hook.log') | Out-Null
      - name: Capture bounded diagnostics
        if: ${{ failure() || cancelled() }}
        run: ./scripts/windows-native-ci.ps1 -Operation capture -StateRoot $env:DC_STATE_ROOT -DiagnosticsRoot $env:DC_DIAGNOSTICS
      - name: Upload diagnostics on failure
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-native-go-diagnostics
          path: ${{ env.DC_DIAGNOSTICS }}\**
          if-no-files-found: ignore
          retention-days: 5
      - name: Always clean isolated processes, listeners, and temp state
        if: ${{ always() }}
        run: ./scripts/windows-native-ci.ps1 -Operation cleanup -StateRoot $env:DC_STATE_ROOT

  windows-python:
    name: Windows complete Python suite (includes TUI) / shard ${{ matrix.shard }}
    runs-on: windows-latest
    timeout-minutes: 75
    env:
      PYTHON_SHARD: ${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Initialize isolated paths
        run: |
          $stateBase = Join-Path $env:USERPROFILE '.dc-ci'
          $stateRoot = Join-Path $stateBase ('py-' + $env:PYTHON_SHARD)
          if ($stateRoot.Length -gt 48) { throw "DC_STATE_ROOT exceeds native build path budget: $stateRoot" }
          "DC_WINDOWS_NATIVE_BASE_ROOT=$stateBase" >> $env:GITHUB_ENV
          "DC_STATE_ROOT=$stateRoot" >> $env:GITHUB_ENV
          "DC_DIAGNOSTICS=$(Join-Path $env:RUNNER_TEMP ('windows-native-diagnostics-python-' + $env:PYTHON_SHARD))" >> $env:GITHUB_ENV
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync locked Python environment
        run: uv sync --frozen --python 3.12
      - name: Stage packaged runtime data with PowerShell
        run: ./scripts/windows-native-ci.ps1 -Operation stage-package-data
      - name: Validate registered Windows Codex and Claude hook commands
        if: ${{ matrix.shard == 1 }}
        run: |
          . ./scripts/windows-native-ci.ps1 -NoRun
          Initialize-WindowsNativeTestEnvironment $env:DC_STATE_ROOT | Out-Null
          $uv = (Get-Command uv.exe -ErrorAction Stop).Source
          Invoke-WindowsNativeProcess $uv @('run', '--frozen', 'python', '-m', 'pytest', 'cli/tests/test_cmd_doctor_windows_hooks.py', '-q') -TimeoutSeconds 300 -LogPath (Join-Path $env:DC_STATE_ROOT 'pytest-doctor-windows-hooks.log') | Out-Null
      - name: Run native Windows Local Splunk certification regressions
        if: ${{ matrix.shard == 1 }}
        run: |
          . ./scripts/windows-native-ci.ps1 -NoRun
          Initialize-WindowsNativeTestEnvironment $env:DC_STATE_ROOT | Out-Null
          $uv = (Get-Command uv.exe -ErrorAction Stop).Source
          Invoke-WindowsNativeProcess $uv @('run', '--frozen', 'python', '-m', 'pytest', 'cli/tests/test_local_splunk_controller.py', 'cli/tests/test_local_splunk_transaction.py', 'cli/tests/test_local_splunk_packaging.py', 'cli/tests/test_windows_local_observability_gates.py', '-q') -TimeoutSeconds 900 -LogPath (Join-Path $env:DC_STATE_ROOT 'pytest-local-splunk.log') | Out-Null
      - name: Run Python test shard ${{ matrix.shard }} of 4, including headless TUI tests
        run: |
          . ./scripts/windows-native-ci.ps1 -NoRun
          Initialize-WindowsNativeTestEnvironment $env:DC_STATE_ROOT | Out-Null
          $uv = (Get-Command uv.exe -ErrorAction Stop).Source
          $testFiles = @(Get-ChildItem cli/tests -Recurse -File -Filter 'test_*.py' | Sort-Object FullName)
          $shardIndex = [int]$env:PYTHON_SHARD - 1
          $shardFiles = @(
            for ($index = 0; $index -lt $testFiles.Count; $index++) {
              if (($index % 4) -eq $shardIndex) {
                $testFiles[$index].FullName
              }
            }
          )
          if (-not $shardFiles) {
            throw "Python test shard $($shardIndex + 1) selected no files"
          }
          # These assertions exercise the POSIX-only OpenShell ownership path
          # (pwd, root-owned mkdir/chown, and Linux sandbox users). Symlink
          # capability alone is not enough to make that product path native to
          # Windows, so keep the exact nodes in Linux CI and omit them here.
          $windowsInapplicableTests = @(
            '--deselect=cli/tests/test_cmd_setup_sandbox.py::TestTrustedPrivilegedCommands::test_existing_openclaw_integration_requires_pin',
            '--deselect=cli/tests/test_remediation_setup_sandbox.py::TestSandboxInitIdempotentPin::test_f0162_refuses_swapped_symlink',
            '--deselect=cli/tests/test_remediation_setup_sandbox.py::TestInitSandboxChownTOCTOU::test_f0421_rechecks_pinned_home_before_chown',
            # Windows os.readlink returns the preserved absolute target with
            # an equivalent \\?\ prefix, so this raw POSIX string assertion
            # remains covered by the Linux suite.
            '--deselect=cli/tests/test_migrations.py::TestMigrate050PurgeLegacyFlatPolicyBundle::test_symlinked_flat_data_json_is_left_alone'
          )
          $pytestArgs = @('run', '--frozen', 'python', '-m', 'pytest') + $shardFiles + $windowsInapplicableTests + @('-q')
          Invoke-WindowsNativeProcess $uv $pytestArgs -TimeoutSeconds 4200 -LogPath (Join-Path $env:DC_STATE_ROOT ('pytest-shard-{0}.log' -f $env:PYTHON_SHARD)) | Out-Null
      - name: Capture bounded diagnostics
        if: ${{ failure() || cancelled() }}
        run: ./scripts/windows-native-ci.ps1 -Operation capture -StateRoot $env:DC_STATE_ROOT -DiagnosticsRoot $env:DC_DIAGNOSTICS
      - name: Upload diagnostics on failure
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-native-python-diagnostics-${{ matrix.shard }}
          path: ${{ env.DC_DIAGNOSTICS }}\**
          if-no-files-found: ignore
          retention-days: 5
      - name: Always clean isolated processes, listeners, and temp state
        if: ${{ always() }}
        run: ./scripts/windows-native-ci.ps1 -Operation cleanup -StateRoot $env:DC_STATE_ROOT

  powershell-static:
    name: Windows PowerShell harness validation
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Initialize isolated paths
        run: |
          $stateBase = Join-Path $env:USERPROFILE '.dc-ci'
          $stateRoot = Join-Path $stateBase 'ps'
          if ($stateRoot.Length -gt 48) { throw "DC_STATE_ROOT exceeds native build path budget: $stateRoot" }
          "DC_WINDOWS_NATIVE_BASE_ROOT=$stateBase" >> $env:GITHUB_ENV
          "DC_STATE_ROOT=$stateRoot" >> $env:GITHUB_ENV
          "DC_DIAGNOSTICS=$(Join-Path $env:RUNNER_TEMP 'windows-native-diagnostics-powershell')" >> $env:GITHUB_ENV
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Parse every PowerShell script
        run: |
          $failures = [Collections.Generic.List[string]]::new()
          Get-ChildItem scripts -Recurse -Filter '*.ps1' | ForEach-Object {
            $tokens = $null
            $errors = $null
            [Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            foreach ($error in @($errors)) { $failures.Add("$($_.FullName): $error") }
          }
          if ($failures.Count) { throw ($failures -join "`n") }
      - name: Parser, mock timeout, redaction, isolation, and workflow contracts
        run: ./scripts/live-connector-e2e/test-windows.ps1
      - name: Capture bounded diagnostics
        if: ${{ failure() || cancelled() }}
        run: ./scripts/windows-native-ci.ps1 -Operation capture -StateRoot $env:DC_STATE_ROOT -DiagnosticsRoot $env:DC_DIAGNOSTICS
      - name: Upload diagnostics on failure
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-native-powershell-diagnostics
          path: ${{ env.DC_DIAGNOSTICS }}\**
          if-no-files-found: ignore
          retention-days: 5
      - name: Always clean isolated processes, listeners, and temp state
        if: ${{ always() }}
        run: ./scripts/windows-native-ci.ps1 -Operation cleanup -StateRoot $env:DC_STATE_ROOT

  package-artifact:
    name: Windows packaged artifact build
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Initialize isolated paths
        run: |
          $stateBase = Join-Path $env:USERPROFILE '.dc-ci'
          $stateRoot = Join-Path $stateBase 'pkg'
          if ($stateRoot.Length -gt 48) { throw "DC_STATE_ROOT exceeds native build path budget: $stateRoot" }
          "DC_WINDOWS_NATIVE_BASE_ROOT=$stateBase" >> $env:GITHUB_ENV
          "DC_STATE_ROOT=$stateRoot" >> $env:GITHUB_ENV
          "DC_ARTIFACT_ROOT=$(Join-Path $env:RUNNER_TEMP 'windows-native-dist')" >> $env:GITHUB_ENV
          "DC_DIAGNOSTICS=$(Join-Path $env:RUNNER_TEMP 'windows-native-diagnostics-package')" >> $env:GITHUB_ENV
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Build release-shaped Windows x64 zip and Python wheel
        run: ./scripts/windows-native-ci.ps1 -Operation build-artifacts -StateRoot $env:DC_STATE_ROOT -ArtifactRoot $env:DC_ARTIFACT_ROOT
      - name: Build unsigned native Windows setup executable
        run: ./scripts/windows-native-ci.ps1 -Operation build-installer -StateRoot $env:DC_STATE_ROOT -ArtifactRoot $env:DC_ARTIFACT_ROOT
      - name: Verify native setup wizard responsiveness
        run: ./scripts/test-windows-setup-wizard.ps1 -SetupPath (Join-Path $env:DC_ARTIFACT_ROOT 'DefenseClawSetup-x64.exe') -StateRoot (Join-Path $env:DC_STATE_ROOT 'wizard-smoke')
      - name: Upload packaged artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-native-package
          path: ${{ env.DC_ARTIFACT_ROOT }}\*
          if-no-files-found: error
          retention-days: 3
      - name: Capture bounded diagnostics
        if: ${{ failure() || cancelled() }}
        run: ./scripts/windows-native-ci.ps1 -Operation capture -StateRoot $env:DC_STATE_ROOT -DiagnosticsRoot $env:DC_DIAGNOSTICS
      - name: Upload diagnostics on failure
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-native-package-diagnostics
          path: ${{ env.DC_DIAGNOSTICS }}\**
          if-no-files-found: ignore
          retention-days: 5
      - name: Always clean isolated processes, listeners, and temp state
        if: ${{ always() }}
        run: ./scripts/windows-native-ci.ps1 -Operation cleanup -StateRoot $env:DC_STATE_ROOT

  packaged-acceptance:
    name: Windows packaged install and lifecycle acceptance
    needs: package-artifact
    runs-on: windows-latest
    timeout-minutes: 55
    steps:
      - name: Initialize isolated paths
        run: |
          $stateBase = Join-Path $env:USERPROFILE '.dc-ci'
          $stateRoot = Join-Path $stateBase 'acc'
          if ($stateRoot.Length -gt 48) { throw "DC_STATE_ROOT exceeds native build path budget: $stateRoot" }
          "DC_WINDOWS_NATIVE_BASE_ROOT=$stateBase" >> $env:GITHUB_ENV
          "DC_STATE_ROOT=$stateRoot" >> $env:GITHUB_ENV
          "DC_ARTIFACT_ROOT=$(Join-Path $env:RUNNER_TEMP 'windows-native-dist')" >> $env:GITHUB_ENV
          "DC_DIAGNOSTICS=$(Join-Path $env:RUNNER_TEMP 'windows-native-diagnostics-acceptance')" >> $env:GITHUB_ENV
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: windows-native-package
          path: ${{ env.DC_ARTIFACT_ROOT }}
      - name: Fresh isolated install, smoke, lifecycle, reset, uninstall, and reinstall
        run: ./scripts/windows-native-ci.ps1 -Operation acceptance -StateRoot $env:DC_STATE_ROOT -ArtifactRoot $env:DC_ARTIFACT_ROOT
      - name: Native setup EXE isolated install, repair, and uninstall smoke
        run: ./scripts/windows-native-ci.ps1 -Operation setup-acceptance -StateRoot $env:DC_STATE_ROOT -ArtifactRoot $env:DC_ARTIFACT_ROOT
      - name: Capture bounded redacted diagnostics
        if: ${{ failure() || cancelled() }}
        run: ./scripts/windows-native-ci.ps1 -Operation capture -StateRoot $env:DC_STATE_ROOT -DiagnosticsRoot $env:DC_DIAGNOSTICS
      - name: Upload diagnostics on failure
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-native-acceptance-diagnostics
          path: ${{ env.DC_DIAGNOSTICS }}\**
          if-no-files-found: ignore
          retention-days: 5
      - name: Always clean isolated processes, listeners, and temp state
        if: ${{ always() }}
        run: ./scripts/windows-native-ci.ps1 -Operation cleanup -StateRoot $env:DC_STATE_ROOT

  connector-contract:
    name: Windows x64 connector contract / ${{ matrix.connector }}
    needs: [powershell-static, package-artifact]
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      CONNECTOR: ${{ matrix.connector }}
    strategy:
      fail-fast: false
      matrix:
        connector: [codex, claudecode]
    steps:
      - name: Initialize isolated paths
        run: |
          $stateBase = Join-Path $env:USERPROFILE '.dc-ci'
          $stateRoot = Join-Path $stateBase ('ct-' + $env:CONNECTOR)
          if ($stateRoot.Length -gt 48) { throw "DC_STATE_ROOT exceeds native build path budget: $stateRoot" }
          "DC_WINDOWS_NATIVE_BASE_ROOT=$stateBase" >> $env:GITHUB_ENV
          "DC_STATE_ROOT=$stateRoot" >> $env:GITHUB_ENV
          "DC_ARTIFACT_ROOT=$(Join-Path $env:RUNNER_TEMP 'windows-native-dist')" >> $env:GITHUB_ENV
          "DC_DIAGNOSTICS=$(Join-Path $env:RUNNER_TEMP ('windows-native-diagnostics-' + $env:CONNECTOR))" >> $env:GITHUB_ENV
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: windows-native-package
          path: ${{ env.DC_ARTIFACT_ROOT }}
      - name: Required setup, allow/block, audit, telemetry, timeout, and teardown contract
        run: ./scripts/windows-native-ci.ps1 -Operation contract -Connector $env:CONNECTOR -StateRoot $env:DC_STATE_ROOT -ArtifactRoot $env:DC_ARTIFACT_ROOT
      - name: Upload deterministic contract results
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-native-contract-results-${{ matrix.connector }}
          path: ${{ env.DC_STATE_ROOT }}\results.jsonl
          if-no-files-found: warn
          retention-days: 5
      - name: Capture bounded redacted diagnostics
        if: ${{ failure() || cancelled() }}
        run: ./scripts/windows-native-ci.ps1 -Operation capture -StateRoot $env:DC_STATE_ROOT -DiagnosticsRoot $env:DC_DIAGNOSTICS
      - name: Upload diagnostics on failure
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-native-contract-diagnostics-${{ matrix.connector }}
          path: ${{ env.DC_DIAGNOSTICS }}\**
          if-no-files-found: ignore
          retention-days: 5
      - name: Always clean isolated processes, listeners, and temp state
        if: ${{ always() }}
        run: ./scripts/windows-native-ci.ps1 -Operation cleanup -StateRoot $env:DC_STATE_ROOT

  windows-native-required:
    name: Windows Native Required
    if: ${{ always() }}
    needs:
      - windows-go
      - windows-python
      - powershell-static
      - package-artifact
      - packaged-acceptance
      - connector-contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      REQUIRED_RESULTS: ${{ toJSON(needs) }}
    steps:
      - name: Fail unless every deterministic Windows job succeeded
        run: |
          $results = $env:REQUIRED_RESULTS | ConvertFrom-Json
          $failed = @($results.PSObject.Properties | Where-Object { $_.Value.result -ne 'success' })
          if ($failed.Count) {
            $summary = $failed | ForEach-Object { "$($_.Name)=$($_.Value.result)" }
            throw "Required Windows certification did not succeed: $($summary -join ', ')"
          }
          Write-Host 'Every deterministic native Windows x64 certification job succeeded.'
