name: Release

# Releases are deliberately manual. All candidate assets are built while no
# remote release tag exists, sealed into one immutable Actions artifact, and
# exercised by native upgrade gates before the protected publish job runs.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (X.Y.Z, no v prefix). Tag must not already exist."
        required: true
        type: string
      immutable_releases_confirmed:
        description: "Confirm repository release immutability is enabled in Settings."
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: Validate release provenance
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      commit: ${{ steps.provenance.outputs.commit }}
      baselines: ${{ steps.baselines.outputs.baselines }}
      windows_baselines: ${{ steps.baselines.outputs.windows_baselines }}
      previous_baseline: ${{ steps.baselines.outputs.previous_baseline }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require reviewed macOS app source
        # A DefenseClaw release must build the macOS source that was reviewed
        # and merged with this exact main commit. Upstream freshness is tracked
        # independently by macos-upstream.yml and must not make an unrelated
        # product release fail after its PR checks have already passed.
        run: python3 scripts/check-macos-upstream.py --offline

      - name: Require immutable GitHub releases
        env:
          IMMUTABLE_RELEASES_CONFIRMED: ${{ inputs.immutable_releases_confirmed }}
        run: |
          set -euo pipefail
          # GitHub's immutable-release settings endpoint requires repository
          # Administration: read, which is not available to GITHUB_TOKEN. Keep
          # this preflight fail-closed without introducing an administrator PAT;
          # the publish job separately proves the resulting release is immutable.
          if [[ "$IMMUTABLE_RELEASES_CONFIRMED" != "true" ]]; then
            echo "::error title=Immutable Releases confirmation required::Verify repository release immutability in Settings, then confirm it when dispatching the workflow."
            exit 1
          fi

      - name: Resolve and validate target version
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          TAG="$RELEASE_VERSION_INPUT"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error title=Invalid version input::version must be X.Y.Z with no v prefix (got: '$TAG')"
            exit 1
          fi
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "::error title=Tag already exists::Tag '$TAG' already exists locally."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error title=Tag already exists on remote::Tag '$TAG' already exists on origin."
            exit 1
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error title=Release already exists::A draft or published release for '$TAG' already exists."
            exit 1
          fi
          gh api --paginate --slurp \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            > published-releases.json
          python3 scripts/release_candidate.py validate-version \
            --target "$TAG" \
            --releases-json published-releases.json
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate release version stamping
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git ls-files --error-unmatch -- \
            Makefile \
            pyproject.toml \
            uv.lock \
            cli/defenseclaw/__init__.py \
            extensions/defenseclaw/package.json \
            extensions/defenseclaw/package-lock.json \
            macos/DefenseClawMac/DefenseClawMac.xcodeproj/project.pbxproj \
            release/source-install-identity.json >/dev/null
          SOURCE_DEFAULT="$(python3 scripts/source_release_identity.py check --machine | cut -f1)"
          if [[ "$SOURCE_DEFAULT" != "$RELEASE_TAG" ]]; then
            echo "::warning title=GitHub source snapshot uses development version::Installable assets will be stamped $RELEASE_TAG, while GitHub's automatic source archive remains the reviewed main snapshot with development version $SOURCE_DEFAULT."
          fi
          # The workflow-dispatch input is the release version authority. Prove
          # the reviewed stamping code can apply it before native builders run.
          scripts/stamp-version.sh "$RELEASE_TAG"

      - name: Verify release commit is reviewed and branch-owned
        id: provenance
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error title=Untrusted release ref::Run this workflow from protected main, not $GITHUB_REF."
            exit 1
          fi

          COMMIT="$GITHUB_SHA"
          test "$(git rev-parse HEAD)" = "$COMMIT"
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "$COMMIT" || {
            echo "::error title=Provenance gate failed::$COMMIT is not the current origin/main tip."
            exit 1
          }
          echo "OK: $COMMIT is the current origin/main tip"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Load the reviewed historical baseline matrix
        id: baselines
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          python3 - "$RELEASE_TAG" "$GITHUB_OUTPUT" <<'PY'
          import json
          from pathlib import Path
          import re
          import sys

          target, output_path = sys.argv[1:]
          path = Path("release/upgrade-baselines.json")
          document = json.loads(path.read_text(encoding="utf-8"))
          expected_keys = {
              "schema_version",
              "published_baselines",
              "published_baseline_config_versions",
              "platform_published_baselines",
          }
          if not isinstance(document, dict) or set(document) != expected_keys:
              raise SystemExit("release/upgrade-baselines.json has an unexpected shape")
          if document.get("schema_version") != 2:
              raise SystemExit("release/upgrade-baselines.json schema_version must be 2")
          baselines = document.get("published_baselines")
          if not isinstance(baselines, list) or not baselines:
              raise SystemExit("published_baselines must be a non-empty list")
          semver = re.compile(r"^[0-9]+\.[0-9]+\.[0-9]+$")
          if any(not isinstance(item, str) or not semver.fullmatch(item) for item in baselines):
              raise SystemExit("every published baseline must be canonical X.Y.Z")
          if len(baselines) != len(set(baselines)):
              raise SystemExit("published baselines must be unique")
          key = lambda value: tuple(map(int, value.split(".")))
          if baselines != sorted(baselines, key=key, reverse=True):
              raise SystemExit("published baselines must be in descending semver order")
          config_versions = document.get("published_baseline_config_versions")
          if not isinstance(config_versions, dict) or set(config_versions) != set(baselines):
              raise SystemExit(
                  "published_baseline_config_versions keys must exactly match published baselines"
              )
          if any(
              not isinstance(value, int) or isinstance(value, bool) or value not in {5, 6, 7}
              for value in config_versions.values()
          ):
              raise SystemExit("published baseline config versions must be integers in {5, 6, 7}")
          platforms = document.get("platform_published_baselines")
          if not isinstance(platforms, dict) or set(platforms) != {"windows"}:
              raise SystemExit("platform_published_baselines must contain exactly windows")
          windows = platforms["windows"]
          if not isinstance(windows, list) or not windows:
              raise SystemExit("the reviewed Windows baseline matrix must be non-empty")
          if any(not isinstance(item, str) or not semver.fullmatch(item) for item in windows):
              raise SystemExit("every Windows baseline must be canonical X.Y.Z")
          if len(windows) != len(set(windows)) or windows != sorted(windows, key=key, reverse=True):
              raise SystemExit("Windows baselines must be unique descending semver")
          if any(item not in baselines for item in windows):
              raise SystemExit("Windows baselines must be a subset of published_baselines")
          digest_policy_path = Path("release/historical-artifact-digests.json")
          digest_policy = json.loads(digest_policy_path.read_text(encoding="utf-8"))
          if set(digest_policy) != {
              "schema_version",
              "signed_wheel_coverage_starts_at",
              "signed_checksum_exceptions",
          } or digest_policy.get("schema_version") != 1:
              raise SystemExit("historical artifact digest policy schema is invalid")
          signed_wheel_start = digest_policy.get("signed_wheel_coverage_starts_at")
          exceptions = digest_policy.get("signed_checksum_exceptions")
          if not isinstance(signed_wheel_start, str) or not semver.fullmatch(signed_wheel_start):
              raise SystemExit("historical signed-wheel coverage boundary is invalid")
          if not isinstance(exceptions, dict):
              raise SystemExit("historical artifact digest exceptions must be an object")
          expected_exception_versions = {
              item for item in baselines if key(item) < key(signed_wheel_start)
          }
          if set(exceptions) != expected_exception_versions:
              raise SystemExit(
                  "historical wheel digest exceptions do not exactly cover the unsigned baseline suffix"
              )
          for version, artifacts in exceptions.items():
              expected_name = f"defenseclaw-{version}-py3-none-any.whl"
              if not isinstance(artifacts, dict) or set(artifacts) != {expected_name}:
                  raise SystemExit(
                      f"historical digest exception for {version} must cover only {expected_name}"
                  )
              digest = artifacts[expected_name]
              if not isinstance(digest, str) or not re.fullmatch(r"[0-9a-f]{64}", digest):
                  raise SystemExit(f"historical digest exception for {version} is invalid")
          older = [item for item in baselines if key(item) < key(target)]
          windows_older = [item for item in windows if key(item) < key(target)]
          if not older:
              raise SystemExit(f"no configured published baseline is older than target {target}")
          if not windows_older:
              raise SystemExit(f"no reviewed Windows baseline is older than target {target}")
          with open(output_path, "a", encoding="utf-8") as output:
              output.write("baselines=" + json.dumps(older, separators=(",", ":")) + "\n")
              output.write(
                  "windows_baselines="
                  + json.dumps(windows_older, separators=(",", ":"))
                  + "\n"
              )
              output.write(f"previous_baseline={older[0]}\n")
          PY

  build-runtime-candidate:
    name: Build runtime candidate once
    needs: release-preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.names.outputs.runtime }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Name immutable runtime artifact
        id: names
        run: echo "runtime=release-runtime-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - uses: anchore/sbom-action/download-syft@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0 # v0.18.0

      - name: Create local release tag
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
        run: |
          set -euo pipefail
          git tag "$RELEASE_TAG"
          test "$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")" = "$GITHUB_SHA"

      - name: Build OpenClaw plugin and populate embed tree
        run: make extensions

      - name: Restore tracked generated files before GoReleaser
        run: |
          set -euo pipefail
          git restore --worktree -- \
            extensions/defenseclaw/dist \
            internal/gateway/connector/openclaw_extension/.placeholder
          git diff --exit-code

      - name: Build gateway archives and SBOMs
        uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
        with:
          version: "v2.15.4"
          # These archives are transformed into protected runtime envelopes
          # below. Sign only the final sealed candidate, never transient bytes.
          args: release --clean --skip=sign
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build stamped CLI, plugin, and upgrade policy
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
        run: |
          set -euo pipefail
          git ls-files --error-unmatch -- \
            Makefile \
            pyproject.toml \
            uv.lock \
            cli/defenseclaw/__init__.py \
            extensions/defenseclaw/package.json \
            extensions/defenseclaw/package-lock.json \
            macos/DefenseClawMac/DefenseClawMac.xcodeproj/project.pbxproj \
            release/source-install-identity.json >/dev/null
          scripts/stamp-version.sh "$RELEASE_TAG"
          python3 scripts/source_release_identity.py check \
            --expected-release "$RELEASE_TAG"
          make dist-cli
          make dist-plugin
          make dist-upgrade-manifest
          python3 scripts/release_candidate.py prepare-runtime \
            --release-dir dist \
            --version "$RELEASE_TAG"

      - name: Validate and stage publishable runtime bytes
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
        run: |
          python3 scripts/release_candidate.py stage-runtime \
            --release-dir dist \
            --output-dir runtime-candidate \
            --version "$RELEASE_TAG"

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: ${{ steps.names.outputs.runtime }}
          path: runtime-candidate/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  macos-app:
    name: Build and conditionally notarize unified macOS app
    needs: [release-preflight, build-runtime-candidate]
    runs-on: macos-15
    environment: release
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.names.outputs.macos }}
      verification_status: ${{ steps.app.outputs.verification_status }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Name immutable macOS artifact
        id: names
        run: echo "macos=release-macos-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.build-runtime-candidate.outputs.artifact_name }}
          path: dist

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          # This job consumes already-built runtime artifacts and never creates
          # a uv dependency cache. Avoid a failing post-job upload of an absent
          # cache directory.
          enable-cache: false

      - name: Verify and extract exact runtime inputs
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
        run: |
          set -euo pipefail
          python3 scripts/release_candidate.py verify-runtime --release-dir dist --version "$RELEASE_TAG"
          python3 scripts/release_candidate.py extract-gateway \
            --release-dir dist \
            --output macos-runtime/defenseclaw \
            --version "$RELEASE_TAG" \
            --os darwin \
            --arch arm64

      - name: Build, sign, notarize, and package app
        id: app
        env:
          RELEASE_VERSION: ${{ needs.release-preflight.outputs.tag }}
          MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          # The build script notarizes when all five Apple credentials exist,
          # emits explicitly suffixed ad-hoc assets when none exist, and rejects
          # partial or invalid credential sets.
          MACOS_REQUIRE_NOTARIZATION: "false"
          MACOS_GATEWAY_INPUT: ${{ github.workspace }}/macos-runtime/defenseclaw
        run: scripts/build-macos-app-release.sh "$RELEASE_VERSION" macos-candidate

      - name: Require explicit macOS trust status
        env:
          VERIFICATION_STATUS: ${{ steps.app.outputs.verification_status }}
        run: |
          case "$VERIFICATION_STATUS" in
            notarized)
              echo "Developer ID signed and notarized macOS assets are ready."
              ;;
            unverified)
              echo "::warning title=Unverified macOS assets::Apple credentials are unavailable; publishing only explicitly suffixed -unverified app assets."
              ;;
            *)
              echo "::error title=Invalid macOS trust status::status=$VERIFICATION_STATUS"
              exit 1
              ;;
          esac

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: ${{ steps.names.outputs.macos }}
          path: macos-candidate/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  assemble-release-candidate:
    name: Seal exact release candidate
    needs: [release-preflight, build-runtime-candidate, macos-app]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      artifact_name: ${{ steps.names.outputs.candidate }}
      min_upgrade_protocol: ${{ steps.policy.outputs.min_upgrade_protocol }}
      required_bridge_version: ${{ steps.policy.outputs.required_bridge_version }}
      windows_baselines: ${{ steps.policy.outputs.windows_baselines }}
      windows_prebridge_baselines: ${{ steps.policy.outputs.windows_prebridge_baselines }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          persist-credentials: false

      - name: Name immutable candidate artifact
        id: names
        run: echo "candidate=release-candidate-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.build-runtime-candidate.outputs.artifact_name }}
          path: candidate-input/runtime

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.macos-app.outputs.artifact_name }}
          path: candidate-input/macos

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Resolve immutable published bridge provenance
        id: bridge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRIDGE_VERSION="$(python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(
              Path("candidate-input/runtime/upgrade-manifest.json").read_text(encoding="utf-8")
          )
          bridge = manifest.get("required_bridge_version", "")
          if not isinstance(bridge, str):
              raise SystemExit("required_bridge_version must be a string")
          print(bridge)
          PY
          )"
          echo "version=$BRIDGE_VERSION" >> "$GITHUB_OUTPUT"
          if [[ -z "$BRIDGE_VERSION" ]]; then
            echo "Candidate does not require a published bridge."
            exit 0
          fi

          git fetch --force --no-tags origin \
            "refs/tags/$BRIDGE_VERSION:refs/tags/$BRIDGE_VERSION"
          BRIDGE_COMMIT="$(git rev-parse "refs/tags/$BRIDGE_VERSION^{commit}")"
          BRIDGE_TREE="$(git show -s --format=%T "$BRIDGE_COMMIT")"
          gh release view "$BRIDGE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,isImmutable,assets \
            > published-bridge.json
          mkdir -p candidate-input/bridge
          gh release download "$BRIDGE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --dir candidate-input/bridge \
            --pattern checksums.txt \
            --pattern checksums.txt.pem \
            --pattern checksums.txt.sig

          python3 - "$BRIDGE_VERSION" published-bridge.json candidate-input/bridge \
            release/upgrade-baselines.json <<'PY'
          import hashlib
          import json
          from pathlib import Path
          import re
          import sys

          from scripts.release_candidate import (
              MACOS_VERIFICATION_STATUSES,
              _parse_checksums,
              payload_asset_names,
              published_asset_names,
              windows_release_binary_names,
          )

          expected, release_path, assets_path, baseline_policy_path = sys.argv[1:]
          release = json.loads(Path(release_path).read_text(encoding="utf-8"))
          baseline_policy = json.loads(
              Path(baseline_policy_path).read_text(encoding="utf-8")
          )
          platform_baselines = baseline_policy.get("platform_published_baselines")
          if not isinstance(platform_baselines, dict) or set(platform_baselines) != {"windows"}:
              raise SystemExit("bridge platform baseline policy must contain exactly windows")
          windows_baselines = platform_baselines["windows"]
          if (
              not isinstance(windows_baselines, list)
              or any(not isinstance(item, str) for item in windows_baselines)
              or len(windows_baselines) != len(set(windows_baselines))
          ):
              raise SystemExit("bridge Windows baseline policy is invalid")
          omit_windows_binaries = expected not in windows_baselines
          expected_state = {
              "tagName": expected,
              "isDraft": False,
              "isPrerelease": False,
              "isImmutable": True,
          }
          for name, value in expected_state.items():
              if release.get(name) != value or type(release.get(name)) is not type(value):
                  raise SystemExit(f"required bridge release state mismatch: {name}")
          rows = release.get("assets")
          if not isinstance(rows, list):
              raise SystemExit("required bridge assets must be a list")
          assets = {}
          for row in rows:
              if not isinstance(row, dict):
                  raise SystemExit("required bridge contains an invalid asset row")
              name = row.get("name")
              digest = row.get("digest")
              if not isinstance(name, str) or name in assets:
                  raise SystemExit("required bridge contains an invalid or duplicate asset name")
              if not isinstance(digest, str) or re.fullmatch(r"sha256:[0-9a-f]{64}", digest) is None:
                  raise SystemExit(f"required bridge lacks a SHA-256 digest for {name!r}")
              assets[name] = digest.removeprefix("sha256:")
          names = set(assets)
          variants = {
              status: set(
                  published_asset_names(
                      expected,
                      status,
                      omit_windows_binaries=omit_windows_binaries,
                  )
              )
              for status in MACOS_VERIFICATION_STATUSES
          }
          matches = [status for status, required in variants.items() if names == required]
          if len(matches) != 1:
              raise SystemExit("required bridge does not match one complete reviewed asset set")
          status = matches[0]
          root = Path(assets_path)
          checksums = _parse_checksums(root / "checksums.txt")
          if tuple(sorted(checksums)) != payload_asset_names(expected, status):
              raise SystemExit("required bridge checksums do not cover the exact payload")
          omitted_windows = (
              set(windows_release_binary_names(expected))
              if omit_windows_binaries
              else set()
          )
          for name, digest in checksums.items():
              if name in omitted_windows:
                  if name in assets:
                      raise SystemExit(f"required bridge unexpectedly published {name}")
                  continue
              if assets.get(name) != digest:
                  raise SystemExit(f"required bridge GitHub digest differs for {name}")
          for name in ("checksums.txt", "checksums.txt.pem", "checksums.txt.sig"):
              actual = hashlib.sha256((root / name).read_bytes()).hexdigest()
              if assets.get(name) != actual:
                  raise SystemExit(f"downloaded required bridge digest differs for {name}")
          publication = "POSIX-only" if omit_windows_binaries else "all-platform"
          print(f"immutable published bridge verified: {expected} ({status}, {publication})")
          PY

          cosign verify-blob \
            --certificate candidate-input/bridge/checksums.txt.pem \
            --signature candidate-input/bridge/checksums.txt.sig \
            --certificate-identity \
              "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            candidate-input/bridge/checksums.txt
          BRIDGE_CHECKSUMS_SHA256="$(sha256sum candidate-input/bridge/checksums.txt | awk '{print $1}')"
          echo "commit=$BRIDGE_COMMIT" >> "$GITHUB_OUTPUT"
          echo "tree=$BRIDGE_TREE" >> "$GITHUB_OUTPUT"
          echo "checksums_sha256=$BRIDGE_CHECKSUMS_SHA256" >> "$GITHUB_OUTPUT"

      - name: Assemble checksummed candidate
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
          MACOS_STATUS: ${{ needs.macos-app.outputs.verification_status }}
          BRIDGE_VERSION: ${{ steps.bridge.outputs.version }}
          BRIDGE_COMMIT: ${{ steps.bridge.outputs.commit }}
          BRIDGE_TREE: ${{ steps.bridge.outputs.tree }}
          BRIDGE_CHECKSUMS_SHA256: ${{ steps.bridge.outputs.checksums_sha256 }}
        run: |
          set -euo pipefail
          provenance_args=()
          if [[ -n "$BRIDGE_VERSION" ]]; then
            SOURCE_TREE="$(git show -s --format=%T "$RELEASE_COMMIT")"
            provenance_args=(
              --source-tree "$SOURCE_TREE"
              --bridge-commit "$BRIDGE_COMMIT"
              --bridge-tree "$BRIDGE_TREE"
              --bridge-checksums-sha256 "$BRIDGE_CHECKSUMS_SHA256"
            )
          fi
          python3 scripts/release_candidate.py assemble \
            --runtime-dir candidate-input/runtime \
            --macos-dir candidate-input/macos \
            --root release-candidate \
            --version "$RELEASE_TAG" \
            --commit "$RELEASE_COMMIT" \
            --macos-verification-status "$MACOS_STATUS" \
            "${provenance_args[@]}"

      - name: Sign and authenticate public checksum manifest
        run: |
          set -euo pipefail
          cosign sign-blob \
            --yes \
            --output-certificate=release-candidate/dist/checksums.txt.pem \
            --output-signature=release-candidate/dist/checksums.txt.sig \
            release-candidate/dist/checksums.txt
          python3 scripts/release_candidate.py canonicalize-certificate \
            --certificate release-candidate/dist/checksums.txt.pem
          cosign verify-blob \
            --certificate release-candidate/dist/checksums.txt.pem \
            --signature release-candidate/dist/checksums.txt.sig \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            release-candidate/dist/checksums.txt

      - name: Seal all candidate bytes
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          python3 scripts/release_candidate.py seal \
            --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"
          python3 scripts/release_candidate.py verify \
            --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"

      - name: Expose signed upgrade policy
        id: policy
        run: |
          python3 - \
            release-candidate/dist/upgrade-manifest.json \
            "$GITHUB_OUTPUT" \
            '${{ needs.release-preflight.outputs.baselines }}' \
            '${{ needs.release-preflight.outputs.windows_baselines }}' <<'PY'
          import json
          import re
          import sys

          manifest_path, output_path, reviewed_json, reviewed_windows_json = sys.argv[1:]
          with open(manifest_path, encoding="utf-8") as handle:
              manifest = json.load(handle)
          reviewed = json.loads(reviewed_json)
          reviewed_windows = json.loads(reviewed_windows_json)
          schema = manifest.get("schema_version")
          protocol = manifest.get("min_upgrade_protocol", 1)
          bridge = manifest.get("required_bridge_version", "")
          automatic = manifest.get("auto_bridge_from")
          tested = manifest.get("tested_source_versions")
          platform_tested = manifest.get("platform_tested_source_versions")
          runtime_config = manifest.get("runtime_config_version")
          release_artifacts = manifest.get("release_artifacts")
          if schema != 2:
              raise SystemExit("modern release candidate must use upgrade manifest schema 2")
          if not isinstance(protocol, int) or isinstance(protocol, bool) or protocol < 1:
              raise SystemExit("invalid min_upgrade_protocol")
          if bridge and (not isinstance(bridge, str) or not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", bridge)):
              raise SystemExit("invalid required_bridge_version")
          if not isinstance(reviewed, list) or not reviewed:
              raise SystemExit("reviewed release baseline matrix is empty or invalid")
          if not isinstance(reviewed_windows, list) or not reviewed_windows:
              raise SystemExit("reviewed Windows release baseline matrix is empty or invalid")
          if tested != reviewed:
              raise SystemExit("tested_source_versions does not match the reviewed release matrix")
          if not isinstance(platform_tested, dict) or set(platform_tested) != {"windows"}:
              raise SystemExit("signed platform tested-source policy must contain exactly windows")
          if not isinstance(platform_tested["windows"], list):
              raise SystemExit("platform_tested_source_versions.windows must be a list")
          windows_bridge_available = not bridge or bridge in reviewed_windows
          expected_windows = reviewed_windows if windows_bridge_available else []
          if platform_tested["windows"] != expected_windows:
              raise SystemExit(
                  "platform_tested_source_versions.windows does not match the reviewed Windows matrix"
              )
          def config_literal(path, name):
              with open(path, encoding="utf-8") as handle:
                  source = handle.read()
              matches = re.findall(
                  rf"^\s*(?:const[ \t]+)?{re.escape(name)}[ \t]*=[ \t]*([0-9]+)[ \t]*$",
                  source,
                  re.MULTILINE,
              )
              if len(matches) != 1:
                  raise SystemExit(f"gateway source must declare one literal {name}")
              return int(matches[0])

          compatibility_runtime = config_literal(
              "internal/config/config.go",
              "CurrentConfigVersion",
          )
          if compatibility_runtime != 7:
              raise SystemExit(
                  "schema-2 source must retain CurrentConfigVersion=7 as its compatibility ceiling"
              )
          source_runtime = compatibility_runtime
          if bridge:
              source_runtime = config_literal(
                  "internal/config/observability_v8_types.go",
                  "ObservabilityV8ConfigVersion",
              )
          expected_runtime = 8 if bridge else 7
          if source_runtime != expected_runtime or runtime_config != expected_runtime:
              raise SystemExit(
                  "runtime_config_version does not attest the expected bridge/hard-cut runtime"
              )
          release_version = manifest.get("release_version")
          expected_gateways = {}
          for os_name in ("darwin", "linux", "windows"):
              expected_gateways[os_name] = {
                  arch: f"defenseclaw_{release_version}_protocol2_{os_name}_{arch}.dcgateway"
                  for arch in ("amd64", "arm64")
              }
          expected_artifacts = {
              "wheel": f"defenseclaw-{release_version}-2-py3-none-any.dcwheel",
              "gateways": expected_gateways,
          }
          if release_artifacts != expected_artifacts:
              raise SystemExit(
                  "release_artifacts does not bind the exact protected candidate payload"
              )
          windows_prebridge = list(platform_tested["windows"])
          if bridge and windows_bridge_available:
              if bridge not in platform_tested["windows"]:
                  raise SystemExit("required bridge is absent from the signed Windows matrix")
              bridge_key = tuple(map(int, bridge.split(".")))
              windows_prebridge = [
                  item
                  for item in windows_prebridge
                  if tuple(map(int, item.split("."))) < bridge_key
              ]
              if not windows_prebridge:
                  raise SystemExit("signed Windows matrix has no pre-bridge source")
          elif bridge:
              if platform_tested["windows"]:
                  raise SystemExit(
                      "unpublished Windows bridge requires an empty signed Windows matrix"
                  )
              windows_prebridge = []
          if automatic is not None:
              if not isinstance(automatic, list) or not automatic:
                  raise SystemExit("hard-cut auto_bridge_from must be a non-empty list")
              bridge_key = tuple(map(int, bridge.split(".")))
              expected_automatic = [
                  item
                  for item in reviewed
                  if tuple(map(int, item.split("."))) < bridge_key
              ]
              if automatic != expected_automatic:
                  raise SystemExit(
                      "hard-cut auto_bridge_from does not match the reviewed pre-bridge matrix"
                  )
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"min_upgrade_protocol={protocol}\n")
              output.write(f"required_bridge_version={bridge}\n")
              output.write(
                  "windows_baselines="
                  + json.dumps(platform_tested["windows"], separators=(",", ":"))
                  + "\n"
              )
              output.write(
                  "windows_prebridge_baselines="
                  + json.dumps(windows_prebridge, separators=(",", ":"))
                  + "\n"
              )
          PY

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        id: upload
        with:
          name: ${{ steps.names.outputs.candidate }}
          path: release-candidate/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  posix-fresh-install:
    name: Fresh install sealed candidate (${{ matrix.runner }})
    needs: [release-preflight, assemble-release-candidate]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-15]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.assemble-release-candidate.outputs.artifact_name }}
          path: release-candidate

      - name: Verify and install the exact sealed candidate on a fresh host
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          python3 scripts/release_candidate.py verify \
            --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"
          cosign verify-blob \
            --certificate release-candidate/dist/checksums.txt.pem \
            --signature release-candidate/dist/checksums.txt.sig \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            release-candidate/dist/checksums.txt
          bash scripts/test-fresh-install-release.sh \
            "$GITHUB_WORKSPACE/release-candidate/dist" "$RELEASE_TAG"

  windows-fresh-install:
    name: Fresh install sealed candidate (Windows)
    needs: [release-preflight, assemble-release-candidate]
    if: ${{ false }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.assemble-release-candidate.outputs.artifact_name }}
          path: release-candidate

      - name: Verify and install the exact sealed candidate on a fresh host
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          python scripts/release_candidate.py verify `
            --root release-candidate --version "$env:RELEASE_TAG" --commit "$env:RELEASE_COMMIT"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cosign verify-blob `
            --certificate release-candidate/dist/checksums.txt.pem `
            --signature release-candidate/dist/checksums.txt.sig `
            --certificate-identity "https://github.com/$env:GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" `
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" `
            release-candidate/dist/checksums.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          pwsh -NoProfile -File scripts/test-fresh-install-release-windows.ps1 `
            -ReleaseDir "$env:GITHUB_WORKSPACE/release-candidate/dist" `
            -TargetVersion "$env:RELEASE_TAG"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  linux-upgrade:
    name: Linux upgrade policy ${{ matrix.baseline }} → ${{ needs.release-preflight.outputs.tag }}
    needs: [release-preflight, assemble-release-candidate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        baseline: ${{ fromJSON(needs.release-preflight.outputs.baselines) }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.assemble-release-candidate.outputs.artifact_name }}
          path: release-candidate

      - name: Verify sealed candidate and Sigstore identity
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          python3 scripts/release_candidate.py verify \
            --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"
          cosign verify-blob \
            --certificate release-candidate/dist/checksums.txt.pem \
            --signature release-candidate/dist/checksums.txt.sig \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            release-candidate/dist/checksums.txt

      - name: Enforce manifest-derived success or pre-mutation refusal
        env:
          BASELINE: ${{ matrix.baseline }}
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          UPGRADE_SMOKE_SKIP_SOURCE_CONTRACTS: "1"
        run: |
          scripts/test-upgrade-protocol-release.sh \
            --from-version "$BASELINE" \
            --target-version "$RELEASE_TAG" \
            --release-dir "$GITHUB_WORKSPACE/release-candidate/dist" \
            --baseline-mode seed \
            --health-timeout 60

  macos-upgrade:
    name: macOS upgrade policy ${{ matrix.baseline }} → ${{ needs.release-preflight.outputs.tag }}
    needs: [release-preflight, assemble-release-candidate]
    runs-on: macos-15
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        baseline: ${{ fromJSON(needs.release-preflight.outputs.baselines) }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.assemble-release-candidate.outputs.artifact_name }}
          path: release-candidate

      - name: Verify sealed candidate and Sigstore identity
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          python3 scripts/release_candidate.py verify \
            --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"
          cosign verify-blob \
            --certificate release-candidate/dist/checksums.txt.pem \
            --signature release-candidate/dist/checksums.txt.sig \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            release-candidate/dist/checksums.txt

      - name: Enforce manifest-derived success or pre-mutation refusal
        env:
          BASELINE: ${{ matrix.baseline }}
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
        run: |
          scripts/test-upgrade-protocol-release.sh \
            --from-version "$BASELINE" \
            --target-version "$RELEASE_TAG" \
            --release-dir "$GITHUB_WORKSPACE/release-candidate/dist" \
            --baseline-mode seed \
            --health-timeout 60

  historical-baseline-canary:
    name: Real historical dependency canary ${{ matrix.baseline }} → ${{ needs.release-preflight.outputs.tag }}
    needs: [release-preflight, assemble-release-candidate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - baseline: "0.8.3"
            start_source_gateway: true
          - baseline: "0.4.0"
            start_source_gateway: false
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.assemble-release-candidate.outputs.artifact_name }}
          path: release-candidate

      - name: Verify candidate and exercise authentic baseline dependencies
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
          BASELINE: ${{ matrix.baseline }}
          CANARY_START_SOURCE: ${{ matrix.start_source_gateway }}
          UPGRADE_SMOKE_SKIP_SOURCE_CONTRACTS: "1"
        run: |
          set -euo pipefail
          python3 scripts/release_candidate.py verify \
            --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"
          cosign verify-blob \
            --certificate release-candidate/dist/checksums.txt.pem \
            --signature release-candidate/dist/checksums.txt.sig \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            release-candidate/dist/checksums.txt
          source_gateway_args=()
          if [[ "$CANARY_START_SOURCE" == "true" ]]; then
            source_gateway_args+=(--start-source-gateway)
          fi
          scripts/test-upgrade-protocol-release.sh \
            --from-version "$BASELINE" \
            --target-version "$RELEASE_TAG" \
            --release-dir "$GITHUB_WORKSPACE/release-candidate/dist" \
            --baseline-mode seed \
            --baseline-dependencies published \
            --success-path-only \
            --health-timeout 60 \
            "${source_gateway_args[@]}"

  windows-upgrade:
    name: Windows upgrade policy ${{ matrix.baseline }} → ${{ needs.release-preflight.outputs.tag }}
    needs: [release-preflight, assemble-release-candidate]
    if: ${{ false }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        # Each hard-cut cell stages one pre-bridge source and also exercises a
        # direct published-bridge -> target case inside the native harness.
        # Feeding the bridge itself here would violate -SourceVersion's
        # deliberate pre-bridge contract and duplicate that direct case.
        baseline: ${{ fromJSON(needs.assemble-release-candidate.outputs.windows_prebridge_baselines) }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.assemble-release-candidate.outputs.artifact_name }}
          path: release-candidate

      - name: Verify sealed candidate and Sigstore identity
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          python scripts/release_candidate.py verify `
            --root release-candidate --version "$env:RELEASE_TAG" --commit "$env:RELEASE_COMMIT"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cosign verify-blob `
            --certificate release-candidate/dist/checksums.txt.pem `
            --signature release-candidate/dist/checksums.txt.sig `
            --certificate-identity "https://github.com/$env:GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" `
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" `
            release-candidate/dist/checksums.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run native Windows ACL contracts
        shell: pwsh
        run: |
          $tests = @()
          foreach ($path in @(
            "cli/tests/test_windows_acl.py",
            "cli/tests/test_observability_v8_activation_windows.py",
            "cli/tests/test_observability_v8_activation_windows_native.py",
            "cli/tests/test_cmd_upgrade_windows_rollback.py"
          )) {
            if (Test-Path $path) { $tests += $path }
          }
          if ($tests.Count -gt 0) {
            uv run python -m pytest -q @tests
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Run native protocol-derived Windows upgrade matrix
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          BASELINE: ${{ matrix.baseline }}
        run: |
          $candidate = Join-Path $env:GITHUB_WORKSPACE "release-candidate/dist"
          pwsh -NoProfile -File scripts/test-upgrade-release-windows.ps1 `
            -ReleaseDir $candidate `
            -TargetVersion "$env:RELEASE_TAG" `
            -SourceVersion "$env:BASELINE"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  windows-unpublished-refusal:
    name: Windows unpublished-runtime refusal
    needs: [release-preflight, assemble-release-candidate]
    if: ${{ needs.assemble-release-candidate.outputs.windows_prebridge_baselines == '[]' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.assemble-release-candidate.outputs.artifact_name }}
          path: release-candidate

      - name: Verify sealed candidate and Sigstore identity
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          python scripts/release_candidate.py verify `
            --root release-candidate --version "$env:RELEASE_TAG" --commit "$env:RELEASE_COMMIT"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cosign verify-blob `
            --certificate release-candidate/dist/checksums.txt.pem `
            --signature release-candidate/dist/checksums.txt.sig `
            --certificate-identity "https://github.com/$env:GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" `
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" `
            release-candidate/dist/checksums.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Prove the sealed Windows resolver refuses before mutation
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
        run: |
          pwsh -NoProfile -File scripts/test-upgrade-release-windows.ps1 `
            -ReleaseDir "$env:GITHUB_WORKSPACE/release-candidate/dist" `
            -TargetVersion "$env:RELEASE_TAG" `
            -UnpublishedWindowsRefusalOnly
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  live-continuity:
    name: Live bridge-to-target history continuity
    needs: [release-preflight, assemble-release-candidate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          persist-credentials: false

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.assemble-release-candidate.outputs.artifact_name }}
          path: release-candidate

      - name: Verify sealed candidate and Sigstore identity
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          python3 scripts/release_candidate.py verify \
            --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"
          cosign verify-blob \
            --certificate release-candidate/dist/checksums.txt.pem \
            --signature release-candidate/dist/checksums.txt.sig \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            release-candidate/dist/checksums.txt

      - name: Exercise live history and dashboard continuity when required
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          MIN_PROTOCOL: ${{ needs.assemble-release-candidate.outputs.min_upgrade_protocol }}
          BRIDGE_BASELINE: ${{ needs.assemble-release-candidate.outputs.required_bridge_version }}
        run: |
          set -euo pipefail
          if [[ ! "$MIN_PROTOCOL" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error title=Invalid upgrade protocol::min_upgrade_protocol=$MIN_PROTOCOL"
            exit 1
          fi
          if (( MIN_PROTOCOL > 1 )); then
            if [[ -z "$BRIDGE_BASELINE" ]]; then
              echo "::error title=Missing bridge policy::Protocol $MIN_PROTOCOL requires required_bridge_version."
              exit 1
            fi
            scripts/test-observability-v8-upgrade-continuity.sh \
              --from-version "$BRIDGE_BASELINE" \
              --target-version "$RELEASE_TAG" \
              --release-dir "$GITHUB_WORKSPACE/release-candidate/dist" \
              --health-timeout 60
          else
            echo "Candidate protocol $MIN_PROTOCOL does not require the hard-cut continuity gate."
          fi

  publish-release:
    name: Publish tested candidate
    needs:
      - release-preflight
      - assemble-release-candidate
      - posix-fresh-install
      - windows-fresh-install
      - linux-upgrade
      - macos-upgrade
      - historical-baseline-canary
      - windows-upgrade
      - windows-unpublished-refusal
      - live-continuity
    if: >-
      ${{
        always() &&
        needs.release-preflight.result == 'success' &&
        needs.assemble-release-candidate.result == 'success' &&
        needs.posix-fresh-install.result == 'success' &&
        needs.linux-upgrade.result == 'success' &&
        needs.macos-upgrade.result == 'success' &&
        needs.historical-baseline-canary.result == 'success' &&
        needs.windows-unpublished-refusal.result == 'success' &&
        needs.live-continuity.result == 'success' &&
        needs.windows-fresh-install.result == 'skipped' &&
        needs.windows-upgrade.result == 'skipped'
      }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.assemble-release-candidate.outputs.artifact_name }}
          path: release-candidate

      - name: Verify the exact tested candidate
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          python3 scripts/release_candidate.py verify \
            --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"
          cosign verify-blob \
            --certificate release-candidate/dist/checksums.txt.pem \
            --signature release-candidate/dist/checksums.txt.sig \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            release-candidate/dist/checksums.txt

      - name: Recheck remote release namespace
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error title=Tag appeared during release gates::$RELEASE_TAG already exists."
            exit 1
          fi
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error title=Release appeared during release gates::$RELEASE_TAG already exists."
            exit 1
          fi

      # With Immutable Releases enabled, current gh creates a draft, uploads
      # every selected sealed asset, and only then publishes. This is the only step
      # in the workflow that can create the remote release or tag.
      - name: Publish tag and selected sealed assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          echo "::warning title=POSIX-only release::Windows-specific binaries and SBOMs will not be published."
          mapfile -t names < <(
            python3 scripts/release_candidate.py list-assets \
              --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT" \
              --omit-windows-binaries
          )
          assets=()
          for name in "${names[@]}"; do
            assets+=("release-candidate/dist/$name")
          done

          notes_args=()
          if [[ -f release-candidate/RELEASE_NOTES.md ]]; then
            notes_args=(--notes-file release-candidate/RELEASE_NOTES.md)
          else
            notes_args=(--generate-notes)
          fi

          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$RELEASE_COMMIT" \
            --title "$RELEASE_TAG" \
            "${notes_args[@]}" \
            "${assets[@]}"

      - name: Prove published asset custody
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          verified=0
          for attempt in 1 2 3 4 5 6; do
            gh release view "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --json tagName,isDraft,isImmutable,assets > published-release.json
            if python3 scripts/release_candidate.py verify-published \
              --root release-candidate \
              --release-json published-release.json \
              --version "$RELEASE_TAG" \
              --commit "$RELEASE_COMMIT" \
              --omit-windows-binaries; then
              verified=1
              break
            fi
            sleep 5
          done
          [[ "$verified" == "1" ]] || {
            echo "::error title=Published custody proof failed::GitHub asset digests did not converge to the sealed candidate."
            exit 1
          }
          remote_commit="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" --jq .object.sha)"
          test "$remote_commit" = "$RELEASE_COMMIT"
          echo "Release $RELEASE_TAG published from tested commit $RELEASE_COMMIT"
