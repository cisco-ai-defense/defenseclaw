name: Release

# This workflow is the only release-signing and publication authority because
# published installers pin its Fulcio identity. One manual dispatch builds one
# candidate, exercises its public install and supported upgrade paths, and
# publishes those same sealed bytes.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, validate, and release (X.Y.Z)."
        required: true
        type: string
      immutable_releases_confirmed:
        description: "Confirm repository release immutability is enabled in Settings."
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: Validate release request
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      commit: ${{ steps.provenance.outputs.commit }}
      upgrade_baselines: ${{ steps.baselines.outputs.upgrade_baselines }}
      baseline_artifact: ${{ steps.baseline-name.outputs.name }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate optional platform signing credentials
        env:
          HAS_MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 != '' }}
          HAS_MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD != '' }}
          HAS_MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 != '' }}
          HAS_MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID != '' }}
          HAS_MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID != '' }}
          HAS_WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 != '' }}
          HAS_WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD != '' }}
        run: |
          set -euo pipefail
          APPLE_CREDENTIAL_COUNT=0
          for configured in \
            "$HAS_MACOS_DEVELOPER_ID_P12_BASE64" \
            "$HAS_MACOS_DEVELOPER_ID_P12_PASSWORD" \
            "$HAS_MACOS_NOTARY_KEY_BASE64" \
            "$HAS_MACOS_NOTARY_KEY_ID" \
            "$HAS_MACOS_NOTARY_ISSUER_ID"; do
            [[ "$configured" != "true" ]] ||
              APPLE_CREDENTIAL_COUNT=$((APPLE_CREDENTIAL_COUNT + 1))
          done
          WINDOWS_CREDENTIAL_COUNT=0
          for configured in \
            "$HAS_WINDOWS_SIGNING_CERT_BASE64" \
            "$HAS_WINDOWS_SIGNING_CERT_PASSWORD"; do
            [[ "$configured" != "true" ]] ||
              WINDOWS_CREDENTIAL_COUNT=$((WINDOWS_CREDENTIAL_COUNT + 1))
          done
          if (( APPLE_CREDENTIAL_COUNT != 0 && APPLE_CREDENTIAL_COUNT != 5 )); then
            echo "::error title=Partial Apple release credentials::Apple signing/notarization credentials are partially configured; provide all five values or none."
            exit 1
          fi
          if (( WINDOWS_CREDENTIAL_COUNT != 0 && WINDOWS_CREDENTIAL_COUNT != 2 )); then
            echo "::error title=Partial Windows release credentials::Windows signing credentials are partially configured; provide both values or none."
            exit 1
          fi
          [[ "$APPLE_CREDENTIAL_COUNT" == "5" ]] &&
            echo "macOS release mode: Developer ID signed and notarized" ||
            echo "::warning title=Unverified macOS release::no Apple credentials; macOS assets will be explicitly unverified"
          [[ "$WINDOWS_CREDENTIAL_COUNT" == "2" ]] &&
            echo "Windows release mode: Authenticode signed" ||
            echo "::warning title=Unverified Windows release::no Windows credentials; Windows Setup will be explicitly unverified"

      - name: Require reviewed macOS app source
        # A DefenseClaw release must build the macOS source that was reviewed
        # and merged with this exact main commit. Upstream freshness is tracked
        # independently by macos-upstream.yml and must not make an unrelated
        # product release fail after its PR checks have already passed.
        run: python3 scripts/check-macos-upstream.py --offline

      - name: Require immutable GitHub releases
        env:
          IMMUTABLE_RELEASES_CONFIRMED: ${{ inputs.immutable_releases_confirmed }}
        run: |
          set -euo pipefail
          # GitHub's immutable-release settings endpoint requires repository
          # Administration: read, which is not available to GITHUB_TOKEN. Keep
          # this preflight fail-closed without introducing an administrator PAT;
          # the publish job separately proves the resulting release is immutable.
          if [[ "$IMMUTABLE_RELEASES_CONFIRMED" != "true" ]]; then
            echo "::error title=Immutable Releases confirmation required::Verify repository release immutability in Settings, then confirm it when dispatching the workflow."
            exit 1
          fi

      - name: Resolve and validate target version
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          TAG="$RELEASE_VERSION_INPUT"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error title=Invalid version input::version must be X.Y.Z with no v prefix (got: '$TAG')"
            exit 1
          fi
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "::error title=Tag already exists::Tag '$TAG' already exists locally."
            exit 1
          fi
          python3 scripts/release_api_retry.py require-absent \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$TAG" \
            --commit "$RELEASE_COMMIT"
          gh api --paginate --slurp \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            > published-releases.json
          python3 scripts/release_candidate.py validate-version \
            --target "$TAG" \
            --releases-json published-releases.json
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate release version stamping
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git ls-files --error-unmatch -- \
            Makefile \
            pyproject.toml \
            uv.lock \
            cli/defenseclaw/__init__.py \
            extensions/defenseclaw/package.json \
            extensions/defenseclaw/package-lock.json \
            macos/DefenseClawMac/DefenseClawMac.xcodeproj/project.pbxproj \
            release/source-install-identity.json >/dev/null
          SOURCE_DEFAULT="$(python3 scripts/source_release_identity.py check --machine | cut -f1)"
          if [[ "$SOURCE_DEFAULT" != "$RELEASE_TAG" ]]; then
            echo "::warning title=GitHub source snapshot uses development version::Installable assets will be stamped $RELEASE_TAG, while GitHub's automatic source archive remains the reviewed main snapshot with development version $SOURCE_DEFAULT."
          fi
          # The workflow-dispatch input is the release version authority. Prove
          # the reviewed stamping code can apply it before native builders run.
          scripts/stamp-version.sh "$RELEASE_TAG"

      - name: Verify release commit is reviewed on main
        id: provenance
        env:
          SELECTED_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error title=Untrusted release ref::Run this workflow from protected main, not $GITHUB_REF."
            exit 1
          fi

          COMMIT="$SELECTED_COMMIT"
          test "$(git rev-parse HEAD)" = "$COMMIT"
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$COMMIT" origin/main; then
            echo "::error title=Provenance gate failed::$COMMIT is no longer reachable from reviewed origin/main."
            exit 1
          fi
          echo "OK: $COMMIT is a reviewed commit on origin/main"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
        with:
          cosign-release: "v2.6.2"

      - name: Name effective baseline snapshot
        id: baseline-name
        run: echo "name=effective-upgrade-baselines-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - name: Resolve authenticated POSIX upgrade baselines
        id: baselines
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          python3 scripts/resolve_upgrade_baselines.py \
            --target-version "$RELEASE_TAG" \
            --output effective-upgrade-baselines.json
          python3 - effective-upgrade-baselines.json "$RELEASE_TAG" "$GITHUB_OUTPUT" <<'PY'
          import json
          from pathlib import Path
          import sys

          policy_path, target, output_path = sys.argv[1:]
          document = json.loads(Path(policy_path).read_text(encoding="utf-8"))
          baselines = document["published_baselines"]
          key = lambda value: tuple(map(int, value.split(".")))
          older = [item for item in baselines if key(item) < key(target)]
          if not older:
              raise SystemExit(f"no authenticated published baseline is older than target {target}")
          required_families = ((0, 7), (0, 6), (0, 5))
          upgrade_baselines = [max(older, key=key)]
          # Exercise both sides of the v7 -> v8 handoff directly. Older
          # families still prove the automatic 0.8.4 -> 0.8.5 staged route,
          # while these lanes catch dependency or controller behavior unique
          # to installations that already reached either boundary release.
          for boundary in ("0.8.5", "0.8.4"):
              if key(boundary) >= key(target):
                  continue
              if boundary not in older:
                  raise SystemExit(
                      f"authenticated published boundary baseline {boundary} is unavailable"
                  )
              if boundary not in upgrade_baselines:
                  upgrade_baselines.append(boundary)
          for family in required_families:
              family_versions = [
                  item for item in older if key(item)[:2] == family
              ]
              if not family_versions:
                  raise SystemExit(
                      "no authenticated published baseline exists for "
                      f"{family[0]}.{family[1]}.x"
                  )
              selected = max(family_versions, key=key)
              if selected not in upgrade_baselines:
                  upgrade_baselines.append(selected)
          # 0.8.7 is the first supported native Windows release. Keep all
          # authenticated POSIX history in the signed policy, but make no
          # Windows upgrade claim until a native Setup has been published.
          document["platform_published_baselines"]["windows"] = []
          Path(policy_path).write_text(
              json.dumps(document, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(
                  "upgrade_baselines="
                  + json.dumps(upgrade_baselines, separators=(",", ":"))
                  + "\n"
              )
          PY

      - name: Preserve exact effective baseline snapshot
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: ${{ steps.baseline-name.outputs.name }}
          path: effective-upgrade-baselines.json
          if-no-files-found: error
          retention-days: 30


  build-runtime-candidate:
    name: Build runtime candidate once
    needs: release-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.names.outputs.runtime }}
      artifact_id: ${{ steps.runtime-artifact.outputs.artifact-id }}
      artifact_digest: ${{ steps.runtime-artifact.outputs.artifact-digest }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Name immutable runtime artifact
        id: names
        run: echo "runtime=release-runtime-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.release-preflight.outputs.baseline_artifact }}
          path: ${{ runner.temp }}/effective-baselines

      - name: Bind effective baseline outside the source checkout
        run: echo "UPGRADE_BASELINE_POLICY=$RUNNER_TEMP/effective-baselines/effective-upgrade-baselines.json" >> "$GITHUB_ENV"

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - uses: anchore/sbom-action/download-syft@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0 # v0.18.0

      - name: Create local release tag
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          git tag "$RELEASE_TAG"
          test "$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")" = "$RELEASE_COMMIT"

      - name: Stamp runtime source version before native builds
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
        run: |
          set -euo pipefail
          git ls-files --error-unmatch -- \
            Makefile \
            pyproject.toml \
            uv.lock \
            cli/defenseclaw/__init__.py \
            extensions/defenseclaw/package.json \
            extensions/defenseclaw/package-lock.json \
            macos/DefenseClawMac/DefenseClawMac.xcodeproj/project.pbxproj \
            release/source-install-identity.json >/dev/null
          scripts/stamp-version.sh "$RELEASE_TAG"
          python3 scripts/source_release_identity.py check \
            --expected-release "$RELEASE_TAG"

      - name: Build OpenClaw plugin and populate embed tree
        run: make extensions

      - name: Restore a clean source checkout before GoReleaser
        run: |
          set -euo pipefail
          git restore --worktree -- \
            Makefile \
            pyproject.toml \
            uv.lock \
            cli/defenseclaw/__init__.py \
            extensions/defenseclaw/dist \
            extensions/defenseclaw/package.json \
            extensions/defenseclaw/package-lock.json \
            internal/gateway/connector/openclaw_extension/.placeholder \
            macos/DefenseClawMac/DefenseClawMac.xcodeproj/project.pbxproj \
            release/source-install-identity.json
          dirty="$(git status --porcelain --untracked-files=all)"
          if [[ -n "$dirty" ]]; then
            echo "::error title=Dirty GoReleaser source checkout::Generated release inputs must stay outside the source checkout."
            printf '%s\n' "$dirty"
            exit 1
          fi

      - name: Build gateway archives and SBOMs
        uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
        with:
          version: "v2.15.4"
          # These archives are transformed into protected runtime envelopes
          # below. Sign only the final sealed candidate, never transient bytes.
          args: release --clean --skip=sign
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build stamped CLI, plugin, and upgrade policy
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
        run: |
          set -euo pipefail
          scripts/stamp-version.sh "$RELEASE_TAG"
          make dist-cli
          make dist-plugin
          make dist-upgrade-manifest
          python3 scripts/release_candidate.py prepare-runtime \
            --release-dir dist \
            --version "$RELEASE_TAG"

      - name: Validate and stage publishable runtime bytes
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
        run: |
          python3 scripts/release_candidate.py stage-runtime \
            --release-dir dist \
            --output-dir runtime-candidate \
            --version "$RELEASE_TAG"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        id: runtime-artifact
        with:
          name: ${{ steps.names.outputs.runtime }}
          path: runtime-candidate/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  macos-app:
    name: Build and notarize unified macOS app
    needs: [release-preflight, build-runtime-candidate]
    runs-on: macos-15
    timeout-minutes: 60
    env:
      UPGRADE_BASELINE_POLICY: ${{ github.workspace }}/effective-upgrade-baselines.json
    environment: release
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.names.outputs.macos }}
      verification_status: ${{ steps.app.outputs.verification_status }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Name immutable macOS artifact
        id: names
        run: echo "macos=release-macos-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.release-preflight.outputs.baseline_artifact }}
          path: .

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.build-runtime-candidate.outputs.artifact_name }}
          path: dist

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          # This job consumes already-built runtime artifacts and never creates
          # a uv dependency cache. Avoid a failing post-job upload of an absent
          # cache directory.
          enable-cache: false

      - name: Verify and extract exact runtime inputs
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
        run: |
          set -euo pipefail
          python3 scripts/release_candidate.py verify-runtime --release-dir dist --version "$RELEASE_TAG"
          python3 scripts/release_candidate.py extract-gateway \
            --release-dir dist \
            --output macos-runtime/defenseclaw \
            --version "$RELEASE_TAG" \
            --os darwin \
            --arch arm64

      - name: Build, sign, notarize, and package app
        id: app
        env:
          RELEASE_VERSION: ${{ needs.release-preflight.outputs.tag }}
          MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          # Complete credentials produce notarized assets. With none, the
          # builder emits only explicitly named -unverified assets. Partial
          # credentials fail in preflight and again inside the builder.
          MACOS_REQUIRE_NOTARIZATION: "false"
          MACOS_GATEWAY_INPUT: ${{ github.workspace }}/macos-runtime/defenseclaw
        run: scripts/build-macos-app-release.sh "$RELEASE_VERSION" macos-candidate

      - name: Accept notarized or explicitly unverified macOS assets
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          VERIFICATION_STATUS: ${{ steps.app.outputs.verification_status }}
        run: |
          set -euo pipefail
          case "$VERIFICATION_STATUS" in
            "notarized")
              test -f "macos-candidate/DefenseClawMac-${RELEASE_TAG}-macos-arm64.dmg"
              test -f "macos-candidate/DefenseClawMac-${RELEASE_TAG}-macos-arm64.zip"
              echo "Developer ID signed and notarized macOS assets are ready."
              ;;
            "unverified")
              test -f "macos-candidate/DefenseClawMac-${RELEASE_TAG}-macos-arm64-unverified.dmg"
              test -f "macos-candidate/DefenseClawMac-${RELEASE_TAG}-macos-arm64-unverified.zip"
              echo "::warning title=Publishing unverified macOS assets::Apple credentials were absent; asset names explicitly carry the -unverified suffix."
              ;;
            *)
              echo "::error title=Unexpected macOS verification status::status=$VERIFICATION_STATUS"
              exit 1
              ;;
          esac

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.names.outputs.macos }}
          path: macos-candidate/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  windows-installer:
    name: Build and test native Windows Setup
    needs: [release-preflight, build-runtime-candidate]
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      UPGRADE_BASELINE_POLICY: ${{ github.workspace }}/effective-upgrade-baselines.json
    environment: release
    permissions:
      contents: read
    outputs:
      artifact_id: ${{ steps.windows-installer-artifact.outputs.artifact-id }}
      artifact_digest: ${{ steps.windows-installer-artifact.outputs.artifact-digest }}
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.release-preflight.outputs.baseline_artifact }}
          path: .

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          python-version: "3.13"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.build-runtime-candidate.outputs.artifact_id }}
          path: candidate-input/runtime
          merge-multiple: true

      - name: Extract authenticated Windows installer inputs
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RUNTIME_ARTIFACT_DIGEST: ${{ needs.build-runtime-candidate.outputs.artifact_digest }}
        run: |
          if ($env:RUNTIME_ARTIFACT_DIGEST -cnotmatch '^(?:sha256:)?[0-9a-f]{64}$') {
            throw 'The protected runtime artifact has no immutable SHA-256 digest.'
          }
          python scripts/release_candidate.py extract-windows-installer-inputs `
            --release-dir candidate-input/runtime `
            --output-dir windows-installer-inputs `
            --version "$env:RELEASE_TAG"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build native Setup with optional Authenticode
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_SIGNING_TIMESTAMP_URL }}
        run: >-
          ./scripts/build-windows-installer.ps1
          -DistRoot windows-installer-inputs
          -OutRoot windows-installer-output
          -StateRoot (Join-Path $env:RUNNER_TEMP 'defenseclaw-windows-installer-build')
          -Version $env:RELEASE_TAG
          -DistributionFlavor oss

      - name: Require explicit Windows signing status
        id: windows-verification
        run: |
          $provenance = Get-Content -LiteralPath windows-installer-output/DefenseClawSetup-x64.exe.provenance.json -Raw -Encoding UTF8 | ConvertFrom-Json
          if ($provenance.unsigned -eq $false -and
              $provenance.inputs.product_executables_authenticode_signed -eq $true) {
            $status = 'signed'
            Write-Host 'Cisco Authenticode-signed Windows Setup is ready.'
          } elseif ($provenance.unsigned -eq $true -and
                    $provenance.inputs.product_executables_authenticode_signed -eq $false) {
            $status = 'unverified'
            Write-Warning 'Authenticode credentials were absent; publishing an explicitly unverified Windows Setup.'
          } else {
            throw 'Windows Setup provenance has an inconsistent signing state.'
          }
          "verification_status=$status" >> $env:GITHUB_OUTPUT

      - name: Validate the exact installer lifecycle
        run: >-
          ./scripts/invoke-windows-setup-standard-user-ci.ps1
          -Mode setup-acceptance
          -ArtifactRoot windows-installer-output
          -StateRoot (Join-Path $env:RUNNER_TEMP 'defenseclaw-release-setup-acceptance')
          -DiagnosticsRoot (Join-Path $env:RUNNER_TEMP 'defenseclaw-release-setup-diagnostics')
          -TimeoutSeconds 2400

      - name: Upload native Setup diagnostics on failure
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-windows-setup-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/defenseclaw-release-setup-diagnostics/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload exact Windows Setup metadata
        id: windows-installer-artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-windows-installer-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            windows-installer-output/DefenseClawSetup-x64.exe
            windows-installer-output/DefenseClawSetup-x64.exe.sha256
            windows-installer-output/DefenseClawSetup-x64.exe.provenance.json
            windows-installer-output/DefenseClawSetup-x64.exe.sbom.json
          if-no-files-found: error
          retention-days: 7
          compression-level: 0


  assemble-release-candidate:
    name: Seal exact release candidate
    needs: [release-preflight, build-runtime-candidate, macos-app, windows-installer]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      UPGRADE_BASELINE_POLICY: ${{ github.workspace }}/effective-upgrade-baselines.json
    permissions:
      contents: read
      id-token: write
    outputs:
      artifact_name: ${{ steps.names.outputs.candidate }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Name immutable candidate artifact
        id: names
        run: echo "candidate=release-candidate-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.release-preflight.outputs.baseline_artifact }}
          path: .

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.build-runtime-candidate.outputs.artifact_name }}
          path: candidate-input/runtime

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.macos-app.outputs.artifact_name }}
          path: candidate-input/macos

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ needs.windows-installer.outputs.artifact_id }}
          path: candidate-input/windows
          merge-multiple: true

      - name: Require immutable Windows Setup artifact identity
        env:
          WINDOWS_INSTALLER_ARTIFACT_DIGEST: ${{ needs.windows-installer.outputs.artifact_digest }}
        run: |
          set -euo pipefail
          [[ "$WINDOWS_INSTALLER_ARTIFACT_DIGEST" =~ ^(sha256:)?[0-9a-f]{64}$ ]] || {
            echo "::error title=Missing Windows custody digest::The tested Setup artifact has no immutable SHA-256 digest."
            exit 1
          }

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
        with:
          cosign-release: "v2.6.2"

      - name: Resolve immutable published bridge provenance
        id: bridge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRIDGE_VERSION="$(python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(
              Path("candidate-input/runtime/upgrade-manifest.json").read_text(encoding="utf-8")
          )
          bridge = manifest.get("required_bridge_version", "")
          if not isinstance(bridge, str):
              raise SystemExit("required_bridge_version must be a string")
          print(bridge)
          PY
          )"
          if [[ -z "$BRIDGE_VERSION" ]]; then
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "Candidate does not require a published bridge."
            exit 0
          fi

          git fetch --force --no-tags origin \
            "refs/tags/$BRIDGE_VERSION:refs/tags/$BRIDGE_VERSION"
          BRIDGE_COMMIT="$(git rev-parse "refs/tags/$BRIDGE_VERSION^{commit}")"
          BRIDGE_TREE="$(git show -s --format=%T "$BRIDGE_COMMIT")"
          gh release view "$BRIDGE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,isImmutable,assets \
            > published-bridge.json
          mkdir -p candidate-input/bridge
          gh release download "$BRIDGE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --dir candidate-input/bridge \
            --pattern checksums.txt \
            --pattern checksums.txt.pem \
            --pattern checksums.txt.sig

          python3 - "$BRIDGE_VERSION" published-bridge.json candidate-input/bridge \
            effective-upgrade-baselines.json <<'PY'
          import hashlib
          import json
          from pathlib import Path
          import re
          import sys

          from scripts.release_candidate import (
              MACOS_VERIFICATION_STATUSES,
              _parse_checksums,
              payload_asset_names,
              published_asset_names,
              windows_release_binary_names,
          )

          expected, release_path, assets_path, baseline_policy_path = sys.argv[1:]
          release = json.loads(Path(release_path).read_text(encoding="utf-8"))
          baseline_policy = json.loads(
              Path(baseline_policy_path).read_text(encoding="utf-8")
          )
          platform_baselines = baseline_policy.get("platform_published_baselines")
          if not isinstance(platform_baselines, dict) or set(platform_baselines) != {"windows"}:
              raise SystemExit("bridge platform baseline policy must contain exactly windows")
          windows_baselines = platform_baselines["windows"]
          if (
              not isinstance(windows_baselines, list)
              or any(not isinstance(item, str) for item in windows_baselines)
              or len(windows_baselines) != len(set(windows_baselines))
          ):
              raise SystemExit("bridge Windows baseline policy is invalid")
          omit_windows_binaries = expected not in windows_baselines
          expected_state = {
              "tagName": expected,
              "isDraft": False,
              "isPrerelease": False,
              "isImmutable": True,
          }
          for name, value in expected_state.items():
              if release.get(name) != value or type(release.get(name)) is not type(value):
                  raise SystemExit(f"required bridge release state mismatch: {name}")
          rows = release.get("assets")
          if not isinstance(rows, list):
              raise SystemExit("required bridge assets must be a list")
          assets = {}
          for row in rows:
              if not isinstance(row, dict):
                  raise SystemExit("required bridge contains an invalid asset row")
              name = row.get("name")
              digest = row.get("digest")
              if not isinstance(name, str) or name in assets:
                  raise SystemExit("required bridge contains an invalid or duplicate asset name")
              if not isinstance(digest, str) or re.fullmatch(r"sha256:[0-9a-f]{64}", digest) is None:
                  raise SystemExit(f"required bridge lacks a SHA-256 digest for {name!r}")
              assets[name] = digest.removeprefix("sha256:")
          names = set(assets)
          variants = {
              status: set(
                  published_asset_names(
                      expected,
                      status,
                      omit_windows_binaries=omit_windows_binaries,
                  )
              )
              for status in MACOS_VERIFICATION_STATUSES
          }
          matches = [status for status, required in variants.items() if names == required]
          if len(matches) != 1:
              raise SystemExit("required bridge does not match one complete reviewed asset set")
          status = matches[0]
          root = Path(assets_path)
          checksums = _parse_checksums(root / "checksums.txt")
          if tuple(sorted(checksums)) != payload_asset_names(expected, status):
              raise SystemExit("required bridge checksums do not cover the exact payload")
          omitted_windows = (
              set(windows_release_binary_names(expected))
              if omit_windows_binaries
              else set()
          )
          for name, digest in checksums.items():
              if name in omitted_windows:
                  if name in assets:
                      raise SystemExit(f"required bridge unexpectedly published {name}")
                  continue
              if assets.get(name) != digest:
                  raise SystemExit(f"required bridge GitHub digest differs for {name}")
          for name in ("checksums.txt", "checksums.txt.pem", "checksums.txt.sig"):
              actual = hashlib.sha256((root / name).read_bytes()).hexdigest()
              if assets.get(name) != actual:
                  raise SystemExit(f"downloaded required bridge digest differs for {name}")
          publication = "POSIX-only" if omit_windows_binaries else "all-platform"
          print(f"immutable published bridge verified: {expected} ({status}, {publication})")
          PY

          python3 scripts/verify-sigstore-blob.py \
            --certificate candidate-input/bridge/checksums.txt.pem \
            --signature candidate-input/bridge/checksums.txt.sig \
            --certificate-identity \
              "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            candidate-input/bridge/checksums.txt
          BRIDGE_CHECKSUMS_SHA256="$(sha256sum candidate-input/bridge/checksums.txt | awk '{print $1}')"
          {
            echo "version=$BRIDGE_VERSION"
            echo "commit=$BRIDGE_COMMIT"
            echo "tree=$BRIDGE_TREE"
            echo "checksums_sha256=$BRIDGE_CHECKSUMS_SHA256"
          } >> "$GITHUB_OUTPUT"

      - name: Assemble checksummed candidate
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
          MACOS_STATUS: ${{ needs.macos-app.outputs.verification_status }}
          BRIDGE_VERSION: ${{ steps.bridge.outputs.version }}
          BRIDGE_COMMIT: ${{ steps.bridge.outputs.commit }}
          BRIDGE_TREE: ${{ steps.bridge.outputs.tree }}
          BRIDGE_CHECKSUMS_SHA256: ${{ steps.bridge.outputs.checksums_sha256 }}
        run: |
          set -euo pipefail
          provenance_args=()
          if [[ -n "$BRIDGE_VERSION" ]]; then
            SOURCE_TREE="$(git show -s --format=%T "$RELEASE_COMMIT")"
            provenance_args=(
              --source-tree "$SOURCE_TREE"
              --bridge-commit "$BRIDGE_COMMIT"
              --bridge-tree "$BRIDGE_TREE"
              --bridge-checksums-sha256 "$BRIDGE_CHECKSUMS_SHA256"
            )
          fi
          python3 scripts/release_candidate.py assemble \
            --runtime-dir candidate-input/runtime \
            --macos-dir candidate-input/macos \
            --windows-dir candidate-input/windows \
            --root release-candidate \
            --version "$RELEASE_TAG" \
            --commit "$RELEASE_COMMIT" \
            --macos-verification-status "$MACOS_STATUS" \
            --baseline-policy effective-upgrade-baselines.json \
            "${provenance_args[@]}"

      - name: Sign and authenticate public checksum manifest
        run: |
          set -euo pipefail
          cosign sign-blob \
            --yes \
            --bundle=release-candidate/dist/checksums.txt.bundle \
            --output-certificate=release-candidate/dist/checksums.txt.pem \
            --output-signature=release-candidate/dist/checksums.txt.sig \
            release-candidate/dist/checksums.txt
          python3 scripts/release_candidate.py canonicalize-certificate \
            --certificate release-candidate/dist/checksums.txt.pem
          python3 scripts/verify-sigstore-blob.py \
            --certificate release-candidate/dist/checksums.txt.pem \
            --signature release-candidate/dist/checksums.txt.sig \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            release-candidate/dist/checksums.txt

      - name: Seal all candidate bytes
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          python3 scripts/release_candidate.py seal \
            --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"
          python3 scripts/release_candidate.py verify \
            --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"

      # Bind the assembled candidate to an immutable Actions artifact.

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        id: upload
        with:
          name: ${{ steps.names.outputs.candidate }}
          path: release-candidate/
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Require candidate artifact digest output
        env:
          CANDIDATE_ARTIFACT_DIGEST: ${{ steps.upload.outputs.artifact-digest }}
        run: |
          set -euo pipefail
          if [[ ! "$CANDIDATE_ARTIFACT_DIGEST" =~ ^(sha256:)?[0-9a-f]{64}$ ]]; then
            echo "::error title=Missing candidate artifact digest::The pinned upload action did not return a lowercase SHA-256 digest."
            exit 1
          fi


  release-smoke:
    name: Test exact release candidate
    needs: [release-preflight, assemble-release-candidate]
    uses: ./.github/workflows/pre-release-certification.yml
    permissions:
      contents: read
      actions: read
    with:
      candidate_artifact: ${{ needs.assemble-release-candidate.outputs.artifact_name }}
      version: ${{ needs.release-preflight.outputs.tag }}
      commit: ${{ needs.release-preflight.outputs.commit }}
      baselines: ${{ needs.release-preflight.outputs.upgrade_baselines }}

  publish-release:
    name: Publish tested release
    needs: [release-preflight, assemble-release-candidate, release-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release-preflight.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
        with:
          cosign-release: "v2.6.2"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.assemble-release-candidate.outputs.artifact_name }}
          path: release-candidate

      - name: Verify the exact tested candidate
        env:
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          python3 scripts/release_candidate.py verify \
            --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"
          python3 scripts/verify-sigstore-blob.py \
            --certificate release-candidate/dist/checksums.txt.pem \
            --signature release-candidate/dist/checksums.txt.sig \
            --certificate-identity "https://github.com/$GITHUB_REPOSITORY/.github/workflows/release.yaml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            release-candidate/dist/checksums.txt

      - name: Recheck remote release namespace
        id: release-namespace
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          set +e
          python3 scripts/release_api_retry.py reconcile-create \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$RELEASE_TAG" \
            --commit "$RELEASE_COMMIT" \
            --candidate-root release-candidate
          namespace_status=$?
          set -e
          case "$namespace_status" in
            0) echo "create_required=false" >> "$GITHUB_OUTPUT" ;;
            10) echo "create_required=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error title=Release namespace conflict::Remote custody is neither absent nor the exact immutable candidate."; exit 1 ;;
          esac

      # With Immutable Releases enabled, current gh creates a draft, uploads
      # every selected sealed asset, and only then publishes. This is the only step
      # in the workflow that can create the remote release or tag.
      - name: Publish tag and selected sealed assets
        if: steps.release-namespace.outputs.create_required == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          echo "::notice title=Native Windows Setup included::The lifecycle-tested DefenseClawSetup-x64.exe and every sealed Linux, macOS, and Windows runtime asset are published together."
          mapfile -t names < <(
            python3 scripts/release_candidate.py list-assets \
              --root release-candidate --version "$RELEASE_TAG" --commit "$RELEASE_COMMIT"
          )
          assets=()
          for name in "${names[@]}"; do
            assets+=("release-candidate/dist/$name")
          done

          notes_args=()
          if [[ -f release-candidate/RELEASE_NOTES.md ]]; then
            notes_args=(--notes-file release-candidate/RELEASE_NOTES.md)
          else
            notes_args=(--generate-notes)
          fi

          published=0
          for attempt in 1 2 3; do
            if timeout --signal=TERM --kill-after=30s 10m \
              gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$RELEASE_COMMIT" \
              --title "$RELEASE_TAG" \
              "${notes_args[@]}" \
              "${assets[@]}"; then
              published=1
              break
            fi

            echo "::warning title=Release create returned an error::Reconciling remote custody before considering attempt $((attempt + 1))."
            set +e
            python3 scripts/release_api_retry.py reconcile-create \
              --repository "$GITHUB_REPOSITORY" \
              --tag "$RELEASE_TAG" \
              --commit "$RELEASE_COMMIT" \
              --candidate-root release-candidate
            reconcile_status=$?
            set -e
            if [[ "$reconcile_status" == "0" ]]; then
              published=1
              break
            fi
            if [[ "$reconcile_status" != "10" ]]; then
              echo "::error title=Ambiguous release create::Remote custody is neither absent nor the exact immutable candidate; refusing another create."
              exit 1
            fi
            if [[ "$attempt" == "3" ]]; then
              echo "::error title=Release API retries exhausted::The tag and release remained absent after three bounded create attempts."
              exit 1
            fi
            sleep $((attempt * 5))
          done
          [[ "$published" == "1" ]]

      - name: Prove published asset custody
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-preflight.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.release-preflight.outputs.commit }}
        run: |
          set -euo pipefail
          python3 scripts/release_api_retry.py prove-published \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$RELEASE_TAG" \
            --commit "$RELEASE_COMMIT" \
            --candidate-root release-candidate
          echo "Release $RELEASE_TAG published from tested commit $RELEASE_COMMIT"
