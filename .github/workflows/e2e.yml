name: E2E

on:
  push:
    branches: [main, demo, feat/e2e-ci]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-stack:
    name: Full Stack E2E
    runs-on: self-hosted
    timeout-minutes: 20
    env:
      OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SPLUNK_ACCESS_TOKEN: ${{ secrets.SPLUNK_ACCESS_TOKEN }}
      SPLUNK_REALM: ${{ secrets.SPLUNK_REALM }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      # Phase 0 — Nuke all DefenseClaw state (OpenClaw persists)
      - name: Clean DefenseClaw
        run: |
          defenseclaw-gateway stop 2>/dev/null || true
          openclaw gateway stop 2>/dev/null || true
          rm -rf ~/.defenseclaw
          rm -f ~/.local/bin/defenseclaw-gateway
          rm -rf ~/.openclaw/extensions/defenseclaw*
          echo "DefenseClaw fully removed"

      # Phase 1 — Start Splunk Docker (stays running for dashboard browsing via Tailscale)
      - name: Start Splunk
        run: |
          cd bundles/splunk_local_bridge
          # Package the local-mode Splunk app BEFORE starting the container.
          # Without this tarball Ansible's "Infer app filepath" task fails (exit 2).
          bash splunk/package_local_mode_app.sh
          cd compose
          SPLUNK_IMAGE=splunk/splunk-claw-bridge:10.2.0 \
            docker compose -f docker-compose.ci.yml up -d
          echo "Waiting for Splunk HEC..."
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8088/services/collector/health && break
            sleep 5
          done
          echo "Splunk HEC ready"

      # Phase 2 — Fresh install from this commit
      - name: Install DefenseClaw
        run: make install

      # Add venv and ~/.local/bin to PATH for all subsequent steps
      - name: Activate venv
        run: |
          echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Phase 3 — Initialize DefenseClaw + configure scanners + guardrail
      - name: Init DefenseClaw
        run: |
          defenseclaw init

          # --- Write ALL secrets to .env BEFORE any setup ---
          echo "OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}" >> ~/.defenseclaw/.env
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> ~/.defenseclaw/.env
          fi
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> ~/.defenseclaw/.env
          fi
          if [ -n "${SPLUNK_ACCESS_TOKEN:-}" ]; then
            echo "SPLUNK_ACCESS_TOKEN=${SPLUNK_ACCESS_TOKEN}" >> ~/.defenseclaw/.env
            echo "SPLUNK_REALM=${SPLUNK_REALM}" >> ~/.defenseclaw/.env
          fi

          # --- Setup skill-scanner with behavioral analysis enabled ---
          defenseclaw setup skill-scanner \
            --use-behavioral \
            --policy balanced \
            --non-interactive \
            --no-verify
          echo "  ✓ skill-scanner configured (behavioral + balanced policy)"

          # --- Setup mcp-scanner with yara + behavioral + instructions ---
          defenseclaw setup mcp-scanner \
            --analyzers yara,behavioral \
            --scan-instructions \
            --non-interactive
          echo "  ✓ mcp-scanner configured (yara + behavioral + instructions)"

          # --- Detect model from OpenClaw ---
          OC_MODEL=$(python3 -c "
          import json, os
          try:
              with open(os.path.expanduser('~/.openclaw/openclaw.json')) as f:
                  cfg = json.load(f)
              print(cfg.get('agents',{}).get('defaults',{}).get('model',{}).get('primary',''))
          except Exception:
              print('')
          ")
          echo "  OpenClaw model: ${OC_MODEL:-<not found>}"

          if [ -n "$OC_MODEL" ]; then
            MODEL_NAME=$(echo "$OC_MODEL" | sed 's|.*/||')
            API_KEY_ENV=""
            if echo "$OC_MODEL" | grep -qi "anthropic\|claude\|sonnet\|haiku\|opus"; then
              API_KEY_ENV="ANTHROPIC_API_KEY"
            elif echo "$OC_MODEL" | grep -qi "openai\|gpt\|o1\|o3\|o4"; then
              API_KEY_ENV="OPENAI_API_KEY"
            elif echo "$OC_MODEL" | grep -qi "bedrock\|amazon\|nova"; then
              API_KEY_ENV="AWS_ACCESS_KEY_ID"
              echo "  NOTE: Bedrock model detected — guardrail proxy may not support AWS SigV4 auth"
            else
              API_KEY_ENV="ANTHROPIC_API_KEY"
            fi
          else
            echo "  WARNING: No model found in openclaw.json — guardrail will be disabled"
          fi

          # --- Write combined config: Splunk + guardrail + skill_actions ---
          # We skip `defenseclaw setup splunk --logs` because the compose Splunk
          # container is already running on ports 8000/8088. The --logs command
          # would fail the port pre-flight check. Write config directly instead.
          echo "DEFENSECLAW_SPLUNK_HEC_TOKEN=00000000-0000-0000-0000-000000000001" >> ~/.defenseclaw/.env
          python3 -c "
          import yaml, os
          cfg_path = os.path.expanduser('~/.defenseclaw/config.yaml')
          with open(cfg_path) as f:
              cfg = yaml.safe_load(f) or {}

          # Splunk HEC (compose container already on :8088)
          cfg.setdefault('splunk', {})
          cfg['splunk']['enabled'] = True
          cfg['splunk']['hec_endpoint'] = 'http://127.0.0.1:8088'
          cfg['splunk']['index'] = 'defenseclaw_local'
          cfg['splunk']['source'] = 'defenseclaw'
          cfg['splunk']['sourcetype'] = 'defenseclaw:json'
          cfg['splunk']['verify_tls'] = False
          cfg['splunk']['batch_size'] = 50
          cfg['splunk']['flush_interval_s'] = 5
          cfg['splunk']['hec_token_env'] = 'DEFENSECLAW_SPLUNK_HEC_TOKEN'

          # Guardrail + skill_actions (only if model detected)
          model = '$OC_MODEL'
          if model:
              cfg.setdefault('guardrail', {})
              cfg['guardrail']['enabled'] = True
              cfg['guardrail']['mode'] = 'action'
              cfg['guardrail']['model'] = model
              cfg['guardrail']['model_name'] = '$MODEL_NAME'
              cfg['guardrail']['api_key_env'] = '$API_KEY_ENV'
              cfg['skill_actions'] = {
                  'critical': {'file': 'quarantine', 'runtime': 'disable', 'install': 'block'},
                  'high':     {'file': 'quarantine', 'runtime': 'disable', 'install': 'block'},
                  'medium':   {'file': 'none',       'runtime': 'enable',  'install': 'none'},
                  'low':      {'file': 'none',       'runtime': 'enable',  'install': 'none'},
              }

          with open(cfg_path, 'w') as f:
              yaml.dump(cfg, f, default_flow_style=False)
          print('  Config written: splunk=enabled guardrail={} model={}'.format(
              'action' if model else 'disabled', model or 'none'))
          "

          echo ""
          echo "  === Final config ==="
          cat ~/.defenseclaw/config.yaml | head -40
          echo ""
          echo "  === .env keys present ==="
          grep -oP '^\w+(?==)' ~/.defenseclaw/.env || true

          # Restart gateway to pick up all config
          defenseclaw-gateway restart || defenseclaw-gateway start
          sleep 5
          defenseclaw-gateway status

      # Phase 4 — Unit tests (fast fail before slow E2E)
      - name: Unit tests
        run: make test

      # Phase 5 — Full-stack E2E
      - name: E2E tests
        run: scripts/test-e2e-full-stack.sh
