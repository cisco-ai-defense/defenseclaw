name: E2E

on:
  push:
    branches: [main, demo, feat/e2e-ci]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-stack:
    name: Full Stack E2E
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
      SPLUNK_ACCESS_TOKEN: ${{ secrets.SPLUNK_ACCESS_TOKEN }}
      SPLUNK_REALM: ${{ secrets.SPLUNK_REALM }}
      E2E_TELEGRAM_USER_SESSION: ${{ secrets.E2E_TELEGRAM_USER_SESSION }}
      E2E_TELEGRAM_API_ID: ${{ secrets.E2E_TELEGRAM_API_ID }}
      E2E_TELEGRAM_API_HASH: ${{ secrets.E2E_TELEGRAM_API_HASH }}
      E2E_TELEGRAM_BOT_USERNAME: ${{ secrets.E2E_TELEGRAM_BOT_USERNAME }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      # Phase 0 — Nuke all DefenseClaw state (OpenClaw persists)
      - name: Clean DefenseClaw
        run: |
          defenseclaw-gateway stop 2>/dev/null || true
          openclaw gateway stop 2>/dev/null || true
          rm -rf ~/.defenseclaw
          rm -f ~/.local/bin/defenseclaw-gateway
          rm -rf ~/.openclaw/extensions/defenseclaw*
          echo "DefenseClaw fully removed"

      # Phase 1 — Start Splunk Docker (stays running for dashboard browsing via Tailscale)
      - name: Start Splunk
        run: |
          cd bundles/splunk_local_bridge/compose
          SPLUNK_IMAGE=splunk/splunk-claw-bridge:10.2.0 \
            docker compose -f docker-compose.ci.yml up -d
          echo "Waiting for Splunk HEC..."
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8088/services/collector/health && break
            sleep 5
          done
          echo "Splunk HEC ready"

      # Phase 2 — Fresh install from this commit
      - name: Install DefenseClaw
        run: make install

      # Add venv and ~/.local/bin to PATH for all subsequent steps
      - name: Activate venv
        run: |
          echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Phase 3 — Initialize DefenseClaw
      - name: Init DefenseClaw
        run: |
          defenseclaw init
          defenseclaw setup splunk --logs --accept-splunk-license --non-interactive

          # Write secrets to .env BEFORE guardrail setup
          echo "OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}" >> ~/.defenseclaw/.env
          if [ -n "${SPLUNK_ACCESS_TOKEN}" ]; then
            echo "SPLUNK_ACCESS_TOKEN=${SPLUNK_ACCESS_TOKEN}" >> ~/.defenseclaw/.env
            echo "SPLUNK_REALM=${SPLUNK_REALM}" >> ~/.defenseclaw/.env
          fi

          # Read model from openclaw.json and inject into defenseclaw config
          # (setup guardrail --non-interactive can't set model — no CLI flag)
          OC_MODEL=$(python3 -c "
          import json, os
          try:
              with open(os.path.expanduser('~/.openclaw/openclaw.json')) as f:
                  cfg = json.load(f)
              print(cfg.get('agents',{}).get('defaults',{}).get('model',{}).get('primary',''))
          except Exception:
              print('')
          ")
          echo "  OpenClaw model: ${OC_MODEL:-<not found>}"

          if [ -n "$OC_MODEL" ]; then
            MODEL_NAME=$(echo "$OC_MODEL" | sed 's|.*/||')
            API_KEY_ENV="ANTHROPIC_API_KEY"
            if echo "$OC_MODEL" | grep -qi "openai\|gpt\|o1"; then
              API_KEY_ENV="OPENAI_API_KEY"
            fi
            python3 -c "
          import yaml, os
          cfg_path = os.path.expanduser('~/.defenseclaw/config.yaml')
          with open(cfg_path) as f:
              cfg = yaml.safe_load(f)
          cfg.setdefault('guardrail', {})
          cfg['guardrail']['enabled'] = True
          cfg['guardrail']['mode'] = 'action'
          cfg['guardrail']['model'] = '$OC_MODEL'
          cfg['guardrail']['model_name'] = '$MODEL_NAME'
          cfg['guardrail']['api_key_env'] = '$API_KEY_ENV'
          # Enforce quarantine on HIGH/CRITICAL findings for E2E testing
          cfg['skill_actions'] = {
              'critical': {'file': 'quarantine', 'runtime': 'disable', 'install': 'block'},
              'high':     {'file': 'quarantine', 'runtime': 'disable', 'install': 'block'},
              'medium':   {'file': 'none',       'runtime': 'enable',  'install': 'none'},
              'low':      {'file': 'none',       'runtime': 'enable',  'install': 'none'},
          }
          with open(cfg_path, 'w') as f:
              yaml.dump(cfg, f, default_flow_style=False)
          print('  Config written: guardrail=action model=$OC_MODEL quarantine=HIGH+CRITICAL')
          "
          else
            echo "  WARNING: No model found in openclaw.json — guardrail will be disabled"
          fi

          echo "  Config:"
          cat ~/.defenseclaw/config.yaml | head -30

          # Restart gateway to pick up guardrail + token + enforcement config
          defenseclaw-gateway restart
          sleep 5
          defenseclaw-gateway status

      # Phase 4 — Unit tests (fast fail before slow E2E)
      - name: Unit tests
        run: make test

      # Phase 5 — Full-stack E2E
      - name: E2E tests
        run: scripts/test-e2e-full-stack.sh
