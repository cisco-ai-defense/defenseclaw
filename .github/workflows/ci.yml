      - run: make dev-pycli
      - run: make connector-matrix-test

  enterprise-hook-hardening:
    name: Enterprise Hook Hardening (${{ matrix.os }}, ${{ matrix.connector }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        connector: [codex, claudecode]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
