name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Top-level permissions are intentionally read-only. Per-job
# permissions overrides (none required at the moment) must remain
# minimum-privilege; opening up `contents: write`, `id-token: write`,
# or `packages: write` here would let a future build step that
# accidentally executed PR-supplied code escalate into the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # DeepSec S2.MEDIUM ("CI executes mutable action and tool
          # versions"): drop the GitHub credential after fetch so
          # downstream `make` steps cannot push or fetch on our
          # behalf if a transient compromise injects shell.
          persist-credentials: false
      # Catches drift between the four in-repo version sources (Makefile,
      # pyproject.toml, cli/__init__.py, package.json) before it can ship
      # in a release. The release workflow restamps from the git tag, but
      # PRs still need to keep the in-repo defaults in sync so local dev
      # builds (`make dist`) produce artifacts whose names match what
      # install.sh / `defenseclaw upgrade` will look up at the next tag.
      - run: make check-version-sync

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make go-lint

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make go-test-cov
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: go-coverage
          path: coverage.out

  go-build:
    name: Go Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make gateway-cross GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: defenseclaw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: defenseclaw-${{ matrix.goos }}-${{ matrix.goarch }}

  python-lint-test:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync
      - run: make py-lint
      - run: make cli-test-cov
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: python-coverage
          path: coverage-py.xml

  connector-matrix:
    name: Connector Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: make plugin
      - run: make dev-pycli
      - run: make connector-matrix-test

  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync
      - run: uv pip install pip pip-audit
      # TODO: Remove --ignore-vuln CVE-2026-4539 once pygments >= 2.19.3 is released
      # CVE-2026-4539: Low severity ReDoS in AdlLexer (local attack vector only)
      # TODO: Remove --ignore-vuln CVE-2026-28684 once cisco-ai-skill-scanner
      # releases a version that allows python-dotenv >= 1.2.2. Scanner 2.0.9
      # (the latest as of this commit) still pins python-dotenv==1.2.1.
      # CVE-2026-28684: python-dotenv 1.2.1 — pulled in only via out-of-process
      # Python scanner subprocesses, not linked into the gateway.
      # TODO: Remove --ignore-vuln CVE-2026-3219 once a fixed pip version is
      # released. No fix version available as of 2026-04-24. pip is only used
      # by pip-audit itself, not by DefenseClaw at runtime.
      # TODO: Remove --ignore-vuln CVE-2026-3219 once a fixed pip is released.
      # CVE-2026-3219: pip's interpretation conflict with concatenated tar/ZIP
      # archives. Medium severity; impacts only attacker-supplied package
      # archives. We install exclusively from PyPI via uv with locked hashes
      # (uv.lock), so this attack surface is not exposed in CI or runtime.
      - run: uv run pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-28684 --ignore-vuln CVE-2026-3219

  ts-build-test:
    name: TypeScript Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make ts-test

  ts-audit:
    name: npm Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/defenseclaw
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev

  rego-test:
    name: Rego Policy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0
        with:
          # DeepSec S2.MEDIUM ("CI executes mutable action and tool versions"):
          # version: latest let a malicious OPA release run inside CI and
          # tamper with policy test results. Pin to a known-good release
          # and refresh through reviewed dependency updates (Dependabot).
          version: 0.70.0
      - run: make rego-test

  schema-parity:
    name: Schema & Parity Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: make plugin
      - run: make dev-pycli
      - run: make check

  make-test:
    name: make test (unified)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: make plugin
      # dev-pycli installs the [dev] group (pytest, jsonschema, ruff)
      # which `make test → cli-test` indirectly needs at import time:
      # several cli/tests/*.py files use pytest fixtures/parametrize
      # and `python -m unittest discover` aborts on the first failed
      # import. The non-dev `make pycli` target only installs runtime
      # deps and broke this job after the S4.1/S4.2 connector_paths
      # tests landed.
      - run: make dev-pycli
      - run: make test
