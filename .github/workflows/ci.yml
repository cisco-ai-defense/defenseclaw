name: CI

on:
  push:
    branches: [main]
  # Run CI on every pull request regardless of base branch so PRs that
  # target an integration branch (not just main) are gated too — otherwise
  # their checks (incl. the Windows hook path) never execute until the
  # change reaches a main-targeting PR.
  pull_request:

# Top-level permissions are intentionally read-only. Per-job
# permissions overrides (none required at the moment) must remain
# minimum-privilege; opening up `contents: write`, `id-token: write`,
# or `packages: write` here would let a future build step that
# accidentally executed PR-supplied code escalate into the repo.
permissions:
  contents: read

concurrency:
  # Supersede old commits within one PR, but never cancel a previous main
  # merge's exact-SHA release canary when another merge lands.
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # CI action / tool version pinning: drop the GitHub
          # credential after fetch so downstream `make` steps cannot
          # push or fetch on our behalf if a transient compromise
          # injects shell.
          persist-credentials: false
      # Keep local-development package metadata internally consistent. The
      # release workflow dynamically stamps its dispatch version, so this
      # check does not pin or preselect the next release number.
      - run: make check-version-sync

  upgrade-manifest:
    name: Upgrade Manifest Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      # Ensures future releases carry a release-owned migration contract
      # before the release workflow publishes upgrade-manifest.json.
      - run: make check-upgrade-manifest

  release-validation-plan:
    name: Release Validation Plan
    runs-on: ubuntu-latest
    outputs:
      sensitive: ${{ steps.paths.outputs.sensitive }}
      pr_matrix: ${{ steps.pr.outputs.matrix }}
      medium_matrix: ${{ steps.medium.outputs.matrix }}
      candidate_version: ${{ steps.version.outputs.candidate_version }}
      latest_stable: ${{ steps.version.outputs.latest_stable }}
      baseline_artifact: ${{ steps.baseline-name.outputs.name }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: paths
        name: Detect release-sensitive paths without network access
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            python3 scripts/release_certification.py paths \
              --base "$BASE_SHA" --head "$HEAD_SHA" \
              --github-output "$GITHUB_OUTPUT"
          else
            echo 'sensitive=false' >> "$GITHUB_OUTPUT"
          fi
      - id: version
        if: ${{ github.event_name == 'push' || steps.paths.outputs.sensitive == 'true' }}
        name: Resolve candidate against live stable state when needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --paginate --slurp \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            > published-releases.json
          source_version="$(python3 scripts/source_release_identity.py check --machine | cut -f1)"
          python3 scripts/release_certification.py resolve-version \
            --source-version "$source_version" \
            --published-releases published-releases.json \
            --github-output "$GITHUB_OUTPUT" >/dev/null
      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
        if: ${{ github.event_name == 'push' || steps.paths.outputs.sensitive == 'true' }}
      - id: baseline-name
        if: ${{ github.event_name == 'push' || steps.paths.outputs.sensitive == 'true' }}
        run: echo "name=ci-effective-upgrade-baselines-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"
      - id: baselines
        if: ${{ github.event_name == 'push' || steps.paths.outputs.sensitive == 'true' }}
        name: Resolve one authenticated effective baseline snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CANDIDATE_VERSION: ${{ steps.version.outputs.candidate_version }}
        run: |
          set -euo pipefail
          python3 scripts/resolve_upgrade_baselines.py \
            --target-version "$CANDIDATE_VERSION" \
            --output effective-upgrade-baselines.json
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: ${{ github.event_name == 'push' || steps.paths.outputs.sensitive == 'true' }}
        with:
          name: ${{ steps.baseline-name.outputs.name }}
          path: effective-upgrade-baselines.json
          if-no-files-found: error
          retention-days: 2
      - id: pr
        if: ${{ github.event_name == 'pull_request' && steps.paths.outputs.sensitive == 'true' }}
        name: Select risky-PR baselines by behavior class
        env:
          CANDIDATE_VERSION: ${{ steps.version.outputs.candidate_version }}
          LATEST_STABLE: ${{ steps.version.outputs.latest_stable }}
        run: |
          python3 scripts/release_certification.py select-baselines \
            --baselines effective-upgrade-baselines.json \
            --scope pr \
            --candidate-version "$CANDIDATE_VERSION" \
            --latest-stable "$LATEST_STABLE" \
            --github-output "$GITHUB_OUTPUT" >/dev/null
      - id: medium
        if: ${{ github.event_name == 'push' }}
        name: Select main-merge smoke by behavior class
        env:
          CANDIDATE_VERSION: ${{ steps.version.outputs.candidate_version }}
          LATEST_STABLE: ${{ steps.version.outputs.latest_stable }}
        run: |
          python3 scripts/release_certification.py select-baselines \
            --baselines effective-upgrade-baselines.json \
            --scope medium \
            --candidate-version "$CANDIDATE_VERSION" \
            --latest-stable "$LATEST_STABLE" \
            --github-output "$GITHUB_OUTPUT" >/dev/null

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make go-lint

  go-test-gateway:
    name: Go Gateway Test (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - name: Run gateway race/coverage shard
        env:
          GO_TEST_SHARD: ${{ matrix.shard }}
          GO_TEST_SHARDS: 4
        run: |
          set -euo pipefail
          test_regex="$(python3 scripts/go_test_shards.py \
            --package-dir internal/gateway \
            --shard-count "$GO_TEST_SHARDS" \
            --shard-index "$GO_TEST_SHARD")"
          go test -race -count=1 -timeout 45m \
            -coverprofile="coverage-go-gateway-$GO_TEST_SHARD.out" \
            -run "$test_regex" \
            ./internal/gateway
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: go-coverage-gateway-${{ matrix.shard }}
          path: coverage-go-gateway-${{ matrix.shard }}.out
          retention-days: 1

  go-test-other:
    name: Go Test (remaining packages)
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - name: Run remaining Go race/coverage suite once
        run: |
          set -euo pipefail
          mapfile -t packages < <(
            go list ./... | grep -v '^github.com/defenseclaw/defenseclaw/internal/gateway$'
          )
          test "${#packages[@]}" -gt 0
          go test -race -count=1 -timeout 45m \
            -coverprofile=coverage-go-other.out \
            "${packages[@]}"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: go-coverage-other
          path: coverage-go-other.out
          retention-days: 1

  go-test:
    # Preserve the existing required-check name while combining the complete
    # race/coverage suite from the gateway shards and all remaining packages.
    name: Go Test
    needs: [go-test-gateway, go-test-other]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require every Go test partition
        env:
          GATEWAY_RESULT: ${{ needs.go-test-gateway.result }}
          OTHER_RESULT: ${{ needs.go-test-other.result }}
        run: test "$GATEWAY_RESULT" = success && test "$OTHER_RESULT" = success
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: go-coverage-*
          path: coverage-parts
          merge-multiple: true
      - name: Combine Go coverage
        run: |
          set -euo pipefail
          mapfile -t coverage_parts < <(
            find coverage-parts -type f -name 'coverage-go-*.out' -print | sort
          )
          test "${#coverage_parts[@]}" -eq 5
          python3 scripts/merge_go_coverage.py \
            --output coverage.out \
            "${coverage_parts[@]}"
          go tool cover -func=coverage.out >/dev/null
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: go-coverage
          path: coverage.out

  go-build:
    name: Go Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make gateway-cross GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: defenseclaw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: defenseclaw-${{ matrix.goos }}-${{ matrix.goarch }}

  python-test:
    name: Python Test (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync
      - run: make _bundle-data
      - name: Run Python coverage shard
        env:
          PYTHON_TEST_SHARD: ${{ matrix.shard }}
          PYTHON_TEST_SHARDS: 4
        run: |
          set -euo pipefail
          mapfile -t test_files < <(
            python3 scripts/python_test_shards.py \
              --shard-count "$PYTHON_TEST_SHARDS" \
              --shard-index "$PYTHON_TEST_SHARD" \
              --exclude cli/tests/test_telemetry_registry_generator.py \
              --exclude cli/tests/test_telemetry_registry_candidate_renderer.py
          )
          test "${#test_files[@]}" -gt 0
          COVERAGE_FILE="coverage-py-shard-$PYTHON_TEST_SHARD" \
            .venv/bin/python -m pytest "${test_files[@]}" \
              -q --tb=short \
              --durations=25 \
              --cov=defenseclaw \
              --cov-report=
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: python-coverage-part-regular-${{ matrix.shard }}
          path: coverage-py-shard-${{ matrix.shard }}
          retention-days: 1

  python-telemetry-test:
    name: Python Telemetry Test (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: registry-generator
            test_file: cli/tests/test_telemetry_registry_generator.py
          - suite: candidate-renderer
            test_file: cli/tests/test_telemetry_registry_candidate_renderer.py
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync
      - run: make _bundle-data
      - name: Run telemetry registry suite with node-level workers
        env:
          PYTHON_TELEMETRY_SUITE: ${{ matrix.suite }}
          PYTHON_TELEMETRY_TEST_FILE: ${{ matrix.test_file }}
        run: |
          set -euo pipefail
          COVERAGE_FILE="coverage-py-telemetry-$PYTHON_TELEMETRY_SUITE" \
            .venv/bin/python -m pytest "$PYTHON_TELEMETRY_TEST_FILE" \
              -q --tb=short \
              --durations=25 \
              --numprocesses=4 \
              --dist=worksteal \
              --cov=defenseclaw \
              --cov-report=
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: python-coverage-part-telemetry-${{ matrix.suite }}
          path: coverage-py-telemetry-${{ matrix.suite }}
          retention-days: 1

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync
      - run: make py-lint

  python-lint-test:
    # Preserve the existing required-check name while making it the single
    # authority over lint, every isolated test partition, and combined coverage.
    name: Python Lint & Test
    needs: [python-test, python-telemetry-test, python-lint]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require lint and every Python test partition
        env:
          PYTHON_REGULAR_RESULT: ${{ needs.python-test.result }}
          PYTHON_TELEMETRY_RESULT: ${{ needs.python-telemetry-test.result }}
          PYTHON_LINT_RESULT: ${{ needs.python-lint.result }}
        run: |
          test "$PYTHON_REGULAR_RESULT" = success
          test "$PYTHON_TELEMETRY_RESULT" = success
          test "$PYTHON_LINT_RESULT" = success
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: python-coverage-part-*
          path: coverage-parts
          merge-multiple: true
      - name: Combine Python coverage
        run: |
          set -euo pipefail
          mapfile -t coverage_parts < <(
            find coverage-parts -type f -name 'coverage-py-*' -print | sort
          )
          test "${#coverage_parts[@]}" -eq 6
          .venv/bin/coverage combine "${coverage_parts[@]}"
          .venv/bin/coverage xml -o coverage-py.xml
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: python-coverage
          path: coverage-py.xml

  python-wheel-install:
    name: Python Wheel Install (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: make dist-cli
      - shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          whl="$(find dist -maxdepth 1 -name 'defenseclaw-*.whl' -print -quit)"
          test -n "$whl"
          python3 - "$whl" "$tmp/telemetry-resource-digests.json" <<'PY'
          import gzip
          import hashlib
          import json
          import sys
          import zipfile
          from pathlib import Path

          wheel = Path(sys.argv[1])
          digest_path = Path(sys.argv[2])
          sources = {
              "defenseclaw/_data/telemetry/v8/telemetry.schema.json": Path(
                  "schemas/telemetry/runtime/telemetry.schema.json.gz"
              ),
              "defenseclaw/_data/telemetry/v8/catalog.json": Path(
                  "schemas/telemetry/runtime/catalog.json.gz"
              ),
              "defenseclaw/_data/telemetry/v8/v7-exporter-selection.json": Path(
                  "schemas/telemetry/runtime/compatibility/v7-exporter-selection.json.gz"
              ),
              "defenseclaw/_data/telemetry/v8/galileo-rich-v2.json": Path(
                  "schemas/telemetry/runtime/compatibility/galileo-rich-v2.json.gz"
              ),
              "defenseclaw/_data/telemetry/v8/local-observability-v1.json": Path(
                  "schemas/telemetry/runtime/compatibility/local-observability-v1.json.gz"
              ),
              "defenseclaw/_data/telemetry/v8/openinference-v1.json": Path(
                  "schemas/telemetry/runtime/compatibility/openinference-v1.json.gz"
              ),
          }
          with zipfile.ZipFile(wheel) as archive:
              packaged = {
                  name for name in archive.namelist()
                  if name.startswith("defenseclaw/_data/telemetry/v8/") and not name.endswith("/")
              }
              if packaged != set(sources):
                  raise SystemExit(f"unexpected telemetry wheel resources: {sorted(packaged)}")
              digests = {}
              for member, source_path in sources.items():
                  source = gzip.decompress(source_path.read_bytes())
                  bundled = archive.read(member)
                  if bundled != source:
                      raise SystemExit(f"wheel resource drift: {member}")
                  json.loads(bundled)
                  digests[Path(member).name] = hashlib.sha256(source).hexdigest()
          digest_path.write_text(json.dumps(digests), encoding="utf-8")
          PY
          uv --no-config venv "$tmp/venv" --python "${{ matrix.python-version }}"
          uv --no-config pip install --python "$tmp/venv/bin/python" "$whl"
          "$tmp/venv/bin/defenseclaw" --help >/dev/null
          (
            cd "$tmp"
            PYTHONNOUSERSITE=1 PYTHONPATH= "$tmp/venv/bin/python" - "$tmp/telemetry-resource-digests.json" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          import defenseclaw.observability.schema_resources as resource_module

          expected = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          module_path = Path(resource_module.__file__).resolve()
          if not module_path.is_relative_to(Path(sys.prefix).resolve()):
              raise SystemExit(f"telemetry resource API was not imported from the installed wheel: {module_path}")
          resources = {
              "telemetry.schema.json": resource_module.telemetry_v8_schema_bytes(),
              "catalog.json": resource_module.telemetry_v8_catalog_bytes(),
          }
          for name, payload in resources.items():
              if hashlib.sha256(payload).hexdigest() != expected[name]:
                  raise SystemExit(f"installed telemetry resource drift: {name}")
              json.loads(payload)
          PY
          )

  upgrade-smoke:
    name: Release Regression (deterministic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      # A PR cannot mint release.yaml@refs/heads/main's Fulcio identity. Keep
      # ordinary CI deterministic and exercise the signed positive/live paths
      # only in nightly/manual certification.
      - name: Run fast release regression contracts
        run: |
          uv run python -m pytest -q \
            cli/tests/test_verify_sigstore_blob.py \
            cli/tests/test_observability_v8_upgrade_continuity_checker.py \
            cli/tests/test_resolve_upgrade_baselines.py \
            cli/tests/test_release_workflow_staged.py \
            cli/tests/test_upgrade_smoke_static.py \
            cli/tests/test_upgrade_release_smoke_contract.py \
            cli/tests/test_release_certification.py \
            cli/tests/test_release_validation_strategy.py

  unsigned-upgrade-candidate:
    name: Build selective exact-SHA upgrade candidate once
    needs: release-validation-plan
    if: >-
      ${{
        (github.event_name == 'pull_request' && needs.release-validation-plan.outputs.sensitive == 'true') ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      }}
    runs-on: ubuntu-latest
    env:
      UPGRADE_BASELINE_POLICY: ${{ github.workspace }}/effective-upgrade-baselines.json
    timeout-minutes: 25
    outputs:
      artifact_name: ${{ steps.name.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - id: name
        run: echo "artifact_name=unsigned-upgrade-candidate-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.release-validation-plan.outputs.baseline_artifact }}
          path: .
      - id: prepare
        name: Build exact PR SHA developer candidate
        run: |
          set -euo pipefail
          scripts/test-upgrade-release.sh \
            --prepare-only \
            --platform linux/amd64 \
            --target-version "${{ needs.release-validation-plan.outputs.candidate_version }}" \
            --keep-workdir | tee prepare-candidate.log
          root="$(sed -n 's/^OK: Prepared candidate release root: //p' prepare-candidate.log | tail -1)"
          test -d "$root"
          echo "root=$root" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: ${{ steps.name.outputs.artifact_name }}
          path: ${{ steps.prepare.outputs.root }}/
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  selective-upgrade-smoke:
    name: Selective upgrade (${{ matrix.class }} / ${{ matrix.baseline }})
    needs: [release-validation-plan, unsigned-upgrade-candidate]
    if: >-
      ${{
        github.event_name == 'pull_request' &&
        needs.release-validation-plan.outputs.sensitive == 'true'
      }}
    runs-on: ubuntu-latest
    env:
      UPGRADE_BASELINE_POLICY: ${{ github.workspace }}/effective-upgrade-baselines.json
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.release-validation-plan.outputs.pr_matrix) }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.unsigned-upgrade-candidate.outputs.artifact_name }}
          path: unsigned-candidate
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.release-validation-plan.outputs.baseline_artifact }}
          path: .
      - name: Run selected deterministic success/refusal contract
        env:
          BASELINE: ${{ matrix.baseline }}
          CANDIDATE_VERSION: ${{ needs.release-validation-plan.outputs.candidate_version }}
          RISK_CLASS: ${{ matrix.class }}
          VALIDATION_MODE: ${{ matrix.mode }}
          EXPECTED_RESULT: ${{ matrix.expected }}
        run: |
          set -euo pipefail
          echo "Selected release risk class: $RISK_CLASS ($VALIDATION_MODE → $EXPECTED_RESULT)"
          # An unsigned PR cannot prove production resolver success. Exercise
          # the target-owned migration and fresh-process health in a throwaway
          # HOME, while the production protocol harness proves pre-mutation
          # refusal. Signed resolver/handoff success belongs to certification.
          run_success() {
            scripts/test-developer-target-activation.sh \
              --from-version "$BASELINE" \
              --target-version "$CANDIDATE_VERSION" \
              --release-root "$GITHUB_WORKSPACE/unsigned-candidate" \
              --baseline-mode seed \
              --health-timeout 60
          }
          run_refusal() {
            scripts/test-upgrade-protocol-release.sh \
              --from-version "$BASELINE" \
              --target-version "$CANDIDATE_VERSION" \
              --release-root "$GITHUB_WORKSPACE/unsigned-candidate" \
              --baseline-mode seed \
              --refusal-contract-only
          }
          case "$EXPECTED_RESULT" in
            success) run_success ;;
            refusal-before-mutation) run_refusal ;;
            success-and-refusal) run_success; run_refusal ;;
            *)
              echo "::error title=Unknown selective validation result::$EXPECTED_RESULT"
              exit 1
              ;;
          esac

  main-release-smoke:
    name: Main Release Candidate Smoke (${{ matrix.class }})
    needs: [release-validation-plan, unsigned-upgrade-candidate]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      UPGRADE_BASELINE_POLICY: ${{ github.workspace }}/effective-upgrade-baselines.json
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.release-validation-plan.outputs.medium_matrix) }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.unsigned-upgrade-candidate.outputs.artifact_name }}
          path: unsigned-candidate
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.release-validation-plan.outputs.baseline_artifact }}
          path: .
      - name: Run exact-SHA candidate representative upgrade canary
        env:
          BASELINE: ${{ matrix.baseline }}
          RISK_CLASS: ${{ matrix.class }}
          CANDIDATE_VERSION: ${{ needs.release-validation-plan.outputs.candidate_version }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          make check-upgrade-manifest
          scripts/test-developer-target-activation.sh \
            --from-version "$BASELINE" \
            --target-version "$CANDIDATE_VERSION" \
            --release-root "$GITHUB_WORKSPACE/unsigned-candidate" \
            --baseline-mode seed \
            --baseline-dependencies published \
            --health-timeout 60

  connector-matrix:
    name: Connector Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
