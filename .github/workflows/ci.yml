name: CI

on:
  push:
    branches: [main]
  # Run CI on every pull request regardless of base branch so PRs that
  # target an integration branch (not just main) are gated too — otherwise
  # their checks (incl. the Windows hook path) never execute until the
  # change reaches a main-targeting PR.
  pull_request:

# Top-level permissions are intentionally read-only. Per-job
# permissions overrides (none required at the moment) must remain
# minimum-privilege; opening up `contents: write`, `id-token: write`,
# or `packages: write` here would let a future build step that
# accidentally executed PR-supplied code escalate into the repo.
permissions:
  contents: read

concurrency:
  # Supersede old commits within one PR, but never cancel a previous main
  # merge's exact-SHA release canary when another merge lands.
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # CI action / tool version pinning: drop the GitHub
          # credential after fetch so downstream `make` steps cannot
          # push or fetch on our behalf if a transient compromise
          # injects shell.
          persist-credentials: false
      # Keep local-development package metadata internally consistent. The
      # release workflow dynamically stamps its dispatch version, so this
      # check does not pin or preselect the next release number.
      - run: make check-version-sync

  upgrade-manifest:
    name: Upgrade Manifest Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      # Ensures future releases carry a release-owned migration contract
      # before the release workflow publishes upgrade-manifest.json.
      - run: make check-upgrade-manifest

  release-validation-plan:
    name: Release Validation Plan
    runs-on: ubuntu-latest
    outputs:
      sensitive: ${{ steps.paths.outputs.sensitive }}
      pr_matrix: ${{ steps.pr.outputs.matrix }}
      medium_matrix: ${{ steps.medium.outputs.matrix }}
      candidate_version: ${{ steps.version.outputs.candidate_version }}
      latest_stable: ${{ steps.version.outputs.latest_stable }}
      baseline_artifact: ${{ steps.baseline-name.outputs.name }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: paths
        name: Detect release-sensitive paths without network access
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            python3 scripts/release_certification.py paths \
              --base "$BASE_SHA" --head "$HEAD_SHA" \
              --github-output "$GITHUB_OUTPUT"
          else
            echo 'sensitive=false' >> "$GITHUB_OUTPUT"
          fi
      - id: version
        if: ${{ github.event_name == 'push' || steps.paths.outputs.sensitive == 'true' }}
        name: Resolve candidate against live stable state when needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --paginate --slurp \
            -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            > published-releases.json
          source_version="$(python3 scripts/source_release_identity.py check --machine | cut -f1)"
          python3 scripts/release_certification.py resolve-version \
            --source-version "$source_version" \
            --published-releases published-releases.json \
            --github-output "$GITHUB_OUTPUT" >/dev/null
      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
        if: ${{ github.event_name == 'push' || steps.paths.outputs.sensitive == 'true' }}
      - id: baseline-name
        if: ${{ github.event_name == 'push' || steps.paths.outputs.sensitive == 'true' }}
        run: echo "name=ci-effective-upgrade-baselines-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"
      - id: baselines
        if: ${{ github.event_name == 'push' || steps.paths.outputs.sensitive == 'true' }}
        name: Resolve one authenticated effective baseline snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CANDIDATE_VERSION: ${{ steps.version.outputs.candidate_version }}
        run: |
          set -euo pipefail
          python3 scripts/resolve_upgrade_baselines.py \
            --target-version "$CANDIDATE_VERSION" \
            --output effective-upgrade-baselines.json
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: ${{ github.event_name == 'push' || steps.paths.outputs.sensitive == 'true' }}
        with:
          name: ${{ steps.baseline-name.outputs.name }}
          path: effective-upgrade-baselines.json
          if-no-files-found: error
          retention-days: 2
      - id: pr
        if: ${{ github.event_name == 'pull_request' && steps.paths.outputs.sensitive == 'true' }}
        name: Select risky-PR baselines by behavior class
        env:
          CANDIDATE_VERSION: ${{ steps.version.outputs.candidate_version }}
          LATEST_STABLE: ${{ steps.version.outputs.latest_stable }}
        run: |
          python3 scripts/release_certification.py select-baselines \
            --baselines effective-upgrade-baselines.json \
            --scope pr \
            --candidate-version "$CANDIDATE_VERSION" \
            --latest-stable "$LATEST_STABLE" \
            --github-output "$GITHUB_OUTPUT" >/dev/null
      - id: medium
        if: ${{ github.event_name == 'push' }}
        name: Select main-merge smoke by behavior class
        env:
          CANDIDATE_VERSION: ${{ steps.version.outputs.candidate_version }}
          LATEST_STABLE: ${{ steps.version.outputs.latest_stable }}
        run: |
          python3 scripts/release_certification.py select-baselines \
            --baselines effective-upgrade-baselines.json \
            --scope medium \
            --candidate-version "$CANDIDATE_VERSION" \
            --latest-stable "$LATEST_STABLE" \
            --github-output "$GITHUB_OUTPUT" >/dev/null

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make go-lint

  go-test-gateway:
    name: Go Gateway Test (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - name: Run gateway race/coverage shard
        env:
          GO_TEST_SHARD: ${{ matrix.shard }}
          GO_TEST_SHARDS: 4
        run: |
          set -euo pipefail
          test_regex="$(python3 scripts/go_test_shards.py \
            --package-dir internal/gateway \
            --shard-count "$GO_TEST_SHARDS" \
            --shard-index "$GO_TEST_SHARD")"
          go test -race -count=1 -timeout 45m \
            -coverprofile="coverage-go-gateway-$GO_TEST_SHARD.out" \
            -run "$test_regex" \
            ./internal/gateway
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: go-coverage-gateway-${{ matrix.shard }}
          path: coverage-go-gateway-${{ matrix.shard }}.out
          retention-days: 1

  go-test-other:
    name: Go Test (remaining packages)
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      # extensions = plugin + sync-openclaw-extension. go-test-other includes
      # internal/gateway/connector, whose Setup test requires dist/index.js in
      # the //go:embed tree (make plugin alone leaves a stale/partial embed).
      - run: make extensions
      - name: Run remaining Go race/coverage suite once
        run: |
          set -euo pipefail
          mapfile -t packages < <(
            go list ./... | grep -v '^github.com/defenseclaw/defenseclaw/internal/gateway$'
          )
          test "${#packages[@]}" -gt 0
          go test -race -count=1 -timeout 45m \
            -coverprofile=coverage-go-other.out \
            "${packages[@]}"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: go-coverage-other
          path: coverage-go-other.out
          retention-days: 1

  go-test:
    # Preserve the existing required-check name while combining the complete
    # race/coverage suite from the gateway shards and all remaining packages.
    name: Go Test
    needs: [go-test-gateway, go-test-other]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require every Go test partition
        env:
          GATEWAY_RESULT: ${{ needs.go-test-gateway.result }}
          OTHER_RESULT: ${{ needs.go-test-other.result }}
        run: test "$GATEWAY_RESULT" = success && test "$OTHER_RESULT" = success
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: go-coverage-*
          path: coverage-parts
          merge-multiple: true
      - name: Combine Go coverage
        run: |
          set -euo pipefail
          mapfile -t coverage_parts < <(
            find coverage-parts -type f -name 'coverage-go-*.out' -print | sort
          )
          test "${#coverage_parts[@]}" -eq 5
          python3 scripts/merge_go_coverage.py \
            --output coverage.out \
            "${coverage_parts[@]}"
          go tool cover -func=coverage.out >/dev/null
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: go-coverage
          path: coverage.out

  go-build:
    name: Go Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make gateway-cross GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: defenseclaw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: defenseclaw-${{ matrix.goos }}-${{ matrix.goarch }}

  python-test:
    name: Python Test (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync
      - run: make _bundle-data
      - name: Run Python coverage shard
        env:
          PYTHON_TEST_SHARD: ${{ matrix.shard }}
          PYTHON_TEST_SHARDS: 4
        run: |
          set -euo pipefail
          mapfile -t test_files < <(
            python3 scripts/python_test_shards.py \
              --shard-count "$PYTHON_TEST_SHARDS" \
              --shard-index "$PYTHON_TEST_SHARD" \
              --exclude cli/tests/test_telemetry_registry_generator.py \
              --exclude cli/tests/test_telemetry_registry_candidate_renderer.py
          )
          test "${#test_files[@]}" -gt 0
          COVERAGE_FILE="coverage-py-shard-$PYTHON_TEST_SHARD" \
            .venv/bin/python -m pytest "${test_files[@]}" \
              -q --tb=short \
              --durations=25 \
              --cov=defenseclaw \
              --cov-report=
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: python-coverage-part-regular-${{ matrix.shard }}
          path: coverage-py-shard-${{ matrix.shard }}
          retention-days: 1

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync
      - run: make py-lint

  python-lint-test:
    # Preserve the existing required-check name while making it the single
    # authority over lint, every isolated test partition, and combined coverage.
    name: Python Lint & Test
    needs: [python-test, python-lint]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require lint and every Python test partition
        env:
          PYTHON_REGULAR_RESULT: ${{ needs.python-test.result }}
          PYTHON_LINT_RESULT: ${{ needs.python-lint.result }}
        run: |
          test "$PYTHON_REGULAR_RESULT" = success
          test "$PYTHON_LINT_RESULT" = success
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: python-coverage-part-*
          path: coverage-parts
          merge-multiple: true
      - name: Combine Python coverage
        run: |
          set -euo pipefail
          mapfile -t coverage_parts < <(
            find coverage-parts -type f -name 'coverage-py-*' -print | sort
          )
          test "${#coverage_parts[@]}" -eq 4
          .venv/bin/coverage combine "${coverage_parts[@]}"
          .venv/bin/coverage xml -o coverage-py.xml
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: python-coverage
          path: coverage-py.xml

  python-wheel-install:
    name: Python Wheel Security Contract (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: make dist-cli
      - shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          whl="$(find dist -maxdepth 1 -name 'defenseclaw-*.whl' -print -quit)"
          test -n "$whl"
          python3 - "$whl" "$tmp/telemetry-resource-digests.json" <<'PY'
          import email
          import gzip
          import hashlib
          import json
          import re
          import sys
          import zipfile
          from pathlib import Path

          wheel = Path(sys.argv[1])
          digest_path = Path(sys.argv[2])
          sources = {
              "defenseclaw/_data/telemetry/v8/telemetry.schema.json": Path(
                  "schemas/telemetry/runtime/telemetry.schema.json.gz"
              ),
              "defenseclaw/_data/telemetry/v8/catalog.json": Path(
                  "schemas/telemetry/runtime/catalog.json.gz"
              ),
              "defenseclaw/_data/telemetry/v8/v7-exporter-selection.json": Path(
                  "schemas/telemetry/runtime/compatibility/v7-exporter-selection.json.gz"
              ),
              "defenseclaw/_data/telemetry/v8/galileo-rich-v2.json": Path(
                  "schemas/telemetry/runtime/compatibility/galileo-rich-v2.json.gz"
              ),
              "defenseclaw/_data/telemetry/v8/local-observability-v1.json": Path(
                  "schemas/telemetry/runtime/compatibility/local-observability-v1.json.gz"
              ),
              "defenseclaw/_data/telemetry/v8/openinference-v1.json": Path(
                  "schemas/telemetry/runtime/compatibility/openinference-v1.json.gz"
              ),
          }
          security_floors = {
              "cryptography": ">=48.0.1,<49",
              "python-dotenv": ">=1.2.2",
              "python-multipart": ">=0.0.31",
              "urllib3": ">=2.7.0",
              "idna": ">=3.15",
              "pydantic-settings": ">=2.14.2",
              "aiohttp": ">=3.14.1,<4",
              "pyjwt": ">=2.13.0",
              "starlette": ">=1.3.1,<1.4",
              "fastapi": ">=0.137.1,<0.138",
              # Keep the portable LiteLLM line in wheel metadata. A tool.uv
              # override is not shipped and cannot protect installers.
              "litellm": ">=1.84.0,<1.92.0",
          }
          with zipfile.ZipFile(wheel) as archive:
              metadata_name = next(
                  name for name in archive.namelist()
                  if name.endswith(".dist-info/METADATA")
              )
              metadata = email.message_from_bytes(archive.read(metadata_name))
              packaged = {
                  name for name in archive.namelist()
                  if name.startswith("defenseclaw/_data/telemetry/v8/") and not name.endswith("/")
              }
              if packaged != set(sources):
                  raise SystemExit(f"unexpected telemetry wheel resources: {sorted(packaged)}")
              digests = {}
              for member, source_path in sources.items():
                  source = gzip.decompress(source_path.read_bytes())
                  bundled = archive.read(member)
                  if bundled != source:
                      raise SystemExit(f"wheel resource drift: {member}")
                  json.loads(bundled)
                  digests[Path(member).name] = hashlib.sha256(source).hexdigest()
          requirements = {}
          for value in metadata.get_all("Requires-Dist", []):
              match = re.match(r"^([A-Za-z0-9][A-Za-z0-9._-]*)", value)
              if match is None:
                  raise SystemExit(f"invalid Requires-Dist value: {value}")
              name = re.sub(r"[-_.]+", "-", match.group(1)).lower()
              requirements[name] = value[match.end():]
          for name, expected in security_floors.items():
              value = requirements.get(name)
              if value is None:
                  raise SystemExit(f"wheel metadata omits security floor: {name}")
              specifier, separator, marker = value.partition(";")
              if separator:
                  raise SystemExit(f"wheel security floor is marked: {name}; {marker.strip()}")
              actual_clauses = {
                  clause.strip()
                  for clause in specifier.strip().strip("()").split(",")
                  if clause.strip()
              }
              expected_clauses = {clause.strip() for clause in expected.split(",")}
              if actual_clauses != expected_clauses:
                  raise SystemExit(
                      f"wheel security floor drift for {name}: "
                      f"expected {expected}, found {specifier.strip()}"
                  )
          scanner = requirements.get("cisco-ai-mcp-scanner")
          if scanner is None:
              raise SystemExit("wheel metadata omits cisco-ai-mcp-scanner")
          scanner_requirement = scanner.partition(";")[0].strip()
          if re.fullmatch(
              r"@\s+https://files[.]pythonhosted[.]org/[A-Za-z0-9_./-]+[.]whl"
              r"#sha256=[0-9a-f]{64}",
              scanner_requirement,
          ) is None:
              raise SystemExit(
                  "wheel metadata leaves cisco-ai-mcp-scanner floating instead of binding a hashed wheel"
              )
          digest_path.write_text(json.dumps(digests), encoding="utf-8")
          PY
          uv --no-config venv "$tmp/venv" --python "${{ matrix.python-version }}"
          # Use pip's foreign-interpreter mode so this is an ordinary pip
          # resolution without adding packaging tools to the runtime graph.
          uvx --from pip pip --isolated --python "$tmp/venv/bin/python" \
            install --disable-pip-version-check "$whl"
          uvx --from pip pip --isolated --python "$tmp/venv/bin/python" check
          "$tmp/venv/bin/defenseclaw" --help >/dev/null
          HOME="$tmp/home" DEFENSECLAW_HOME="$tmp/home/.defenseclaw" \
            PYTHONNOUSERSITE=1 PYTHONPATH='' "$tmp/venv/bin/python" - <<'PY'
          import asyncio
          import sys
          from pathlib import Path

          import textual
          import defenseclaw.tui.app as tui_app

          module_path = Path(tui_app.__file__).resolve()
          if not module_path.is_relative_to(Path(sys.prefix).resolve()):
              raise SystemExit(f"TUI imported outside wheel environment: {module_path}")
          DefenseClawTUI = tui_app.DefenseClawTUI

          async def main() -> None:
              app = DefenseClawTUI()
              async with app.run_test(size=(120, 40)) as pilot:
                  await pilot.pause()

          asyncio.run(main())
          print("installed_wheel_tui_origin=venv")
          print("installed_wheel_tui_mount=ok textual=" + getattr(textual, "__version__", "unknown"))
          PY
          (
            cd "$tmp"
            PYTHONNOUSERSITE=1 PYTHONPATH='' "$tmp/venv/bin/python" - "$tmp/telemetry-resource-digests.json" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          import defenseclaw.observability.schema_resources as resource_module

          expected = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          module_path = Path(resource_module.__file__).resolve()
          if not module_path.is_relative_to(Path(sys.prefix).resolve()):
              raise SystemExit(f"telemetry resource API was not imported from the installed wheel: {module_path}")
          resources = {
              "telemetry.schema.json": resource_module.telemetry_v8_schema_bytes(),
              "catalog.json": resource_module.telemetry_v8_catalog_bytes(),
          }
          for name, payload in resources.items():
              if hashlib.sha256(payload).hexdigest() != expected[name]:
                  raise SystemExit(f"installed telemetry resource drift: {name}")
              json.loads(payload)
          PY
          )
          "$tmp/venv/bin/python" -c 'from defenseclaw.envvars import load_registry; assert load_registry().entries'
          uvx --from pip-audit pip-audit \
            --vulnerability-service osv \
            --path "$tmp/venv/lib/python${{ matrix.python-version }}/site-packages"

  upgrade-smoke:
    name: Release Regression (deterministic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      # A PR cannot mint release.yaml@refs/heads/main's Fulcio identity. Keep
      # ordinary CI deterministic and exercise the signed positive/live paths
      # only in nightly/manual certification.
      - name: Run fast release regression contracts
        run: |
          uv run python -m pytest -q \
            cli/tests/test_verify_sigstore_blob.py \
            cli/tests/test_observability_v8_upgrade_continuity_checker.py \
            cli/tests/test_resolve_upgrade_baselines.py \
            cli/tests/test_release_api_retry.py \
            cli/tests/test_release_workflow_staged.py \
            cli/tests/test_upgrade_smoke_static.py \
            cli/tests/test_upgrade_release_smoke_contract.py \
            cli/tests/test_release_certification.py \
            cli/tests/test_release_validation_strategy.py

  historical-resolver-dependencies:
    name: Historical Resolver Dependency Handoff (${{ matrix.platform }})
    needs: release-validation-plan
    if: >-
      ${{
        (github.event_name == 'pull_request' && needs.release-validation-plan.outputs.sensitive == 'true') ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-amd64
            runner_arch: X64
          - runner: macos-15
            platform: darwin-arm64
            runner_arch: ARM64
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
      # PR jobs cannot mint release.yaml@refs/heads/main's Fulcio identity.
      # Instead, execute the production resolver's content-pinned historical
      # dependency phases in isolated environments and require each installed
      # graph to pass `uv pip check`. Full provenance and resolver success stay
      # mandatory after the candidate is signed by the release workflow.
      - name: Execute phase-separated production resolver dependency graph
        run: |
          test "$RUNNER_ARCH" = "${{ matrix.runner_arch }}"
          scripts/test-historical-bootstrap-dependencies.sh

  unsigned-upgrade-candidate:
    name: Build selective exact-SHA upgrade candidate once
    needs: release-validation-plan
    if: >-
      ${{
        (github.event_name == 'pull_request' && needs.release-validation-plan.outputs.sensitive == 'true') ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      }}
    runs-on: ubuntu-latest
    env:
      UPGRADE_BASELINE_POLICY: ${{ github.workspace }}/effective-upgrade-baselines.json
    timeout-minutes: 25
    outputs:
      artifact_name: ${{ steps.name.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - id: name
        run: echo "artifact_name=unsigned-upgrade-candidate-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.release-validation-plan.outputs.baseline_artifact }}
          path: .
      - id: prepare
        name: Build exact PR SHA developer candidate
        run: |
          set -euo pipefail
          scripts/test-upgrade-release.sh \
            --prepare-only \
            --platform linux/amd64 \
            --target-version "${{ needs.release-validation-plan.outputs.candidate_version }}" \
            --keep-workdir | tee prepare-candidate.log
          root="$(sed -n 's/^OK: Prepared candidate release root: //p' prepare-candidate.log | tail -1)"
          test -d "$root"
          echo "root=$root" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: ${{ steps.name.outputs.artifact_name }}
          path: ${{ steps.prepare.outputs.root }}/
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  selective-upgrade-smoke:
    name: Selective upgrade (${{ matrix.class }} / ${{ matrix.baseline }})
    needs: [release-validation-plan, unsigned-upgrade-candidate, historical-resolver-dependencies]
    if: >-
      ${{
        github.event_name == 'pull_request' &&
        needs.release-validation-plan.outputs.sensitive == 'true'
      }}
    runs-on: ubuntu-latest
    env:
      UPGRADE_BASELINE_POLICY: ${{ github.workspace }}/effective-upgrade-baselines.json
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.release-validation-plan.outputs.pr_matrix) }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.unsigned-upgrade-candidate.outputs.artifact_name }}
          path: unsigned-candidate
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.release-validation-plan.outputs.baseline_artifact }}
          path: .
      - name: Run selected deterministic success/refusal contract
        env:
          BASELINE: ${{ matrix.baseline }}
          CANDIDATE_VERSION: ${{ needs.release-validation-plan.outputs.candidate_version }}
          RISK_CLASS: ${{ matrix.class }}
          VALIDATION_MODE: ${{ matrix.mode }}
          EXPECTED_RESULT: ${{ matrix.expected }}
        run: |
          set -euo pipefail
          echo "Selected release risk class: $RISK_CLASS ($VALIDATION_MODE → $EXPECTED_RESULT)"
          # An unsigned PR cannot prove production resolver success. Exercise
          # the target-owned migration and fresh-process health in a throwaway
          # HOME, while the production protocol harness proves pre-mutation
          # refusal. Signed resolver/handoff success belongs to certification.
          run_success() {
            scripts/test-developer-target-activation.sh \
              --from-version "$BASELINE" \
              --target-version "$CANDIDATE_VERSION" \
              --release-root "$GITHUB_WORKSPACE/unsigned-candidate" \
              --baseline-mode seed \
              --health-timeout 60
          }
          run_refusal() {
            scripts/test-upgrade-protocol-release.sh \
              --from-version "$BASELINE" \
              --target-version "$CANDIDATE_VERSION" \
              --release-root "$GITHUB_WORKSPACE/unsigned-candidate" \
              --baseline-mode seed \
              --refusal-contract-only
          }
          case "$EXPECTED_RESULT" in
            success) run_success ;;
            refusal-before-mutation) run_refusal ;;
            success-and-refusal) run_success; run_refusal ;;
            *)
              echo "::error title=Unknown selective validation result::$EXPECTED_RESULT"
              exit 1
              ;;
          esac

  main-release-smoke:
    name: Main Release Candidate Smoke (${{ matrix.class }})
    needs: [release-validation-plan, unsigned-upgrade-candidate, historical-resolver-dependencies]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      UPGRADE_BASELINE_POLICY: ${{ github.workspace }}/effective-upgrade-baselines.json
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.release-validation-plan.outputs.medium_matrix) }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.unsigned-upgrade-candidate.outputs.artifact_name }}
          path: unsigned-candidate
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.release-validation-plan.outputs.baseline_artifact }}
          path: .
      - name: Run exact-SHA candidate representative upgrade canary
        env:
          BASELINE: ${{ matrix.baseline }}
          RISK_CLASS: ${{ matrix.class }}
          CANDIDATE_VERSION: ${{ needs.release-validation-plan.outputs.candidate_version }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          make check-upgrade-manifest
          scripts/test-developer-target-activation.sh \
            --from-version "$BASELINE" \
            --target-version "$CANDIDATE_VERSION" \
            --release-root "$GITHUB_WORKSPACE/unsigned-candidate" \
            --baseline-mode seed \
            --baseline-dependencies published \
            --health-timeout 60

  connector-matrix:
    name: Connector Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: make plugin
      - run: make dev-pycli
      - run: make connector-matrix-test

  enterprise-hook-hardening:
    name: Enterprise Hook Hardening (${{ matrix.os }}, ${{ matrix.connector }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        connector: [codex, claudecode]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - name: Build enterprise gateway CLI
        shell: bash
        run: go build -o "$RUNNER_TEMP/defenseclaw-gateway" ./cmd/defenseclaw
      - name: Test root boundary and connector repair
        shell: bash
        run: ./scripts/test-enterprise-hook-hardening.sh "$RUNNER_TEMP/defenseclaw-gateway" "${{ matrix.connector }}"

  macos-enterprise-packaging:
    name: macOS Enterprise Packaging
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - name: Build enterprise gateway CLI
        shell: bash
        run: go build -o "$RUNNER_TEMP/defenseclaw-gateway" ./cmd/defenseclaw
      - name: Test managed package ownership enforcement
        shell: bash
        env:
          MACOS_ENTERPRISE_PACKAGING_SMOKE: "1"
        run: ./scripts/test-macos-enterprise-packaging.sh "$RUNNER_TEMP/defenseclaw-gateway"

  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync
      - run: uv pip install pip pip-audit
      # TODO: Remove --ignore-vuln CVE-2026-4539 once pygments >= 2.19.3 is released
      # CVE-2026-4539: Low severity ReDoS in AdlLexer (local attack vector only)
      # TODO: Remove --ignore-vuln CVE-2026-3219 once a fixed pip version is
      # released. No fix version available as of 2026-04-24. pip is only used
      # by pip-audit itself, not by DefenseClaw at runtime.
      # TODO: Remove --ignore-vuln CVE-2026-3219 once a fixed pip is released.
      # CVE-2026-3219: pip's interpretation conflict with concatenated tar/ZIP
      # archives. Medium severity; impacts only attacker-supplied package
      # archives. We install exclusively from PyPI via uv with locked hashes
      # (uv.lock), so this attack surface is not exposed in CI or runtime.
      #
      # TODO: Remove --ignore-vuln PYSEC-2026-196 once the CI base image ships
      # pip >= 26.1.2. Same rationale as CVE-2026-3219: pip is only used by
      # pip-audit here, not by DefenseClaw at runtime, and we install
      # exclusively from PyPI via uv with locked hashes (uv.lock).
      #
      # TODO: Remove --ignore-vuln PYSEC-2026-2132 once
      # cisco-ai-mcp-scanner's litellm dependency no longer pins click==8.1.8.
      # The advisory affects click.edit(), which DefenseClaw does not call;
      # requiring the fixed Click 8.3.3 currently makes wheel installation
      # unsatisfiable because litellm==1.83.7 requires Click 8.1.8 exactly.
      #
      # Previously ignored, now fixed by bumping cisco-ai-skill-scanner to
      # >=2.0.11 + overriding starlette>=1.0.1 and python-dotenv>=1.2.2 in
      # pyproject.toml:
      #   - PYSEC-2026-161 (GHSA-86qp-5c8j-p5mr, starlette host-header)
      #   - CVE-2026-28684 (python-dotenv arbitrary file read)
      # aiohttp>=3.14.0 (CVE-2026-34993, CVE-2026-47265) and pyjwt>=2.13.0
      # (PYSEC-2026-175/177/178/179) are likewise pinned in pyproject.toml.
      # Use OSV for the vulnerability database so an outage in PyPI's
      # package-metadata JSON API does not turn the audit red before
      # pip-audit can evaluate the installed environment.
      # TODO: Remove starlette ignores once cisco-ai-skill-scanner pins
      # starlette >= 1.3.1. Starlette is only used by the skill-scanner
      # plugin's local dev server, not by DefenseClaw's gateway at runtime.
      # TODO: Remove aiohttp ignores once aiohttp >= 3.14.1 is pinned in
      # pyproject.toml. aiohttp is a transitive dep of the skill-scanner;
      # DefenseClaw's gateway is pure Go and does not use aiohttp at runtime.
      # TODO: Remove python-multipart ignores once >= 0.0.31 is available
      # and pinned. Same skill-scanner transitive; not in the gateway.
      - run: >
          uv run pip-audit --vulnerability-service osv
          --ignore-vuln CVE-2026-4539
          --ignore-vuln CVE-2026-3219
          --ignore-vuln PYSEC-2026-196
          --ignore-vuln PYSEC-2026-2132
          --ignore-vuln CVE-2026-48818
          --ignore-vuln CVE-2026-48817
          --ignore-vuln CVE-2026-54283
          --ignore-vuln CVE-2026-54282
          --ignore-vuln CVE-2026-54279
          --ignore-vuln CVE-2026-54273
          --ignore-vuln CVE-2026-54275
          --ignore-vuln CVE-2026-54277
          --ignore-vuln CVE-2026-54280
          --ignore-vuln CVE-2026-54278
          --ignore-vuln CVE-2026-54276
          --ignore-vuln CVE-2026-54274
          --ignore-vuln CVE-2026-53539
          --ignore-vuln CVE-2026-53538
          --ignore-vuln CVE-2026-53540
          --ignore-vuln CVE-2026-53537
          --ignore-vuln GHSA-537c-gmf6-5ccf
          --ignore-vuln GHSA-6v7p-g79w-8964
          --ignore-vuln GHSA-4xgf-cpjx-pc3j

  ts-build-test:
    name: TypeScript Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: make plugin
      - run: make ts-test

  ts-audit:
    name: npm Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/defenseclaw
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - run: npm ci
      # Production-only audit (--omit=dev excludes vitest/vite dev vulns).
      # --audit-level=high: moderate-severity js-yaml ReDoS is a devDependency
      # transitive, not shipped in the extension bundle, so it is excluded.
      - run: npm audit --omit=dev --audit-level=high

  rego-test:
    name: Rego Policy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0
        with:
          # CI action / tool version pinning: a `version: latest`
          # value let a malicious OPA release run inside CI and tamper
          # with policy test results. Pin to a known-good release and
          # refresh through reviewed dependency updates (Dependabot).
          version: 0.70.0
      - run: make rego-test

  schema-parity:
    name: Schema & Parity Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
          # This one gate explicitly proves the PR #403/#412 compatibility
          # commits remain ancestors. Portable unit/source-archive validation
          # checks their documented SHAs without requiring Git history.
          fetch-depth: 0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: extensions/defenseclaw/package-lock.json
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: make plugin
      - run: make dev-pycli
      # Keep the ordinary gate small: compile the real registry once and prove
      # that every checked-in runtime/Go output is current. Exhaustive mutation
      # coverage runs only when its inputs change, plus nightly/manual.
      - name: Verify canonical telemetry registry outputs
        run: make telemetry-check
      - run: make check VERIFY_OBSERVABILITY_BASELINE_ANCESTRY=1

  local-observability-golden:
    name: Local Observability Golden
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: make dev-pycli
      - name: Start the local observability stack
        run: bundles/local_observability_stack/bin/openclaw-observability-bridge up --timeout 180
      - name: Emit and verify native v8 telemetry
        env:
          DEFENSECLAW_LOCAL_OBSERVABILITY_OTLP_ENDPOINT: http://127.0.0.1:4318
        run: |
          go test ./internal/gateway -run TestLocalObservabilityGoldenProducerScenario -count=1
          .venv/bin/python scripts/check_grafana_dashboards.py \
            --require-packaged \
            --live \
            --inventory \
            --inventory-hours 1 \
            --live-golden \
            --golden-lookback-minutes 15 \
            --golden-wait-seconds 60
      - name: Stop the local observability stack
        if: ${{ always() }}
        run: bundles/local_observability_stack/bin/openclaw-observability-bridge reset
