name: macOS Upstream Freshness

on:
  schedule:
    - cron: "17 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: macos-upstream-freshness
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Compare pin with latest stable macOS release
        id: freshness
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          python3 scripts/check-macos-upstream.py --json > "$RUNNER_TEMP/macos-freshness.json"
          code=$?
          set -e
          echo "code=$code" >> "$GITHUB_OUTPUT"

      - name: Open update issue when stale
        if: ${{ steps.freshness.outputs.code == '2' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "[macOS] Import latest standalone app release"
        run: |
          set -euo pipefail
          existing=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "$TITLE in:title" \
            --json number,title \
            | jq -r --arg title "$TITLE" '.[] | select(.title == $title) | .number' \
            | head -1)
          if [ -z "$existing" ]; then
            latest=$(jq -r .latest_tag "$RUNNER_TEMP/macos-freshness.json")
            printf -v body '%s\n\n%s `%s`\n\n%s\n\n```bash\n%s\n```\n\n%s' \
              'The weekly freshness check found that the checked-in macOS app is not the latest stable standalone release.' \
              'Latest stable tag:' "$latest" \
              'Update with:' "scripts/update-macos-app.sh $latest" \
              "Freshness run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body "$body"
          else
            echo "Update issue #$existing is already open"
          fi

      - name: Fail stale or unavailable checks
        if: ${{ steps.freshness.outputs.code != '0' }}
        run: exit 1
