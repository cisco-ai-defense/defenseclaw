# Machine-readable v7/current-state baseline for observability-v8 migration.
# This is an inventory, not the v8 classification registry. Items marked
# pending_p1_classification must receive reviewed bucket/event dispositions in P1.
inventory_version: 1

migration_disposition_categories:
  - per_item
  - translate_to_v8
  - preserve_in_place
  - preserve_notification_only
  - materialize_then_retire_runtime_override
  - retain_display_only
  - pending_p1_classification
  - import_telemetry_registry
  - preserve_separate_schema
  - preserve_local_observability_v1
  - preserve_compatibility_floor

classes:
  legacy_config_anchors:
    migration_disposition: per_item
    items:
      - id: otel_block
        source: internal/config/config.go
        matcher: literal
        value: 'type OTelConfig struct {'
        migration_disposition: translate_to_v8
      - id: otel_enabled
        source: internal/config/config.go
        matcher: literal
        value: 'Enabled      bool                    `mapstructure:"enabled"      yaml:"enabled"`'
