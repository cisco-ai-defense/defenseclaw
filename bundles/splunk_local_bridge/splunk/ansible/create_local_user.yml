- name: Check for existing DefenseClaw local user
  splunk_api:
    method: GET
    url: "/services/authentication/users/defenseclaw_local_user?output_mode=json"
    cert_prefix: "{{ cert_prefix }}"
    username: "{{ splunk.admin_user }}"
    password: "{{ splunk.password }}"
    svc_port: "{{ splunk.svc_port }}"
    status_code: [200, 404]
  register: defenseclaw_local_user_get
  no_log: "{{ hide_password }}"

- name: Create DefenseClaw local user
  splunk_api:
    method: POST
    url: "/services/authentication/users"
    cert_prefix: "{{ cert_prefix }}"
    username: "{{ splunk.admin_user }}"
    password: "{{ splunk.password }}"
    svc_port: "{{ splunk.svc_port }}"
    body:
      name: "defenseclaw_local_user"
      password: "{{ lookup('env', 'DEFENSECLAW_LOCAL_PASSWORD') }}"
      roles: "defenseclaw_local_user"
      defaultApp: "defenseclaw_local_mode"
    body_format: "form-urlencoded"
    status_code: [201]
  when: defenseclaw_local_user_get.status == 404
  no_log: "{{ hide_password }}"

- name: Update DefenseClaw local user
  splunk_api:
    method: POST
    url: "/services/authentication/users/defenseclaw_local_user"
    cert_prefix: "{{ cert_prefix }}"
    username: "{{ splunk.admin_user }}"
    password: "{{ splunk.password }}"
    svc_port: "{{ splunk.svc_port }}"
    body:
      password: "{{ lookup('env', 'DEFENSECLAW_LOCAL_PASSWORD') }}"
      roles: "defenseclaw_local_user"
      defaultApp: "defenseclaw_local_mode"
    body_format: "form-urlencoded"
    status_code: [200]
  when: defenseclaw_local_user_get.status == 200
  no_log: "{{ hide_password }}"
