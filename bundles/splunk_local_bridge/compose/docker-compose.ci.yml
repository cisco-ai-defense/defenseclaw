name: splunk-claw-bridge-ci

services:
  splunk:
    image: ${SPLUNK_IMAGE}
    env_file:
      - ${SPLUNK_ENV_FILE:-../env/.env.example}
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8088:8088"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/splunk/etc
      - /opt/splunk/var
      - ../splunk/default.yml:/tmp/defaults/default.yml:ro
      - ../splunk:/opt/splunk-claw-bridge/splunk:ro
