# DefenseClaw-facing OpenTelemetry Collector config.
#
# Pipelines:
#   traces  -> tempo  (OTLP gRPC on tempo:4317)
#   metrics -> prometheus (remote-write on prometheus:9090)
#   logs    -> loki   (OTLP HTTP on loki:3100/otlp)
#
# Every signal is also fanned out to the built-in "debug" exporter so
# operators can `docker logs defenseclaw-otel-collector` and see raw
# OTLP payloads while iterating on the sidecar contract. Set the
# verbosity to `basic` in production to avoid noise.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:*"
            - "http://127.0.0.1:*"

processors:
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: 5s

  # Prometheus remote write requires cumulative monotonic sums. The Go OTLP
  # SDK intentionally exports many counters as delta sums; without this
  # stateful conversion gauges arrived but lifecycle/tool/token counters were
  # silently absent from Prometheus after the single-ingestion-path cleanup.
  # Keep this in the metrics pipeline only.
  deltatocumulative:

  # Generated pipeline canaries must remain queryable in Tempo, but they are
  # synthetic health probes rather than user activity and therefore must not
  # increment the Agent360 RED metrics. This processor is attached only to the
  # forward/agent360 branch below; the primary trace branch reaches Tempo and
  # the debug exporter before this exact boolean-attribute filter.
  filter/agent360-canary:
    error_mode: ignore
    trace_conditions:
      - 'span.attributes["defenseclaw.telemetry.canary"] == true'

  # Defense-in-depth resource enrichment so every signal carries the
  # service.namespace=defenseclaw label even if the sidecar forgets to
  # set it. The `insert` actions keep sidecar-supplied values when present.
  # The legacy deployment.environment alias is copied from the canonical
  # deployment.environment.name first; local-dev is only a fallback when
  # neither spelling was supplied. This prevents a canonical production
  # resource from being paired with a contradictory local-dev alias.
  resource:
    attributes:
      - key: service.namespace
        value: defenseclaw
        action: insert
      - key: deployment.environment
        from_attribute: deployment.environment.name
        action: insert
      - key: deployment.environment
        value: local-dev
        action: insert

connectors:
  # Fork the post-resource trace stream into a dedicated spanmetrics branch.
  # Keeping Tempo on the primary branch ensures the generated two-span canary
  # remains available for end-to-end trace-topology validation.
  forward/agent360:

  # Turn completed runtime spans into per-agent RED metrics. These dimensions
  # are the stable Agent360 correlation contract; request IDs and prompt text
  # are intentionally excluded from labels. The native agent.last_seen metric
  # powers the durable directory while these derived metrics power latency,
  # throughput, tool, model, and error panels.
  spanmetrics/agent360:
    namespace: defenseclaw.agent.span
    histogram:
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s, 10s, 30s, 1m, 5m]
    dimensions:
      - name: gen_ai.operation.name
      - name: gen_ai.agent.id
      - name: gen_ai.agent.name
      - name: gen_ai.agent.type
      - name: defenseclaw.agent.root.id
      - name: defenseclaw.agent.parent.id
      - name: defenseclaw.agent.lifecycle.id
      - name: defenseclaw.agent.execution.id
      - name: defenseclaw.agent.lifecycle.event
      - name: defenseclaw.agent.lifecycle.state
      - name: defenseclaw.agent.phase
      - name: defenseclaw.agent.phase.previous
      - name: defenseclaw.agent.phase.code
      - name: connector
      - name: gen_ai.tool.name
      - name: defenseclaw.destination.app
      - name: gen_ai.provider.name
      - name: gen_ai.request.model
    exemplars:
      enabled: true
    dimensions_cache_size: 10000
    resource_metrics_cache_size: 1000
    metrics_flush_interval: 15s
    metrics_expiration: 24h

exporters:
  # Traces -> Tempo.
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Metrics -> Prometheus remote write.
  prometheusremotewrite/prometheus:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
    remote_write_queue:
      enabled: true
      queue_size: 10000

  # Logs -> Loki via native OTLP.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Local tap so operators can see raw OTLP frames while iterating.
  # Switch to verbosity=basic to shrink the log volume.
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]
  telemetry:
    logs:
      level: info
    metrics:
      level: normal
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
                # Preserve the pre-v0.123 metric names consumed by the
                # bundled Prometheus alert rules and dashboards.
                without_type_suffix: true
                without_units: true
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/tempo, forward/agent360, debug]
    traces/agent360-spanmetrics:
      receivers: [forward/agent360]
      processors: [filter/agent360-canary]
      exporters: [spanmetrics/agent360]
    metrics:
      receivers: [otlp, spanmetrics/agent360]
      processors: [resource, deltatocumulative, batch]
      # One application-metric path only. Prometheus still scrapes the
      # collector's own operational metrics on 8888, while OTLP and derived
      # span metrics reach Prometheus exclusively through remote write.
      exporters: [prometheusremotewrite/prometheus, debug]
    logs:
      receivers: [otlp]
      # DefenseClaw has already applied the selected v8 route and redaction
      # profile. The local Collector must preserve that canonical projection;
      # it performs resource enrichment and batching only.
      processors: [resource, batch]
      exporters: [otlphttp/loki, debug]
